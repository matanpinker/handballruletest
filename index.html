Correct decision?","options":{"a":"Goalkeeper throw for WHITE team","b":"Free throw for WHITE team after whistle signal","c":"Goalkeeper throw after whistle signal","d":"2-minute suspension for BLACK 6"},"correct":["b","d"],"rules":"12:1, 12:2, 15:5, 15:9, 16:1a"},{"id":"15.5","chapter":"15","stem":"A throw-in is awarded to WHITE team. WHITE 8 executes the throw-in as a direct shot on goal. The ball hits the goalpost and bounces back to WHITE 8, who catches the ball and scores a goal. Correct decision?","options":{"a":"Goalkeeper throw for BLACK team","b":"Goal for WHITE team","c":"Throw-in is retaken after whistle signal","d":"Free throw for BLACK team"},"correct":["b"],"rules":"15:2"},{"id":"15.6","chapter":"15","stem":"Goalkeeper BLACK 12 has saved a shot on goal. He wants to immediately start a counter- attack, but drops the ball in a way that it crosses the goal line into the goal of BLACK team. Correct decision?","options":{"a":"Goal for WHITE team","b":"Repeat the goalkeeper throw after whistle signal","c":"Throw-in for WHITE team","d":"Free throw for WHITE team"},"correct":["b"],"rules":"12:1, 12:2, 15:2"},{"id":"15.7","chapter":"15","stem":"WHITE 6 executes a throw-in in the direction of his goalkeeper. Goalkeeper WHITE 1 notices the ball too late, and the ball crosses the goal line. Correct decision?","options":{"a":"Free throw for BLACK team","b":"Goal for BLACK team","c":"Goalkeeper throw for WHITE team","d":"Repeat the throw-in for WHITE team after whistle signal"},"correct":["b"],"rules":"9:1, 15:2"},{"id":"15.8","chapter":"15","stem":"WHITE 7 executes a throw-in, and the ball hits the referee. WHITE 7 picks up the ball again and throws it into the goal of BLACK team. Correct decision?","options":{"a":"Goalkeeper throw for BLACK team","b":"Goal for WHITE team","c":"Free throw for BLACK team","d":"Repeat the throw-in after whistle signal","e":"Free throw for WHITE team"},"correct":["c"],"rules":"7:9, 13:1a, 15:2"},{"id":"15.9","chapter":"15","stem":"There is a free throw for WHITE team. When everyone stands correctly, WHITE 10 puts the ball down to give some instructions. BLACK 7 quickly takes the ball and starts a counter-attack. Correct decision?","options":{"a":"Game continues without interruption","b":"Repeat free throw for WHITE team after whistle signal","c":"Free throw for WHITE team, warning for BLACK 7","d":"Free throw for WHITE team, 2-minute suspension for BLACK 7"},"correct":["a"],"rules":"15:2"},{"id":"15.10","chapter":"15","stem":"BLACK 9 wants to execute a free throw, but WHITE 11 is only two metres away from the ball and tries to delay the throw. Correct decision?","options":{"a":"Personal punishment against WHITE 11, free throw for BLACK team after whistle signal","b":"Free throw for WHITE team after whistle signal","c":"2-minute suspension for WHITE 11","d":"Correct the position of WHITE 11 and free throw after whistle signal"},"correct":["a"],"rules":"15:5b, 15:9, 16:1a, 16:3b"},{"id":"15.11","chapter":"15","stem":"There is a free throw for BLACK team at the free-throw line of WHITE team. The referee overlooks that BLACK 8 is in a position between the free-throw line and the goal-area line. BLACK 8 receives the ball and scores. Correct decision?","options":{"a":"Repeat the free throw for BLACK team after whistle signal","b":"Free throw for WHITE team","c":"Goal for BLACK team","d":"Warning for BLACK 8"},"correct":["a"],"rules":"13:7, 15:5b, 15:7"},{"id":"15.12","chapter":"15","stem":"Goalkeeper BLACK 12 executes a goalkeeper throw towards the goal of WHITE team. No player from either team touches the ball, and it enters the goal of WHITE team. Correct decision?","options":{"a":"Goalkeeper throw for WHITE team","b":"Throw-in for WHITE team","c":"Goal for BLACK team","d":"Warning for BLACK 12 for unsportsmanlike conduct"},"correct":["c"],"rules":"15:2"},{"id":"15.13","chapter":"15","stem":"WHITE 5 has already received a warning and two 2-minute suspensions. When BLACK team is carrying out a free throw, he interferes with the execution of the throw by not keeping his distance. This is the first time he does that. Correct decision?","options":{"a":"Warning for WHITE 5","b":"No punishment","c":"Third 2-minute suspension for WHITE 5 and disqualification (red card shown by the referees)"},"correct":["c"],"rules":"8:7c, 15:4, 15:9, 16:3d, 16:5, 16:6d"},{"id":"15.14","chapter":"15","stem":"Shortly before the end of the game, WHITE team is leading 24:23. A free throw is awarded for WHITE team about one metre outside the free-throw line of BLACK team. All players are in a correct position, and the referee whistles for the execution of the free throw. WHITE 10, who is executing the free throw, takes one step before the ball has left his hand. Correct decision?","options":{"a":"Free throw for WHITE team","b":"Time-out","c":"2-minute suspension for WHITE 10","d":"Free throw for BLACK team"},"correct":["d"],"rules":"13:7, 15:7"},{"id":"15.15","chapter":"15","stem":"WHITE 14 wants to execute a free throw without whistle signal at the free-throw line of BLACK team. He and his teammates are standing in correct positions. Before the ball has left the hand of WHITE 14, both WHITE 13 and WHITE 15 run across the free-throw line towards the goal- area line. Correct decision?","options":{"a":"Correction","b":"Free throw for WHITE team after whistle signal","c":"Game continues without interruption","d":"Free throw for BLACK team"},"correct":["a","b"],"rules":"13:3, 15:1, 15:7"},{"id":"15.16","chapter":"15","stem":"Goalkeeper BLACK 1 is executing a goalkeeper throw. The ball touches the referee and goes back to BLACK 1, who in the meantime has left the goal area. Correct decision?","options":{"a":"Game continues without interruption","b":"Repeat the goalkeeper throw after whistle signal","c":"Free throw for WHITE team","d":"Free throw for BLACK team after whistle signal"},"correct":["c"],"rules":"12:2, 13:1a, 15:2"},{"id":"15.17","chapter":"15","stem":"While executing a free throw, BLACK 11 swings back his arm while moving the ball completely over the sideline. Correct decision?","options":{"a":"Game continues without interruption","b":"Free throw for WHITE team","c":"Throw-in for WHITE team","d":"Free throw for WHITE team, verbal caution for BLACK 11"},"correct":["a"],"rules":"15:1, 15:2"},{"id":"15.18","chapter":"15","stem":"Goalkeeper WHITE 1 stops the ball just in front of the goal line. When he tries to pass the ball to WHITE 4, the ball falls out of his hand and into his own goal. Correct decision?","options":{"a":"Goal for BLACK team","b":"Free throw for BLACK team","c":"7-metre throw for BLACK team","d":"Repeated goalkeeper throw for WHITE team after whistle signal"},"correct":["d"],"rules":"6:4, 12:1, 12:2, 15:2"},{"id":"15.19","chapter":"15","stem":"WHITE team has a throw-off. The court referee gives the whistle signal for the execution. WHITE 13 takes the ball out of the hand of WHITE 9, who was standing ready to execute the throw. WHITE 13 does this because he saw that WHITE 7 and WHITE 3 are running into the half of the opponents and are in favourable positions. WHITE 13 throws the ball to WHITE 7, who scores a goal. Correct decision?","options":{"a":"Goal for WHITE team","b":"Correction, repetition of the throw-off for WHITE team","c":"Free throw for BLACK team","d":"Verbal caution for WHITE 13","e":"Verbal caution for WHITE 7 and WHITE 13"},"correct":["c"],"rules":"15:2, 15:7"},{"id":"15.20","chapter":"15","stem":"(Without throw-off area) The score is 30:30 with just four seconds left in the game. WHITE team scores to make it 31:30. BLACK team tries to take a quick throw-off. BLACK 10 stands with one foot behind the centre line and the other one just in front of it. Without a whistle signal, he throws the ball into the goal of WHITE team. The automatic signal from the public clock for the end of the game sounds. Correct decision?","options":{"a":"Goal for BLACK team","b":"Repetition of the throw-off for BLACK team","c":"Wait for the result of the throw","d":"Time-out","e":"The game is over; no goal"},"correct":["e"],"rules":"2:3, 2:4, 15:5a"},{"id":"15.21","chapter":"15","stem":"There is a free throw for WHITE team at the free-throw line of BLACK team. WHITE 7 executes the free throw and, like his teammates, he is standing correctly outside the free-throw line. The free throw is executed quickly without a whistle signal, but before the ball has left the hand of WHITE 7, both WHITE 9 and WHITE 18 cross the free-throw line. Correct decision?","options":{"a":"Free throw for BLACK team","b":"Correction","c":"Free throw for WHITE team after whistle signal","d":"Free throw for BLACK team; warning for WHITE 9 and WHITE 18"},"correct":["b","c"],"rules":"13:7, 15:1, 15:5, 15:6, 15:7, 2nd paragraph"},{"id":"15.22","chapter":"15","stem":"From which of the following throws is it not possible to score an own goal?","options":{"a":"Goalkeeper throw","b":"Free throw","c":"Throw-in","d":"Throw-off"},"correct":["a"],"rules":"12:2, 15:2"},{"id":"15.23","chapter":"15","stem":"BLACK 4 assumes a correct position to execute a throw-in that has been awarded to his team. As he cannot find a teammate to whom he could pass the ball he bounces the ball one time inside the sideline. Correct decision?","options":{"a":"Free throw for WHITE team without whistle signal","b":"Throw-in for WHITE team after restart signal","c":"Repetition of the throw-in for BLACK team after whistle signal","d":"Free throw for BLACK team after whistle signal"},"correct":["a"],"rules":"15:2, 15:7, 15:8"},{"id":"15.24","chapter":"15","stem":"WHITE team receives a free throw. Without a whistle signal from the referees, WHITE 9 executes the free throw very quickly while jumping. The ball goes to WHITE 4, who finds himself completely unmarked in front of the goal of BLACK team. Correct decision?","options":{"a":"Game continues without interruption","b":"Free throw for BLACK team","c":"Repetition of the free throw for WHITE team after whistle signal"},"correct":["c"],"rules":"15:5b, 15:7"},{"id":"15.25","chapter":"15","stem":"WHITE team receives a free throw. Without a whistle signal from the referees, WHITE 5 very quickly executes the free throw while running fast. WHITE 5 intends to play the ball to WHITE 4, but BLACK 3 intercepts the ball and finds himself unmarked in front of the goal of WHITE team. Correct decision?","options":{"a":"Game continues without interruption","b":"Repetition of the free throw after whistle signal","c":"Repetition of the free throw and progressive punishment for BLACK 3"},"correct":["a"],"rules":"13:2, 15:7, 2nd Paragraph"},{"id":"15.26","chapter":"15","stem":"BLACK team is ready to execute a free throw without whistle signal. BLACK 8 executes the throw with both feet and his left hand in contact with the floor. BLACK 6 receives the ball and scores a goal. What is the correct decision?","options":{"a":"Goal for BLACK team","b":"Correction, repetition of the free throw after whistle signal from the referees","c":"Free throw for WHITE team"},"correct":["b"],"rules":"15:1, note"},{"id":"15.27","chapter":"15","stem":"BLACK team score a goal. The referees whistle for the subsequent throw-off. Before the ball has left the hand of the thrower, there is a whistle signal from the timekeeper. WHITE 5 has entered the court before WHITE 6 has left the court. What is the correct decision?","options":{"a":"Time-out.","b":"2-minute suspension for WHITE 5.","c":"2-minute suspension for WHITE 6.","d":"Since the ball was out of play at the moment of the whistle the match is restarted with a throw-off for WHITE team.","e":"The match is restarted with a free throw for BLACK team.","f":"The match is restarted with a free throw for WHITE team."},"correct":["a","b","e"],"rules":"2:8, 4:4-6, 15:7, 16:3a"},{"id":"16.1","chapter":"16","stem":"Team official B from WHITE team is complaining and receives a 2-minute suspension. Before the game is restarted, he complains again and is therefore disqualified. Correct decision?","options":{"a":"WHITE team is reduced by 2 players on the court for 2 minutes","b":"WHITE team is reduced by 1 player on the court for 4 minutes","c":"WHITE team is reduced by 1 player on the court for 2 minutes"},"correct":["c"],"rules":"16:9"},{"id":"16.2","chapter":"16","stem":"WHITE 8 receives a 2-minute suspension, as he has pushed an opponent. He approaches the referee to insult him with the following words: “You are stupid, you are an idiot, you will never learn!” Before leaving the court he spits in the referee’s face. Correct decision?","options":{"a":"Disqualification of WHITE 8, WHITE team is reduced by 1 player on the court for 4 minutes (red card shown by the referees)","b":"Disqualification of WHITE 8, WHITE team is reduced by 2 players on the court for 2 minutes (red card shown by the referees)","c":"Disqualification of WHITE 8, WHITE team is reduced by 1 player on the court for 4 minutes, written report (red and blue cards shown by the referees)","d":"Disqualification of WHITE 8, WHITE team is reduced by 2 players on the court for 2 minutes, written report (red and blue cards shown by the referees)"},"correct":["c"],"rules":"8:10a, 16:6b, 16:9c"},{"id":"16.3","chapter":"16","stem":"What is the maximum number of warnings that should be given to the officials of a team during a match?","options":{"a":"None","b":"1","c":"2","d":"3"},"correct":["b"],"rules":"16:1 comment"},{"id":"16.4","chapter":"16","stem":"When does the suspension time of a player start?","options":{"a":"When the referee gives the hand signal for the suspension","b":"When the suspended player crosses the sideline","c":"When the referee whistles for the game to be restarted","d":"When the timekeeper starts the stopwatch"},"correct":["c"],"rules":"16:5"},{"id":"16.5","chapter":"16","stem":"To whom are suspensions to be indicated?","options":{"a":"The suspended player and the scorekeeper/timekeeper","b":"The responsible team official and the timekeeper","c":"Timekeeper/scorekeeper","d":"The suspended player, the responsible team official, and the scorekeeper"},"correct":["a"],"rules":"16:4"},{"id":"16.6","chapter":"16","stem":"BLACK 5 has received two 2-minute suspensions earlier in the game. One suspension for a foul that was punished progressively, and one for throwing the ball away, when the referees gave a free throw for the opponents. Now he commits his team’s second faulty substitution, and before the game is restarted, he commits an extremely unsportsmanlike conduct. Correct decision?","options":{"a":"2-minute suspension for BLACK 5","b":"Disqualification for BLACK 5, written report (red and blue cards shown by the referees; BLACK team is reduced by 1 player on the court for 4 minutes","c":"Disqualification for BLACK 5, written report (red and blue cards shown by the referees); BLACK team is reduced by 2 players on the court for 2 minutes"},"correct":["a","b"],"rules":"4:5, 8:10a, 16:3a, 16:6B, 16:6d, 16:9b"},{"id":"16.7","chapter":"16","stem":"WHITE 5 receives a 2-minute suspension for a foul. While leaving the court he insults the referees and is disqualified. WHITE 5 then gets so upset that he hits one of the referees. Correct decision?","options":{"a":"Written report (blue card shown by the referees)","b":"WHITE team is reduced by 1 player on the court for 2 minutes","c":"WHITE team is reduced by 2 players on the court for 2 minutes","d":"WHITE team is reduced by 1 player on the court for 4 minutes"},"correct":["a","d"],"rules":"8:10a, 16:6b 16:9c"},{"id":"16.8","chapter":"16","stem":"WHITE 7 has just been suspended for two minutes for unfair play. Before the game is restarted, he says to the referee: “You must be blind, you idiot!” Correct decision?","options":{"a":"Another 2-minutes suspension for WHITE 7","b":"Disqualification of WHITE 7 without written report (red card shown by the referees)","c":"WHITE team is reduced by 2 players on the court for 2 minutes","d":"WHITE team is reduced by 1 player on the court for 4 minutes","e":"Disqualification of WHITE 7, written report (red and blue cards shown by the referees)"},"correct":["d","e"],"rules":"8:10a, 16:6b, 16:9c"},{"id":"16.9","chapter":"16","stem":"WHITE 3 has been suspended for two minutes. After leaving the court, but before the restart of the match, WHITE 3 is guilty of a seriously unsportsmanlike conduct in the substitution area against official B from BLACK team. Just before that, official B from BLACK team ran out onto the playing court, even though no permission had been given. No sanctions have been called against the officials of BLACK team. Correct decision?","options":{"a":"Disqualification of WHITE 3 without written report (red card shown by the referees)","b":"Warning for official B from BLACK team","c":"WHITE team is reduced by 2 players on the court for 2 minutes","d":"WHITE team is reduced by 1 player on the court for 4 minutes"},"correct":["a","b","d"],"rules":"4:2, 8:9, 16:1b, 16:6b, 16:9c"},{"id":"16.10","chapter":"16","stem":"When a player is disqualified, the team is reduced by 1 player on the court for 2 minutes, unless the disqualification is given:","options":{"a":"For seriously unsportsmanlike conduct during the half-time break","b":"For an infringement outside the court","c":"Before the match begins","d":"For insulting the referees"},"correct":["c"],"rules":"16:11b"},{"id":"16.11","chapter":"16","stem":"During the half-time, break WHITE 7 assaults goalkeeper BLACK 12, while they are still on the court. Correct decision?","options":{"a":"Disqualification of WHITE 7, written report (red and blue cards shown by the referees); WHITE team is reduced by 1 player on the court for 2 minutes at the beginning of the second half.","b":"Warning for WHITE 7","c":"Caution for WHITE 7, because the match was interrupted"},"correct":["a"],"rules":"8:6, 16:6a, 16:10, 17:10"},{"id":"16.12","chapter":"16","stem":"During the half-time break, a referee is insulted by BLACK 7 on the way to the changing rooms. Correct decision?","options":{"a":"Disqualification of BLACK 7 without written report (red card shown by the referees)","b":"2-minute suspension for BLACK 7","c":"BLACK team is reduced by 1 player on the court for 2 minutes at the beginning of the second half.","d":"Disqualification of BLACK 7, written report (red and blue cards shown by the referees)"},"correct":["c","d"],"rules":"8:10a, 16:6b, 16:10, 17:10"},{"id":"16.13","chapter":"16","stem":"After the whistle for half-time, BLACK 5 collides with WHITE 9 on the court, and they both start shouting at each other. WHITE 9 then pushes BLACK 5 in the chest with both hands, so that BLACK 5 almost loses body control. Correct decision?","options":{"a":"2-minute suspension for WHITE 9 at the beginning of the second half","b":"Disqualification of WHITE 9 without written report (red card shown by the referees); WHITE team will be reduced by 1 player on the court for 2 minutes from the beginning of the second half.","c":"Disqualification of WHITE 9; WHITE team starts the second half without reduction.","d":"Disqualification of WHITE 9, written report (red and blue cards shown by the referees); WHITE team will be reduced by 1 player on the court for 2 minutes from the beginning of the second half."},"correct":["b"],"rules":"8:9, 16:10, 16:6b"},{"id":"16.14","chapter":"16","stem":"After the game, WHITE 10 shouts at the referees: “You stole the game from us, you idiots!” Correct decision?","options":{"a":"Warning for WHITE 10","b":"Disqualification of WHITE 10, written report (red and blue cards shown by the referees)","c":"Written report","d":"Warning for WHITE 10, written report"},"correct":["c"],"rules":"16:11c"},{"id":"16.15","chapter":"16","stem":"During the half-time break, WHITE 9, on the playing court, commits an assault against official B from BLACK team, who subsequently insults WHITE 9. Correct decision?","options":{"a":"Disqualification of WHITE 9, written report (red and blue cards shown by the referees); WHITE team will be reduced by 1 player on the court for 2 minutes from the beginning of the second half.","b":"Disqualification of official B from BLACK team, written report (red and blue cards shown by the referees); BLACK team will be reduced by 1 player on the court for 2 minutes from the beginning of the second half.","c":"Disqualification of WHITE 9 (red card shown by the referees); WHITE team will not be reduced from the beginning of the second half.","d":"Disqualification of official B from BLACK team (red card shown by the referees); BLACK team will not be reduced from the beginning of the second half."},"correct":["a","b"],"rules":"8:10a, 16:6, 16:10"},{"id":"16.16","chapter":"16","stem":"WHITE 7 is disqualified because he has just received his third 2-minute suspension. He tries to argue with the referees and does not leave the court. Correct decision?","options":{"a":"No further action","b":"WHITE team is reduced by 1 player on the court for 4 minutes.","c":"WHITE team is reduced by 2 players on the court for 2 minutes."},"correct":["b"],"rules":"16:9b"},{"id":"16.17","chapter":"16","stem":"WHITE 11 was warned in the first half and is again guilty of unsportsmanlike conduct during the half-time break. WHITE team was playing at full strength on the court, when the first half ended. Correct decision?","options":{"a":"Warning for WHITE 11","b":"2-minute suspension for WHITE 11","c":"Disqualification of WHITE 11","d":"WHITE team will be reduced by 1 player on the court for 2 minutes from the beginning of the second half.","e":"WHITE team will not be reduced by players on the court from the beginning of the second half."},"correct":["b","d"],"rules":"16:3d, 16:5, 16:10"},{"id":"16.18","chapter":"16","stem":"WHITE 4 is injured. The referees whistle for a time-out and give the hand signal to permit WHITE team to enter the court and take care of the player. Officials A and B from WHITE team, but also official A from BLACK team, enter the court. Official A from BLACK team already received a warning. Correct decision?","options":{"a":"No intervention","b":"When the game is restarted, BLACK team continues with the same number of players on the court as before the interruption.","c":"2-minute suspension for official A from BLACK team","d":"Disqualification of official A from BLACK team (red card shown by the referees)","e":"When the game is restarted, BLACK team will be reduced by 1 player on the court for 2 minutes.","f":"After receiving medical care on the court, WHITE 4 must leave the court and can only re- enter following the third attack of his team."},"correct":["c","e","f"],"rules":"4:11, 16:3e, 16:3 comment, Clarification 8c"},{"id":"16.19","chapter":"16","stem":"BLACK 9 is given a disqualification because of a serious foul against WHITE 9. Before the game is restarted, BLACK 9 hits official A from WHITE team in the face. Correct decision?","options":{"a":"Disqualification of BLACK 9 without written report (red card shown by the referees); BLACK team will be reduced by 2 players on the court for 2 minutes.","b":"Disqualification of BLACK 9 without written report (red card shown by the referees); BLACK team will be reduced by 1 player on the court for 4 minutes.","c":"No additional punishment is possible","d":"Disqualification of BLACK 9, written report (red and blue cards shown by the referees); BLACK team will be reduced by 2 players on the court for 2 minutes.","e":"Disqualification of BLACK 9, written report (red and blue cards shown by the referees); BLACK team will be reduced by 1 player on the court for 4 minutes."},"correct":["e"],"rules":"8:10a, 16:9d"},{"id":"16.20","chapter":"16","stem":"BLACK 8 is given his first 2-minute suspension following a time-out signal. When he leaves the court, before the game is restarted, he addresses the referees in an unsportsmanlike manner. Correct decision?","options":{"a":"An additional 2-minute suspension for BLACK 8, BLACK team will be reduced by 2 players on the court for 2 minutes","b":"An additional 2-minute suspension for BLACK 8, BLACK team will be reduced by 1 player on the court for 4 minutes","c":"Disqualification of BLACK 8 (red card shown by the referees), BLACK team will be reduced by 2 players on the court for 2 minutes","d":"Disqualification of BLACK 8 (red card shown by the referees), BLACK team will be reduced by 1 player on the court for 4 minutes"},"correct":["b"],"rules":"8:7a, 16:3d, 16:9a"},{"id":"16.21","chapter":"16","stem":"In which of the following situations must a team be reduced by 1 player on the court for 4 minutes?","options":{"a":"A player has just been disqualified. When leaving the court, he protests in a way that justifies a 2-minute suspension.","b":"A player has just received a 2-minute suspension. When leaving the court, he insults the referees and is disqualified.","c":"A player has just received a 2-minute suspension for unsportsmanlike conduct towards an opponent. While he is still on the court, he hits an opponent in the face and is disqualified.","d":"A player has just received a 2-minute suspension for unsportsmanlike conduct. After crossing the sideline, he comes back onto the court and protests, and he is given an additional 2-minute suspension.","e":"A player has just been disqualified for spitting on an opponent. When leaving the court, he pushes a referee.","f":"A player has just been disqualified for a serious foul. After leaving the court, and after the match has been restarted, he insults the referees while sitting in the spectators’ area."},"correct":["a","b","c","d","e"],"rules":"16:9"},{"id":"16.22","chapter":"16","stem":"WHITE 5 receives a 2-minute suspension in minute 7. He complains before the game is restarted and receives an additional 2-minute suspension. Exactly one minute later, he runs onto the court, and the timekeeper whistles. Because of the additional suspension for entering the court, he is disqualified. Because of this he now insults the referees. Correct decision?","options":{"a":"WHITE team will be reduced by 1 player on the court from 07:00 to 08:00, by 2 players from 08:00 to 10:00 and by 1 player from 10:00 to 11:00.","b":"WHITE team will be reduced by 1 player on the court from 07:00 to 08:00, by 2 players from 08:00 to 11:00 and by 1 player from 11:00 to 12:00.","c":"WHITE team will be reduced by 2 players on the court from 07:00 to 08:00, by 3 players from 08:00 to 10:00 and by two players from 10:00 to 11:00.","d":"WHITE team will be reduced by 2 players on the court from 07:00 to 08:00, by 4 players from 08:00 to 10:00 and by 2 players from 10:00 to 11:00.","e":"Disqualification of WHITE 5, written report (red and blue cards shown by the referees)"},"correct":["b","e"],"rules":"8:10a, 16:3a, 16:6d, 16:9d"},{"id":"16.23","chapter":"16","stem":"Official C from WHITE team receives a warning in the first half because of unsportsmanlike conduct. The playing time is 35:50, and official B from WHITE team, with forceful gestures, shows that he disagrees with a decision of the referees. For this, he receives a 2-minute suspension. Three minutes before the end of the match, official A from WHITE team enters the court without permission from the referees. What is the correct decision?","options":{"a":"Warning for official A from WHITE team","b":"2-minute suspension for official A from WHITE team; WHITE team are reduced on the court by 1 player for 2 minutes; official A can stay in the substitution area","c":"2-minute suspension for official A from WHITE team; WHITE team are reduced on the court by 1 player for 2 minutes; official A must leave the substitution area","d":"Disqualification for official A from WHITE team (red card shown by the referees); WHITE team are reduced on the court by 1 player for 2 minutes","e":"Disqualification for official A from WHITE team with written report (red and blue cards shown by the referees); WHITE team are reduced on the court by 1 player for 2 minutes"},"correct":["d"],"rules":"16:6c"},{"id":"16.24","chapter":"16","stem":"BLACK 11 scores a goal. While shooting, he is pushed from the side by WHITE 10, so that he partially loses body control. The referees give a 2-minute suspension for WHITE 10. WHITE 10 leaves the court. The referees give the signal for the subsequent throw-off, and before the throw is executed, WHITE 9 enters the court as an additional player. The delegate whistles and the clock is stopped. The public clock shows 1 minute and 58 seconds left of the suspension for WHITE 10. What is the correct decision?","options":{"a":"2-minute suspension for WHITE 9.","b":"WHITE team is reduced by two players on the court for 2 minutes.","c":"For 1 minute and 58 seconds WHITE team is reduced by two players on the court. After 1 minute and 58 seconds the first suspension lapses and WHITE team is reduced by one player on the court for another 2 seconds.","d":"The game is restarted with a throw-off for WHITE team.","e":"The game is restarted with a free throw for BLACK team.","f":"Time-out."},"correct":["a","c","e","f"],"rules":"2:8, 4:4-6, 15:7, 16:3a"},{"id":"16.25","chapter":"16","stem":"WHITE team are in possession of the ball, and the ball is in play. Official B from WHITE team complains about a missing suspension for BLACK team. The delegate interrupts the game and official B is given a yellow card. Because of this punishment and before the game is restarted, he complains again, and the referees give him a 2-minute suspension. Official B then calls the referee an “idiot”. What is the correct decision?","options":{"a":"WHITE team is reduced by one player on the court for 4 minutes.","b":"WHITE team is reduced by two players on the court for 2 minutes.","c":"WHITE team is reduced by one player on the court for 2 minutes.","d":"Disqualification without written report for official B from WHITE team (red card shown by the referees).","e":"Disqualification with written report for official B from WHITE team (red and blue cards shown by the referees).","f":"Later in the match, it is possible to give a yellow card and/or a 2-minute suspension to another official from WHITE team.","g":"Yellow card, 2-minute suspension and disqualification noted in the match report.","h":"The match is restarted with a free throw for WHITE team","i":"The match is restarted with a free throw for BLACK team"},"correct":["c","e","f","i"],"rules":"8:7-10, 13:1a, 16:6, 16:8, 16:9"},{"id":"17.1","chapter":"17","stem":"The referees disagree on which team should have a throw-in. How should this be handled?","options":{"a":"The court referee decides.","b":"The goal-line referee decides.","c":"The two referees make a joint decision after consultation.","d":"Time-out","e":"No time-out, but throw-in executed after whistle signal"},"correct":["c","d"],"rules":"2:8d, 17:7"},{"id":"17.2","chapter":"17","stem":"The automatic final signal from the public clock is not working. The timekeeper has not noticed the problem and therefore does not react, even though the playing time has already ended. Who shall give the final signal in this case?","options":{"a":"Only the scorekeeper","b":"Only the court referee","c":"Only the delegate","d":"Only one of the referees","e":"Only the timekeeper","f":"Either the timekeeper, the delegate or one of the referees"},"correct":["f"],"rules":"2:3, 17:9"},{"id":"17.3","chapter":"17","stem":"BLACK 2 has committed an infraction. The court referee decides on a disqualification of BLACK 2 (red card shown by the referees) and a free throw. The goal referee decides on a 2-minute suspension for BLACK 2 and a 7-metre throw. How is BLACK 2 to be penalised, and how is the game to be continued?","options":{"a":"If no joint decision is reached, 2-minute suspension for BLACK 2","b":"If no joint decision is reached, disqualification of BLACK 2 (red card shown by the referees)","c":"If no joint decision is reached, free throw","d":"If no joint decision is reached, 7-metre throw","e":"The referees must try to reach a joint decision"},"correct":["b","d","e"],"rules":"17:6"},{"id":"17.4","chapter":"17","stem":"In case of doubt, who decides about the accuracy of the timekeeping?","options":{"a":"The timekeeper and the scorekeeper","b":"The two referees reach a joint decision.","c":"The timekeeper","d":"The two referees and the timekeeper reach a joint decision."},"correct":["b"],"rules":"17:9"},{"id":"17.5","chapter":"17","stem":"Which punishments need to be explained in the match report?","options":{"a":"All disqualifications, except for those given because of three 2-minute suspensions","b":"All punishments, except cautions","c":"All suspensions and all disqualifications","d":"Disqualifications for dangerous fouls or seriously unsportsmanlike conduct in the last 30 seconds of the match, if the action is intended to prevent the opponents from creating a scoring chance","e":"Disqualification due to extremely unsportsmanlike conduct","f":"Any progressive punishment during the last 30 seconds of the game, if the action is intended to prevent the opponents from creating a scoring chance"},"correct":["e"],"rules":"8:5, 8:10a-b, 16:6, 17:10"},{"id":"17.6","chapter":"17","stem":"Who is entitled to address the referees during a game?","options":{"a":"Every player","b":"Every official","c":"The responsible team official","d":"The team captain"},"correct":["c"],"rules":"4:2, 17:11"},{"id":"17.7","chapter":"17","stem":"The referees have different opinions about how much playing time remains. The goal-line referee (first mentioned referee) believes that 50 seconds remain, while the court referee believes that 42 seconds remain. Correct decision?","options":{"a":"The longer playing time applies (50 seconds).","b":"The first mentioned referee decides (50 seconds).","c":"The court referee decides (42 seconds).","d":"The two referees must reach a joint decision."},"correct":["d"],"rules":"17:9"},{"id":"17.8","chapter":"17","stem":"At the start of a match, which referee becomes the court referee, and which referee becomes the goal-line referee?","options":{"a":"The first mentioned referee becomes the court referee.","b":"The first mentioned referee becomes the goal-line referee.","c":"The referees use a coin toss to decide, who starts where.","d":"The referees are free to make their own choice."},"correct":["d"],"rules":"17:1"},{"id":"17.9","chapter":"17","stem":"The two referees whistle after a collision between two players. The court referee shows offensive foul, but the goal-line referee indicates a violation by the defender. How should this be decided?","options":{"a":"The decision of the goal-line referee is valid.","b":"The decision of the court referee is valid.","c":"The referees contact each other to reach a joint decision.","d":"Time-out is obligatory","e":"Time-out only necessary if the joint decision goes against the attacking team","f":"Time-out not obligatory, if the referees are using electronic equipment for their internal communication"},"correct":["c","d"],"rules":"17:7"},{"id":"18.1","chapter":"18","stem":"What do the Rules of the Game prescribe regarding the work distribution between timekeeper and scorekeeper?","options":{"a":"The control of the entry and exit of the substitutes is handled only by the timekeeper.","b":"Generally, only the timekeeper should interrupt the game, when this becomes necessary.","c":"The scorekeeper must whistle, if he observes that a substitute enters the court too soon.","d":"If there is no public clock, the timekeeper keeps the teams informed about how much time has been played or how much time remains.","e":"Counting the number of attacks when a player is serving 3 attacks after receiving medical care on the court is a shared task for the timekeeper and scorekeeper."},"correct":["b","d","e"],"rules":"18:1, 18:2"},{"id":"18.2","chapter":"18","stem":"WHITE 5 has a clear chance of scoring. Team official A from WHITE team insults the timekeeper. The timekeeper whistles just when WHITE 5 is about to shoot. The action has been noticed only by the timekeeper. Correct decision?","options":{"a":"Free throw for BLACK team","b":"Punishment against team official A from WHITE team","c":"Free throw for WHITE team","d":"7-metre throw for WHITE team","e":"Written report"},"correct":["c","e"],"rules":"Clarification 7"},{"id":"18.3","chapter":"18","stem":"The responsible team official from WHITE team insults the scorekeeper, without this being noticed by the referees or a delegate. During the next interruption of the game, the scorekeeper informs the referees about what has happened. Correct decision?","options":{"a":"Disqualification of the responsible team official from WHITE team, written report (red and blue cards shown by the referees)","b":"2-minute suspension for the responsible team official of WHITE team","c":"Written report","d":"Warning for the responsible team official from WHITE team","e":"No personal punishment possible"},"correct":["c","e"],"rules":"18:1, Clarification 7B"},{"id":"18.4","chapter":"18","stem":"WHITE team is in possession of the ball at the free-throw line of BLACK team. The technical delegate interrupts the game and explains to the referees that official A from BLACK team has insulted him. Correct decision?","options":{"a":"Caution for official A from BLACK team, written report","b":"Disqualification of official A from BLACK team, written report (red and blue cards shown by the referees)","c":"The game is restarted with a free throw for WHITE team at the substitution area of BLACK team.","d":"The game is restarted with a free throw for WHITE team at the free-throw line of BLACK team."},"correct":["b","d"],"rules":"8:10a, 13:6, 16:6b, Clarification 7B, Substitution Area Regulations 5"},{"id":"18.5","chapter":"18","stem":"WHITE team is in possession of the ball at the free-throw line of BLACK team. The timekeeper interrupts the game and explains to the referees that official A from WHITE team has insulted him. The action has been noticed only by the timekeeper. Correct decision?","options":{"a":"Written report","b":"2-minute suspension for official A from WHITE team, written report","c":"The game is restarted with a free throw for BLACK team at the substitution area of WHITE team.","d":"The game is restarted with a free throw for WHITE team at the free-throw line of BLACK team."},"correct":["a","d"],"rules":"13:4a, Clarification 7B"},{"id":"18.6","chapter":"18","stem":"During the match, official A from WHITE team repeatedly moves to the timekeeper’s desk to coach right next to it. While doing so he protests over referee decisions. Due to the noise in the playing hall, the referees do not notice this. Correct decision?","options":{"a":"The timekeeper immediately interrupts the game and informs the referees about official A’s misbehaviour.","b":"The timekeeper waits until the next interruption of the game and informs the referees about official A’s misbehaviour.","c":"Progressive punishment for official A from WHITE team","d":"No punishment possible"},"correct":["b","d"],"rules":"Clarification 7B, Substitution Area Regulations 5"},{"id":"18.7","chapter":"18","stem":"When should the timekeeper/scorekeeper inform the referees about a violation of the Substitution Area Regulations that has not been noticed by the referees?","options":{"a":"Immediately","b":"At the time of the next interruption of the game"},"correct":["b"],"rules":"Clarification 7B"},{"id":"18.8","chapter":"18","stem":"If the technical delegate interrupts the game because of a violation by WHITE team when the ball is in play, the game is restarted with ball possession by BLACK team. Correct?","options":{"a":"Yes","b":"No Substitution Area Regulation"},"correct":["a"],"rules":"Clarification 7B"},{"id":"SAR1","chapter":"SAR","stem":"What should be the distance between the centre line and the start of the substitution benches?","options":{"a":"1 metre","b":"2 metres","c":"3 metres","d":"3.5 metres"},"correct":["d"],"rules":"Substitution Area Regulations 1"},{"id":"SAR2","chapter":"SAR","stem":"Official A from WHITE team has already received a warning while sitting on the bench. He now leaves the substitution area and sits in the spectators’ area. From this position, he continues to protest over the referees’ decisions. Correct decision?","options":{"a":"No action possible","b":"2-minute suspension for official A from WHITE team","c":"Disqualification of official A from WHITE team (red card shown by the referees)","d":"Disqualification of official A from WHITE team, written report (red and blue cards shown by the referees)","e":"WHITE team will be reduced by 1 player on the court for 2 minutes."},"correct":["b","e"],"rules":"8:7a, 16:3e, Substitution Area Regulations 5+6"}]</script>

<script>
const {

const QUIZ = JSON.parse(document.getElementById('quizdata').textContent);
const TOTAL = QUIZ.length;

const CHAPTERS = [...new Set(QUIZ.map(q => q.chapter))];
// מציאת השאלה הראשונה שטרם נענתה, מעגלית, החל מ-fromIdx (כולל)
function snapUnanswered(fromIdx, answered) {
  for (let s = 0; s < TOTAL; s++) {
    const j = (fromIdx + s) % TOTAL;
    if (!answered.has(QUIZ[j].id)) return j;
  }
  return -1;
}
// מציאת השאלה הבאה שטרם נענתה, מעגלית, אחרי fromIdx
function nextUnanswered(fromIdx, answered) {
  for (let s = 1; s <= TOTAL; s++) {
    const j = (fromIdx + s) % TOTAL;
    if (!answered.has(QUIZ[j].id)) return j;
  }
  return -1;
}

/* ---------- helpers ---------- */
const eqSet = (a, b) => {
  if (a.length !== b.length) return false;
  const s = new Set(a);
  return b.every(x => s.has(x));
};
const letters = q => Object.keys(q.options);
const fmtClock = s => {
  s = Math.max(0, s);
  const m = Math.floor(s / 60),
    ss = s % 60;
  return `${String(m).padStart(2, '0')}:${String(ss).padStart(2, '0')}`;
};
const shuffle = arr => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};
const chapterLabel = q => q.chapter === 'SAR' ? 'Substitution Area' : `חוק ${q.chapter}`;
async function resetLearning(sb) {
  const u = (await sb.auth.getUser()).data.user.id;
  await sb.from('learning_progress').update({
    current_index: 0,
    correct_count: 0,
    wrong_count: 0,
    updated_at: new Date().toISOString()
  }).eq('user_id', u);
  await sb.from('learning_answers').delete().eq('user_id', u);
}
const pad2 = n => String(n).padStart(2, '0');
const fmtDate = d => `${pad2(d.getDate())}/${pad2(d.getMonth() + 1)}/${d.getFullYear()}`;
const fmtTime = d => `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
const fmtDateTime = d => `${fmtDate(d)} ${fmtTime(d)}`;
const relUnit = (n, sing, plur) => n === 1 ? sing : `${n} ${plur}`;
function timeAgo(ms) {
  const diff = Math.max(0, Date.now() - ms);
  const MIN = 60000,
    HOUR = 3600000,
    DAY = 86400000,
    WEEK = 7 * DAY,
    MONTH = 30 * DAY,
    YEAR = 365 * DAY;
  const join = (a, b) => {
    if (!b) return `לפני ${a}`;
    return `לפני ${a}${/^\d/.test(b) ? ' ו-' : ' ו'}${b}`;
  };
  if (diff < HOUR) return join(relUnit(Math.max(1, Math.floor(diff / MIN)), 'דקה', 'דקות'), '');
  if (diff < DAY) return join(relUnit(Math.floor(diff / HOUR), 'שעה', 'שעות'), '');
  if (diff < WEEK) return join(relUnit(Math.floor(diff / DAY), 'יום', 'ימים'), '');
  if (diff < MONTH) {
    const w = Math.floor(diff / WEEK),
      d = Math.floor(diff % WEEK / DAY);
