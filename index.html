<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#14233B" />
<title>מבחן חוקת הכדוריד - למידה</title>
<!-- ===== סמליל / אייקון ===== -->
<link rel="icon" type="image/png" href="icon.png" />
<link rel="apple-touch-icon" href="icon.png" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="חוקת הכדוריד" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --court:#eef1f5; --court-line:#dde2ea; --surface:#ffffff; --surface-2:#f7f9fb;
  --ink:#14233b; --ink-soft:#5a6b82; --ink-faint:#90a0b5;
  --goal:#ec5a37; --goal-deep:#c8401f; --goal-tint:#fdeee9;
  --teal:#0e7c86; --teal-tint:#e3f1f1;
  --correct:#1f9d5b; --correct-tint:#e6f5ec;
  --wrong:#d63a3a; --wrong-tint:#fbe9e9;
  --gold:#c8a14a;
  --line:#e4e8ef; --shadow:0 1px 2px rgba(20,35,59,.06),0 8px 24px rgba(20,35,59,.07);
  --shadow-lg:0 12px 40px rgba(20,35,59,.16);
  --r:14px; --r-sm:10px; --maxw:760px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:"Rubik",system-ui,sans-serif; color:var(--ink);
  background:var(--court);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  line-height:1.5;
}
.ltr{direction:ltr; text-align:left; unicode-bidi:isolate}
.mono{font-family:"Space Mono",ui-monospace,monospace}
button{font-family:inherit; cursor:pointer}
:focus-visible{outline:3px solid var(--teal); outline-offset:2px; border-radius:6px}
input{font-family:inherit}

/* ---------- shell ---------- */
.app{min-height:100dvh; display:flex; flex-direction:column}
.wrap{width:100%; max-width:var(--maxw); margin:0 auto; padding:0 16px}
.topbar{
  position:sticky; top:0; z-index:30; background:rgba(238,241,245,.86);
  backdrop-filter:saturate(1.4) blur(10px); border-bottom:1px solid var(--line);
}
.topbar .row{display:flex; align-items:center; gap:12px; height:58px}
.brand{display:flex; align-items:center; gap:10px; font-weight:800; letter-spacing:-.01em; color:var(--ink); text-decoration:none}
.brand svg{flex:none}
.brand b{font-size:16px}
.brand span{font-size:11px; color:var(--ink-soft); font-weight:600; display:block; margin-top:-3px}
.spacer{flex:1}
.linkbtn{background:none; border:none; color:var(--ink-soft); font-weight:600; font-size:13px; padding:8px 10px; border-radius:8px}
.linkbtn:hover{background:var(--surface); color:var(--ink)}

/* ---------- buttons ---------- */
.btn{border:none; border-radius:var(--r-sm); font-weight:600; font-size:15px; padding:13px 20px; transition:transform .08s, box-shadow .15s, background .15s; line-height:1}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--goal); color:#fff; box-shadow:0 4px 14px rgba(236,90,55,.32)}
.btn-primary:hover{background:var(--goal-deep)}
.btn-primary:disabled{background:#cdd5e0; box-shadow:none; cursor:not-allowed; color:#fff}
.btn-ghost{background:var(--surface); color:var(--ink); border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--ink-faint)}
.btn-teal{background:var(--teal); color:#fff}
.btn-teal:hover{background:#0a656d}
.btn-block{display:block; width:100%; text-align:center}
.btn-lg{padding:16px 22px; font-size:16px}

/* ---------- cards ---------- */
.card{background:var(--surface); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow)}
.pad{padding:20px}
@media(min-width:520px){.pad{padding:26px}}

/* ---------- home ---------- */
.hero{padding:26px 0 6px}
.hero h1{font-size:27px; font-weight:800; letter-spacing:-.02em; margin:0 0 6px}
.hero p{margin:0; color:var(--ink-soft); font-size:14.5px}
.modegrid{display:grid; gap:14px; margin-top:18px}
@media(min-width:560px){.modegrid{grid-template-columns:1fr 1fr}}
.mode{position:relative; overflow:hidden; text-align:right; border:1px solid var(--line); background:var(--surface); border-radius:var(--r); padding:22px; transition:transform .12s, box-shadow .15s, border-color .15s; box-shadow:var(--shadow); width:100%; display:block}
.mode:hover{transform:translateY(-2px); box-shadow:var(--shadow-lg); border-color:transparent}
.mode .arc{position:absolute; inset-inline-start:-40px; bottom:-46px; opacity:.10}
.mode .tag{font-family:"Space Mono"; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--goal); font-weight:700}
.mode.teal .tag{color:var(--teal)}
.mode h3{margin:8px 0 4px; font-size:20px; font-weight:700; letter-spacing:-.01em}
.mode p{margin:0; color:var(--ink-soft); font-size:13.5px; max-width:90%}
.mode .go{margin-top:16px; display:inline-flex; align-items:center; gap:6px; font-weight:700; font-size:14px; color:var(--ink)}
.statbar{display:flex; gap:10px; margin-top:16px; flex-wrap:wrap}
.chipstat{background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:8px 14px; font-size:13px; font-weight:600; color:var(--ink-soft); display:flex; align-items:center; gap:7px}
.chipstat b{color:var(--ink); font-family:"Space Mono"}

/* ---------- progress (learning) ---------- */
.lhead{position:sticky; top:58px; z-index:20; background:var(--court); padding:14px 0 12px; border-bottom:1px solid var(--line)}
.ptrack{position:relative; height:8px; background:var(--court-line); border-radius:99px; overflow:hidden}
.pfill{position:absolute; inset-block:0; inset-inline-start:0; background:linear-gradient(90deg,var(--teal),var(--goal)); border-radius:99px; transition:width .4s cubic-bezier(.2,.7,.2,1)}
.pmeta{display:flex; align-items:center; justify-content:space-between; margin-top:10px; gap:10px; flex-wrap:wrap}
.pmeta .pct{font-family:"Space Mono"; font-weight:700; font-size:15px}
.counters{display:flex; gap:8px}
.cnt{display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; padding:5px 11px; border-radius:99px}
.cnt.ok{background:var(--correct-tint); color:var(--correct)}
.cnt.no{background:var(--wrong-tint); color:var(--wrong)}
.cnt b{font-family:"Space Mono"}
.streakbar{margin-bottom:16px}
.streakrow{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px; font-size:13px; font-weight:600; color:var(--ink-soft)}
.streakrow b{font-family:"Space Mono"; color:var(--ink); margin-inline-start:3px}
.streakbest{color:var(--goal)}
.streakbest b{color:var(--goal)}
.jumpbar{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:16px; padding-bottom:16px; border-bottom:1px solid var(--line); font-size:13px; font-weight:600; color:var(--ink-soft)}
.jsel,.jnum{font-family:inherit; font-size:13px; padding:6px 8px; border:1px solid var(--line); border-radius:8px; background:var(--surface); color:var(--ink)}
.jnum{width:74px}
.jdot{font-weight:800}
.jbtn{padding:6px 14px; font-size:13px}
.jerr{color:var(--wrong); font-size:12px; width:100%}

/* ---------- question ---------- */
.qmeta{display:flex; align-items:center; gap:10px; margin-bottom:14px}
.qid{font-family:"Space Mono"; font-weight:700; font-size:12px; background:var(--ink); color:#fff; padding:5px 10px; border-radius:7px; letter-spacing:.03em}
.qid.teal{background:var(--teal)}
.qchapter{font-size:12px; color:var(--ink-faint); font-weight:600}
.multi{font-size:11.5px; color:var(--goal); font-weight:700; background:var(--goal-tint); padding:4px 9px; border-radius:99px}
.stem{font-size:17px; line-height:1.55; font-weight:500; margin:0 0 18px}
.opts{display:flex; flex-direction:column; gap:10px}
.opt{display:flex; gap:12px; align-items:flex-start; text-align:left; width:100%; background:var(--surface-2); border:1.5px solid var(--line); border-radius:var(--r-sm); padding:13px 14px; transition:border-color .12s, background .12s; direction:ltr}
.opt:hover{border-color:var(--ink-faint)}
.opt .box{flex:none; width:26px; height:26px; border-radius:7px; border:1.5px solid var(--ink-faint); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:var(--ink-soft); background:#fff; transition:.12s; font-family:"Space Mono"}
.opt .otext{font-size:14.5px; line-height:1.45; padding-top:3px; color:var(--ink)}
.opt.sel{border-color:var(--teal); background:var(--teal-tint)}
.opt.sel .box{background:var(--teal); border-color:var(--teal); color:#fff}
.opt[disabled]{cursor:default}
/* graded states */
.opt.correct{border-color:var(--correct); background:var(--correct-tint)}
.opt.correct .box{background:var(--correct); border-color:var(--correct); color:#fff}
.opt.misscorrect{border-color:var(--correct); background:transparent; border-style:dashed}
.opt.misscorrect .box{border-color:var(--correct); color:var(--correct)}
.opt.wrongsel{border-color:var(--wrong); background:var(--wrong-tint)}
.opt.wrongsel .box{background:var(--wrong); border-color:var(--wrong); color:#fff}
.qfoot{margin-top:20px; display:flex; gap:10px; align-items:center}

/* ---------- rules reveal ---------- */
.rules{margin-top:18px; border-radius:var(--r-sm); border:1px solid var(--goal); background:var(--goal-tint); padding:15px 16px; animation:rise .25s ease}
.rules .lbl{font-family:"Space Mono"; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--goal-deep); font-weight:700; margin-bottom:7px; display:flex; align-items:center; gap:7px}
.rules .ref{direction:ltr; text-align:left; font-size:15px; font-weight:600; color:var(--ink); line-height:1.5}
.verdict{display:flex; align-items:center; gap:10px; font-weight:700; font-size:15px; margin-top:16px}
.verdict.no{color:var(--wrong)}
@keyframes rise{from{opacity:0; transform:translateY(8px)}to{opacity:1; transform:none}}

/* ---------- correct flash overlay ---------- */
.flash{position:fixed; inset:0; z-index:80; display:flex; align-items:center; justify-content:center; background:rgba(31,157,91,.10); backdrop-filter:blur(2px)}
.flash .badge{width:120px; height:120px; border-radius:50%; background:var(--correct); display:flex; align-items:center; justify-content:center; box-shadow:0 16px 50px rgba(31,157,91,.45); animation:pop .3s cubic-bezier(.2,1.4,.4,1)}
.flash .hint{position:absolute; bottom:22%; font-size:13px; color:var(--correct); font-weight:600}
.modalbg{position:fixed; inset:0; z-index:90; display:flex; align-items:center; justify-content:center; background:rgba(20,35,59,.45); backdrop-filter:blur(2px); padding:16px}
@keyframes pop{0%{transform:scale(.4); opacity:0}60%{transform:scale(1.06)}100%{transform:scale(1); opacity:1}}

/* ---------- exam ---------- */
.examtop{position:sticky; top:58px; z-index:20; background:var(--court); padding:12px 0; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:12px}
.clock{font-family:"Space Mono"; font-weight:700; font-size:24px; letter-spacing:.04em; padding:6px 14px; border-radius:10px; background:var(--ink); color:#fff; display:flex; align-items:center; gap:8px}
.clock.warn{background:var(--goal); animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.7}}
.examnav{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--ink-soft); font-weight:600}
.examnav .mono{font-size:14px; color:var(--ink); font-weight:700}
.palette{display:grid; grid-template-columns:repeat(auto-fill,minmax(38px,1fr)); gap:7px; margin-top:16px}
.pcell{aspect-ratio:1; border-radius:8px; border:1.5px solid var(--line); background:var(--surface); font-family:"Space Mono"; font-weight:700; font-size:13px; color:var(--ink-soft); display:flex; align-items:center; justify-content:center}
.pcell.answered{background:var(--teal); border-color:var(--teal); color:#fff}
.pcell.current{outline:3px solid var(--goal); outline-offset:1px; color:var(--ink)}
.pcell.answered.current{color:#fff}
.navrow{display:flex; gap:10px; margin-top:20px}
.navrow .btn{flex:1}

/* ---------- results ---------- */
.score{text-align:center; padding:30px 20px}
.score .ring{margin:0 auto 14px}
.score .big{font-family:"Space Mono"; font-size:48px; font-weight:700; line-height:1; letter-spacing:-.02em}
.score .lbl{color:var(--ink-soft); font-size:14px; font-weight:600; margin-top:8px}
.score .sub{margin-top:6px; font-size:13px; color:var(--ink-faint); font-family:"Space Mono"}
.rev{margin-top:18px; display:flex; flex-direction:column; gap:14px}
.revq{border-inline-start:4px solid var(--line); padding-inline-start:14px}
.revq.ok{border-color:var(--correct)}
.revq.no{border-color:var(--wrong)}
.revtag{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; padding:3px 9px; border-radius:99px; margin-bottom:8px}
.revtag.ok{background:var(--correct-tint); color:var(--correct)}
.revtag.no{background:var(--wrong-tint); color:var(--wrong)}

/* ---------- history ---------- */
.hrow{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 16px; border:1px solid var(--line); border-radius:var(--r-sm); background:var(--surface); text-align:right; width:100%; transition:.12s}
.hrow:hover{border-color:var(--ink-faint)}
.hrow .hscore{font-family:"Space Mono"; font-weight:700; font-size:17px}
.hrow .hmeta{font-size:12.5px; color:var(--ink-soft); margin-top:2px}
.hrow .pctpill{font-family:"Space Mono"; font-weight:700; font-size:13px; padding:6px 11px; border-radius:99px}

/* ---------- auth / setup ---------- */
.centerpage{min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:24px}
.authcard{width:100%; max-width:420px}
.field{margin-bottom:14px}
.field label{display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:var(--ink-soft)}
.field input{width:100%; padding:12px 14px; border:1.5px solid var(--line); border-radius:var(--r-sm); font-size:15px; background:var(--surface-2)}
.field input:focus{border-color:var(--teal); background:#fff; outline:none}
.err{background:var(--wrong-tint); color:var(--wrong); padding:10px 13px; border-radius:var(--r-sm); font-size:13.5px; font-weight:500; margin-bottom:14px}
.ok-msg{background:var(--correct-tint); color:var(--correct); padding:10px 13px; border-radius:var(--r-sm); font-size:13.5px; font-weight:500; margin-bottom:14px}
.switch{text-align:center; margin-top:16px; font-size:13.5px; color:var(--ink-soft)}
.switch button{background:none; border:none; color:var(--teal); font-weight:700; font-size:13.5px}
.muted{color:var(--ink-soft); font-size:13px; line-height:1.6}
.steps{font-size:13.5px; color:var(--ink-soft); line-height:1.7; padding-inline-start:18px; margin:10px 0}
.steps code{background:var(--surface-2); padding:1px 6px; border-radius:5px; font-family:"Space Mono"; font-size:12px; color:var(--goal-deep)}

.numgrid{display:grid; grid-template-columns:1fr 1fr; gap:14px}
.empty{text-align:center; padding:40px 20px; color:var(--ink-soft)}
.empty svg{opacity:.5; margin-bottom:12px}
.footnote{text-align:center; color:var(--ink-faint); font-size:12px; padding:24px 0 30px}
.spin{width:30px;height:30px;border:3px solid var(--court-line);border-top-color:var(--goal);border-radius:50%;animation:sp .7s linear infinite;margin:30px auto}
@keyframes sp{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion: reduce){*{animation-duration:.01ms!important; transition-duration:.01ms!important}}
</style>
</head>
<body>
<div id="root"></div>

<script id="quizdata" type="application/json">[{"id":"1.1","chapter":"1","stem":"What are the measurements of the playing court according to the rules?","options":{"a":"40 x 20 metres","b":"42 x 20 metres","c":"38 x 18 metres","d":"Length between 38 and 42, width between 18 and 22 metres"},"correct":["a"],"rules":"1:1"},{"id":"1.2","chapter":"1","stem":"What are the required interior measurements of the goal?","options":{"a":"1.92 x 2.92 metres","b":"2.00 x 3.00 metres","c":"2.05 x 3.05 metres","d":"2.08 x 3.08 metres"},"correct":["b"],"rules":"1:2"},{"id":"1.3","chapter":"1","stem":"How wide is the goal line between the posts?","options":{"a":"5cm","b":"6cm","c":"8cm","d":"10cm"},"correct":["c"],"rules":"1:3"},{"id":"1.4","chapter":"1","stem":"Which statements are correct about the throw-off area?","options":{"a":"It consists of a circle with a diameter of 3 metres.","b":"It consists of a circle with a diameter of 4 metres.","c":"The throw-off area can be an area with a different colour than the playing court","d":"The throw-off area can be a circle line.","e":"The throw-off area is mandatory for all events in handball."},"correct":["b","c","d"],"rules":"1:9"},{"id":"2.1","chapter":"2","stem":"Goalkeeper WHITE 1 deflects a shot, and the ball crosses the outer goal line straight before the automatic final signal from the public clock. The referees realise that the match has ended five minutes early. As the players are still on the court, the game is resumed by:","options":{"a":"Goalkeeper throw for WHITE team","b":"Free throw for WHITE team","c":"Without whistle signal","d":"After whistle signal"},"correct":["a","d"],"rules":"2:7, 12:1, 15:5b"},{"id":"2.2","chapter":"2","stem":"After the automatic final signal from the public clock sounds for half-time, the referee immediately realises that the first half ended 1 minute too early. Correct decision?","options":{"a":"Prolong the second half by 1 minute","b":"The 1 minute is lost and not made up for.","c":"After the half-time, first play 1 minute on the same sides as in the first half, then change ends and begin second half normally","d":"Keep players on the court and have them play the remaining minute"},"correct":["d"],"rules":"2:7"},{"id":"2.3","chapter":"2","stem":"WHITE 11 takes a shot on goal. Goalkeeper BLACK 1 catches the ball – just when the final signal from the public clock sounds. The referees point out to the timekeeper that 30 seconds remain in the second half of the game. All the players are still on the playing court. How should the game be restarted?","options":{"a":"Free throw for BLACK team","b":"Goalkeeper throw for BLACK team","c":"Free throw for WHITE team","d":"After whistle signal","e":"Without whistle signal"},"correct":["b","d"],"rules":"2:7, 12:1, 15:5b"},{"id":"2.4","chapter":"2","stem":"WHITE team is going to execute a free throw after the final whistle. First WHITE 3 and then WHITE 4 leave the court to be replaced by first WHITE 5 and then WHITE 6, who enter the court. Which of the following statements are correct?","options":{"a":"The timekeeper whistles and indicates a faulty substitution of WHITE team.","b":"2-minute suspension for WHITE 4 because of a faulty substitution","c":"2-minute suspension for WHITE 6 because of a faulty substitution","d":"There is no reason for the timekeeper to whistle.","e":"Free throw for WHITE team","f":"Free throw for BLACK team"},"correct":["a","c","e"],"rules":"2:5, 4:5, 16:3a"},{"id":"2.5","chapter":"2","stem":"A free throw for BLACK team is taken as a direct shot on goal just before the end of the match. The automatic final signal from the public clock sounds just before the ball enters the goal. Correct decision?","options":{"a":"End of the match","b":"The free throw for BLACK team must be retaken without whistle signal.","c":"The free throw for BLACK team must be retaken with whistle signal.","d":"7-metre throw for BLACK team"},"correct":["c"],"rules":"2:4, 15:5"},{"id":"2.6","chapter":"2","stem":"Shortly before the end of the match BLACK 2 receives the ball at the goal-area line of WHITE team and has a clear chance of scoring. He tries to score but is prevented by a foul. Before the ball leaves the hand of BLACK 2, the automatic final signal from the public clock sounds. Correct decision?","options":{"a":"End of the match","b":"Free throw for BLACK team","c":"7-metre throw for BLACK team","d":"End of the match, note in the match report"},"correct":["c"],"rules":"2:4, 14:1a"},{"id":"2.7","chapter":"2","stem":"Shortly before the end of the first half, a 7-metre throw for WHITE team has not yet been executed. The 7-metre throw of WHITE 9 hits the crossbar, then the back of the goalkeeper, who is standing approximately 3 metres in front of his goal, and then the ball enters the goal. The automatic final signal from the public clock sounds, when the ball is flying from the crossbar to the goalkeeper’s back. Correct decision?","options":{"a":"Goal","b":"7-metre throw is to be retaken","c":"Half-time break; no further decision"},"correct":["b"],"rules":"2:4"},{"id":"2.8","chapter":"2","stem":"After the end of the playing time, a 7-metre throw is still to be executed. The referees wait for the immediate result of the throw. Which referee should then end the game?","options":{"a":"The first named referee","b":"One of the two referees","c":"The court referee","d":"The goal-line referee"},"correct":["b"],"rules":"2:4"},{"id":"2.9","chapter":"2","stem":"When does the match begin?","options":{"a":"When the first named referee whistles","b":"When the ball leaves the thrower’s hand","c":"When the timekeeper starts the stopwatch or the public clock","d":"After the whistle for the throw-off is blown by the court referee"},"correct":["d"],"rules":"2:3"},{"id":"2.10","chapter":"2","stem":"For a 7-metre throwing, who decides which goal should be used?","options":{"a":"The team that wins the coin toss","b":"The team that loses the coin toss","c":"The referees","d":"The first named referee"},"correct":["c"],"rules":"2:2, comments"},{"id":"2.11","chapter":"2","stem":"A free throw for BLACK team is to be executed after the final signal. Before the execution of the free throw, WHITE 8 and WHITE 9 leave the court at the same time. They are replaced first by WHITE 10 and immediately afterwards by WHITE 11. Which of the following statements are correct?","options":{"a":"The timekeeper whistles and indicates to the referees that there has been a faulty substitution by WHITE team","b":"2-minute suspension for WHITE 10 due to faulty substitution","c":"2-minute suspension for WHITE 11 due to faulty substitution","d":"The timekeeper must not whistle, as there is no rule violation.","e":"WHITE 11 must return to the substitution area; either WHITE 8 or WHITE 9 may re-enter the court"},"correct":["a","b","e"],"rules":"2:5, 4:5, 16:3a"},{"id":"2.12","chapter":"2","stem":"Just before the end of the first half, WHITE 7 assaults BLACK 5 and destroys a clear chance of scoring. The automatic final signal sounds before the referees have time to whistle. Correct decision?","options":{"a":"The first half is over; no progressive punishment against WHITE 7","b":"The first half is over; no free throw or 7-metre throw is possible","c":"Disqualification of WHITE 7, written report (red and blue cards shown by the referees)","d":"7-metre throw for BLACK team","e":"Disqualification of WHITE 7 (red card shown by the referees)"},"correct":["c","d"],"rules":"2:4, 8:10a, 14:1a, 16:6b"},{"id":"2.13","chapter":"2","stem":"Up until when can the referees disallow a goal which has been awarded?","options":{"a":"Up until the whistle for the throw-off","b":"Up until the final whistle","c":"It must be disallowed if it was scored after the timekeeper interrupted the game or if the throw-off was taken before the interruption was noticed.","d":"It can never be disallowed."},"correct":["a","c"],"rules":"2:9 comment, 9:2"},{"id":"2.14","chapter":"2","stem":"The referees have just awarded a throw-in for WHITE team. At the same time the responsible team official from WHITE team requests a team time-out. Which of the following statements are correct?","options":{"a":"Team time-out is not possible, as the ball is out of play","b":"The timekeeper whistles, stops the clock and shows hand signal number 15.","c":"The referees confirm the team time-out for WHITE team.","d":"The scorekeeper enters the team time-out in the score sheet."},"correct":["b","c","d"],"rules":"2:9, Clarification 3"},{"id":"2.15","chapter":"2","stem":"In which of the following situations is a time-out obligatory?","options":{"a":"7-metre throw","b":"2-minute suspension","c":"External influence","d":"Disqualification"},"correct":["b","d"],"rules":"2:8, Clarification 2"},{"id":"2.16","chapter":"2","stem":"WHITE 9 shoots on goal. Goalkeeper BLACK 12 catches the ball. At the same time the timekeeper whistles to end the game. The referees point out to the timekeeper that there is 30 seconds left of the second half. All the players have remained on the court. How should the game be restarted?","options":{"a":"Free throw for BLACK team","b":"Goalkeeper throw for BLACK team","c":"Free throw for WHITE team","d":"After whistle signal"},"correct":["b","d"],"rules":"2:7, 15:5b"},{"id":"2.17","chapter":"2","stem":"After the regular playing time has ended with the result 20:20, the game must be continued until a winner has been determined. Correct decision?","options":{"a":"One-minute break before overtime starts","b":"Five-minute break before overtime starts","c":"One-minute break at the end of the first half of overtime","d":"Five-minute break at the end of the first half of overtime"},"correct":["b","c"],"rules":"2:2"},{"id":"2.18","chapter":"2","stem":"In which of the following situations is a time-out obligatory?","options":{"a":"2-minute suspension","b":"Free throw","c":"Passive play","d":"Faulty substitution","e":"Warning","f":"Throw-in"},"correct":["a","d"],"rules":"2:8, 4:5"},{"id":"2.19","chapter":"2","stem":"Who is not allowed to participate in the 7-metre throwing, when a game is still tied after overtime?","options":{"a":"A player who insults the referees just after overtime has finished","b":"The goalkeepers","c":"A player whose 2-minute suspension had not expired at the end of overtime","d":"A disqualified player","e":"A player, who has received medical care on the court and has not yet served 3 attacks from his team"},"correct":["a","c","d"],"rules":"2:2 comment, 4:11, 16:5, 16:6b, 16:10"},{"id":"2.20","chapter":"2","stem":"Five seconds before the end of the game, goalkeeper WHITE 12 stops a shot. The ball hits the ceiling above the goal area. The automatic final signal sounds immediately before the throw-in is executed by BLACK team. Correct decision?","options":{"a":"Throw-in for BLACK team after whistle signal","b":"Time-out","c":"The game is over.","d":"Wait for the result of the throw-in, thereafter the game is over"},"correct":["c"],"rules":"2:3, 2:4, 11:1"},{"id":"2.21","chapter":"2","stem":"BLACK 8 has already received a warning. During a team time-out he sits on the bench and comments on the referees in an unsportsmanlike manner. Correct decision?","options":{"a":"Disqualification of BLACK 8 (red card shown by the referees)","b":"2-minute suspension for BLACK 8","c":"Warning for BLACK 8","d":"No action possible","e":"BLACK team will be reduced by 1 player on the court for 2minutes from the restart of the match after the team time-out."},"correct":["b","e"],"rules":"2:8, 8:7a, 16:3d"},{"id":"2.22","chapter":"2","stem":"Who is entitled to participate in a tie-breaker through 7-metre throws?","options":{"a":"All players who are included in the score sheet","b":"Players who have not received a disqualification","c":"Players who were not serving a 2-minute suspension when overtime expired","d":"Players who have received permission from the referees"},"correct":["b","c"],"rules":"2:2 comment, 16:5"},{"id":"2.23","chapter":"2","stem":"A free throw has still to be executed after the automatic final signal from the public clock. BLACK 9 takes up a correct position and shoots on the goal of WHITE team. When the ball leaves the hand of BLACK 9, there is a whistle signal from the timekeeper. The ball goes into the goal, as goalkeeper WHITE 1 had no chance. The timekeeper informs the referees that WHITE 7, who was on the court in defence during the free throw, had entered the court to substitute WHITE 6, just before the free throw was executed. Correct decision?","options":{"a":"2-minute suspension for WHITE 7","b":"Disqualification of WHITE 7 (red card shown by the referees)","c":"Goal for BLACK team","d":"7-metre throw for BLACK team","e":"Repetition of the free throw for BLACK team after whistle signal"},"correct":["a","e"],"rules":"2:4, 2:5, 2:9 comment, 4:5, 9:1, paragraph 3"},{"id":"2.24","chapter":"2","stem":"The game is still tied after overtime, and the regulations require a decision through 7-metre throws. WHITE 7 was given a 2-minute suspension after nine minutes in the last overtime period. He is nominated by the responsible team official to participate in the 7-metre throwing. Correct decision?","options":{"a":"WHITE 7 is allowed to participate.","b":"WHITE 7 is not allowed to participate."},"correct":["b"],"rules":"2:2 comment, 16:3d"},{"id":"2.25","chapter":"2","stem":"When is a time-out mandatory?","options":{"a":"When a team official has been given a 2-minute suspension","b":"When a player has been given a third 2-minute suspension","c":"After repeated unsportsmanlike conduct","d":"When the referees are required to consult each other to reach a joint decision","e":"After a seriously unsportsmanlike conduct","f":"After a yellow card shown to a team official"},"correct":["a","b","c","d","e"],"rules":"2:8"},{"id":"2.26","chapter":"2","stem":"Just before the end of the first half, WHITE 7 commits an assault against BLACK 5, who thus misses a clear chance of scoring. The automatic signal from the public clock sounds before the referees have time to whistle. Correct decision?","options":{"a":"The first half is over; no further action","b":"Disqualification of WHITE 7 without written report (red card shown by the referees)","c":"7-metre throw for BLACK team","d":"Free throw for BLACK team","e":"Disqualification of WHITE 7, written report (red and blue cards shown by the referees)","f":"WHITE team will be reduced by 1 player on the court for 2 minutes from the beginning of the second half."},"correct":["c","e","f"],"rules":"2:4, 8:6, 14:1a, 16:6a"},{"id":"2.27","chapter":"2","stem":"After the whistle signal for half-time, a free throw must still be executed. Which players can still be substituted?","options":{"a":"All players of both teams","b":"Only players of the defending team","c":"Only players of the attacking team","d":"1 player from the attacking team","e":"A court player from the defending team with a goalkeeper, if the team at the time of the final whistle play without goalkeeper"},"correct":["d","e"],"rules":"2:5"},{"id":"2.28","chapter":"2","stem":"Which positions must the players assume during the execution of a free throw after the final whistle?","options":{"a":"All teammates of the thrower must be outside the free-throw line of the opponents.","b":"All teammates of the thrower must be in their own half of the court.","c":"The opponents must be 3 metres away from the thrower or at their own goal-area line.","d":"All teammates of the thrower must be at least 3 metres away from the thrower.","e":"All teammates of the thrower may stay together with the thrower at the free-throw line of the opponents."},"correct":["a","c","d"],"rules":"2:5, 13:8"},{"id":"2.29","chapter":"2","stem":"WHITE 7 passes the ball to WHITE 8. At this moment, the timekeeper whistles for a team time- out for WHITE team. The referees and players do not hear this signal, and WHITE 8 passes the ball to WHITE 10, who has a clear chance of scoring. WHITE 10 is illegitimately stopped by BLACK 5. The referees give a 7-metre throw for WHITE team and a 2-minute suspension for BLACK 5. Now, first the referees perceive that the timekeeper has already whistled because of the team time-out request. Correct decision?","options":{"a":"7-metre throw for WHITE team","b":"2-minute suspension for BLACK 5","c":"Team time-out for WHITE team","d":"Goalkeeper throw for BLACK team","e":"Whistle signal for restart","f":"Restart with a free throw for WHITE team at the position of WHITE 7 at the time of the whistle from the timekeeper"},"correct":["b","c","e","f"],"rules":"2:9, 2:9 comment, 13:4a, 15:5b, Clarification 3, paragraph 10"},{"id":"2.30","chapter":"2","stem":"The whistle signal ending the first half has come 1 minute too soon. At the time of the whistle signal, neither of the teams were in possession of the ball, and there was no violation of any rule. The ball was on the floor in the playing area. Both teams are still on the court. Correct decision?","options":{"a":"The 1 minute is not played.","b":"The 1 minute is played before the half-time break.","c":"The 1 minute is played after the half-time break before the start of the second half.","d":"The 1 minute is added to the second half.","e":"It is decided through a coin toss which team gets the ball when the 1 minute is played.","f":"The team that last were in possession of the ball get the ball when the game starts again."},"correct":["b","f"],"rules":"2:7, 13:4b"},{"id":"2.31","chapter":"2","stem":"The first half of the game has been stopped 1 minute too soon. There has been no violation of any rule, and the ball was in the air over the goal area. The goalkeeper catches the ball after the whistle signal. Both teams are still on the court. Correct decision?","options":{"a":"The 1 minute is not played.","b":"The 1 minute is played before the half-time break.","c":"The 1 minute is played after the half-time break before the start of the second half.","d":"The 1 minute is added to the second half.","e":"The team that last were in possession of the ball get the ball when the game starts again.","f":"The game is restarted with a goalkeeper throw."},"correct":["b","e"],"rules":"2:7, 13:4a"},{"id":"2.32","chapter":"2","stem":"The first half of the match has been stopped 1 minute too soon. There has been no violation of any rule, and the ball was in the air over the goal area. After the whistle signal, the ball went over the outer goal line. Both teams are still on the court. Correct decision?","options":{"a":"The 1 minute is not played.","b":"The 1 minute is played before the half-time break.","c":"The 1 minute is played after the half-time break before the start of the second half.","d":"The 1 minute is added to the second half.","e":"The team that last were in possession of the ball get the ball when the game starts again.","f":"The game is restarted with a goalkeeper throw."},"correct":["b","e"],"rules":"2:7, 13:4b"},{"id":"2.33","chapter":"2","stem":"WHITE team have scored a goal, and BLACK team want to take the throw-off quickly. Therefore, BLACK 5 quickly dribbles the ball in the direction of the centre line. He runs past WHITE 3, who uses an open hand to play the ball away from BLACK 5, so that the ball hits the foot of BLACK 5 and rolls far away over the centre line into the half of WHITE team. Correct decision?","options":{"a":"Time-out","b":"Throw-off for BLACK team","c":"Progressive punishment against WHITE 3","d":"Free throw for WHITE team","e":"Direct 2-minute suspension for WHITE 3"},"correct":["a","b","e"],"rules":"2:8, 8:8g, 15:9, 16:1b, Clarification 2c"},{"id":"2.34","chapter":"2","stem":"In which situations is a time-out NOT obligatory?","options":{"a":"The ball goes far away from the court","b":"The timekeeper whistles","c":"A player seems injured","d":"When the referees indicate different directions, when making a decision","e":"A court player’s substitution with a goalkeeper to execute a goalkeeper throw"},"correct":["a","c","e"],"rules":"2:8, Clarification 2"},{"id":"2.35","chapter":"2","stem":"Who may request a team time-out?","options":{"a":"One of the team officials","b":"A player","c":"Only the responsible team official","d":"The team captain"},"correct":["a"],"rules":"Clarification 3"},{"id":"2.36","chapter":"2","stem":"Which of the following statements regarding team time-outs are correct?","options":{"a":"The team time-out can only be requested by the responsible team official.","b":"If a team time-out is requested while the opponents are in possession of the ball, the timekeeper must give the green card back to the team official.","c":"The one-minute period for the team time-out starts when the timekeeper whistles.","d":"Rule violations during a team time-out have the same consequences as during the playing time.","e":"Following the team time-out, the game is always restarted with a throw for the team that requested the team time-out."},"correct":["b","d","e"],"rules":"2:10, Clarification 3"},{"id":"2.37","chapter":"2","stem":"WHITE team is in possession of the ball. Official C from BLACK team requests a team time-out by placing the green card on the table in front of the timekeeper. Correct decision?","options":{"a":"The green card is put up on the table.","b":"The timekeeper whistles as soon as BLACK team gain possession of the ball.","c":"The timekeeper gives the green card back to the official.","d":"Only the responsible team official can request a team time-out."},"correct":["c"],"rules":"2:10, Clarification 3"},{"id":"2.38","chapter":"2","stem":"BLACK 3 tries to shoot on goal. However, the ball comes to rest on the floor in the goal area without having been touched by any other player. At the same time, the responsible team official of BLACK team requests a team time-out. Correct decision?","options":{"a":"The timekeeper whistles, stops the clock at the same time, and indicates the team time-out for BLACK team to the referees.","b":"The timekeeper gives the green card back to the responsible team official from BLACK team.","c":"The game is restarted with a free throw for BLACK team.","d":"Goalkeeper throw for WHITE team"},"correct":["b","d"],"rules":"6:5, Clarification 3"},{"id":"2.39","chapter":"2","stem":"Goalkeeper WHITE 1 passes the ball to WHITE 8, who is alone with goalkeeper BLACK 12 near the goal area of BLACK team. Just before the ball gets to WHITE 8, there is a whistle signal from the timekeeper: official A from WHITE team has requested a team time-out. How should the game be continued?","options":{"a":"Free throw for WHITE team outside the goal area of WHITE team","b":"Free throw for WHITE team at the substitution area of WHITE team","c":"7-metre throw for WHITE team","d":"Free throw for WHITE team at the free-throw line of BLACK team"},"correct":["d"],"rules":"Clarification 3"},{"id":"2.40","chapter":"2","stem":"WHITE 4 blocks a shot from BLACK 11. The ball touches the ceiling above the goal area. Immediately after this, official A from BLACK team puts the green card on the table in front of the timekeeper. Correct decision?","options":{"a":"BLACK team immediately receive a team time-out.","b":"BLACK team do not receive a team time-out because the ball touched the ceiling.","c":"BLACK team do not receive a team time-out because WHITE team have possession of the ball when the game is restarted.","d":"BLACK team receive a team time-out, but only after the game has restarted."},"correct":["a"],"rules":"2:8, 2:10, Clarification 3"},{"id":"2.41","chapter":"2","stem":"WHITE team is in possession of the ball and request a team time-out. Because of the noise, the referees do not hear the whistle signal of the timekeeper. Only after about ten seconds, when BLACK team are in possession of the ball, the referees hear the whistle. Correct decision?","options":{"a":"Team time-out is awarded","b":"The game is restarted with a free throw for BLACK team.","c":"Team time-out is not awarded","d":"The game is restarted with a free throw for WHITE team."},"correct":["a","d"],"rules":"2:8, 2:9 comment, Clarification 3"},{"id":"2.42","chapter":"2","stem":"At 78:00 player WHITE 7 receives a 2-minute suspension. The match ends in a draw, and the regulations require a decision through 7-metre throws. WHITE 7 is nominated by the responsible team official to participate in the 7-metre throwing. WHITE 7 executes the 7-metre throw and scores a goal. Correct decision?","options":{"a":"Goal is valid, WHITE 7 is allowed to participate","b":"Goal is not valid, WHITE 7 is not allowed to participate","c":"The throw is considered as failed","d":"Disqualification for WHITE 7"},"correct":["a"],"rules":"2:2 comment"},{"id":"2.43","chapter":"2","stem":"At 55:00 the responsible team official from WHITE team requests a team time-out, which is the second in the match. At 59:00 the same responsible team official requests the third team time- out. Correct decision?","options":{"a":"Team time-out is possible","b":"Team time-out is not possible"},"correct":["b"],"rules":"2:10, Clarification 3"},{"id":"2.44","chapter":"2","stem":"WHITE team is in attack. Official A from WHITE team wishes to request a team time-out and goes to the table to place the green card in front of the timekeeper. The green card is placed on the table in front of the timekeeper. At the same time, WHITE 4 takes a shot on goal and manages to score. The timekeeper whistles for the team time-out just after the ball passes the goal line of BLACK team. What is the correct decision?","options":{"a":"Goal for WHITE team","b":"The goal is not valid, because WHITE team have requested a team time-out.","c":"Team time-out for WHITE team","d":"No team time-out for WHITE team, because they are no longer in possession of the ball","e":"The green card must be returned to the team.","f":"Throw-off for BLACK team"},"correct":["a","d","e","f"],"rules":"2:10, Clarification 3"},{"id":"2.45","chapter":"2","stem":"WHITE team had their second team time-out at 55:10. At 59:25, official A from WHITE team wants to request a third team time-out for his team and places the green card on the table in front of the timekeeper. WHITE team are in possession of the ball. The timekeeper whistles and stops the clock. He shows a team time-out for WHITE team. What is the correct decision?","options":{"a":"Team time-out for WHITE team","b":"No team time-out granted","c":"Progressive punishment for official A from WHITE team","d":"The match is restarted with a free throw for WHITE team.","e":"The match is restarted with a free throw for BLACK team."},"correct":["b","d"],"rules":"Clarification 3, 2:10"},{"id":"2.46","chapter":"2","stem":"WHITE team want to request a team time-out. Official A from WHITE team places the green card on the table in front of the timekeeper. At the same time, WHITE 9 takes a shot on the goal of BLACK team. The timekeeper whistles while the ball is in the air. Shortly after the whistle, goalkeeper BLACK 12 catches the ball. What is the correct decision?","options":{"a":"No team time-out possible, because WHITE team are not in possession of the ball","b":"Team time-out for WHITE team","c":"The green card is returned to WHITE team.","d":"The match is restarted with a goalkeeper throw for BLACK team.","e":"The match is restarted with a free throw for WHITE team."},"correct":["b","e"],"rules":"2:10, 13:4, Clarification 3"},{"id":"2.47","chapter":"2","stem":"WHITE team want to request a team time-out. Official A from WHITE team places the green card on the table in front of the timekeeper. Before the timekeeper whistles for the team time-out, WHITE 9 takes a shot on goal. The shot is blocked by goalkeeper BLACK 12, and the timekeeper whistles, while the ball is rolling inside the goal area. What is the correct decision?","options":{"a":"No team time-out possible because WHITE team are not in possession of the ball.","b":"Team time-out for WHITE team.","c":"The green card is returned to WHITE team.","d":"The match is restarted with a goalkeeper throw for BLACK team.","e":"The match is restarted with a free throw for WHITE team.","f":"The match is restarted with a free throw for BLACK team."},"correct":["a","c","f"],"rules":"2:10, 6:5, Clarification 3"},{"id":"2.48","chapter":"2","stem":"WHITE team want to request a team time-out. Official A from WHITE team places the green card on the table in front of the timekeeper. Before the timekeeper whistles for the team time-out, WHITE 9 takes a shot on goal. The shot is blocked by goalkeeper BLACK 12, and the timekeeper whistles, while the ball, after the save, is in the air above the goal area. What is the correct decision?","options":{"a":"No team time-out possible because WHITE team are not in possession of the ball.","b":"Team time-out for WHITE team.","c":"The green card is returned to WHITE team.","d":"The match is restarted with a goalkeeper throw for BLACK team.","e":"The match is restarted with a free throw for WHITE team.","f":"The match is restarted with a free throw for BLACK team."},"correct":["b","e"],"rules":"2:10, 13:4, Clarification 3"},{"id":"2.49","chapter":"2","stem":"WHITE team want to request a team time-out. Official A from WHITE team places the green card on the table in front of the timekeeper. Before the timekeeper whistles for the team time-out, WHITE 11 commits an offensive foul. The timekeeper whistles for the team time-out just before the referee whistles for the offensive foul. What is the correct decision?","options":{"a":"The referees decide that there shall be no team time-out, because the offensive foul had been committed before the timekeeper whistled for the team time-out.","b":"Team time-out for WHITE team","c":"The green card is returned to WHITE team.","d":"The match is restarted with a free throw for BLACK team.","e":"The match is restarted with a free throw for WHITE team."},"correct":["a","c","d"],"rules":"2:10, Clarification 3, in connection with 2:4"},{"id":"2.50","chapter":"2","stem":"Electronic team time-out is used in the match. WHITE team had their second team time-out at 55:10. At 59:35, official A from WHITE team wants to request a third team time-out for his team and activates the team time-out buzzer. The ball is in play and WHITE team is in possession of the ball. The signal from the public clock sounds and the clock is stopped. What is the correct decision?","options":{"a":"Team time-out for WHITE team.","b":"No team time-out granted.","c":"Progressive punishment for official A from WHITE team.","d":"The match is restarted with a free throw for WHITE team.","e":"The match is restarted with a free throw for BLACK team.","f":"BLACK team can choose between free throw and 7-metre throw."},"correct":["b","c","e"],"rules":"2:10, Clarification 3, Electronic Team Time-out Regulations"},{"id":"2.51","chapter":"2","stem":"Electronic team time-out is used in the match. WHITE team is in possession of the ball. At 58:40, WHITE 7 commits an offensive foul. Before the referees were able to whistle for the offensive foul, the signal from the public clock sounds because Official A from WHITE team activated the team time-out buzzer to request a team time-out. Immediately thereafter the referees whistle offensive foul against WHITE 7. What is the correct decision?","options":{"a":"Team time-out is not possible because WHITE team is no longer in possession of the ball.","b":"Team time-out for WHITE team.","c":"WHITE team will lose one team time-out.","d":"The match is restarted with a free throw for BLACK team.","e":"The match is restarted with a free throw for WHITE team.","f":"The match is restarted with a 7-metre throw for BLACK team.","g":"BLACK team can choose between free throw and 7-metre throw.","h":"Progressive punishment against Official A from WHITE team."},"correct":["a","c","d"],"rules":"2:10, Clarification 3, Electronic Team Time-out Regulations"},{"id":"2.52","chapter":"2","stem":"Electronic team time-out is used in the match. At 29:50 in the first half, WHITE 9 takes a shot on goal. The shot is blocked by goalkeeper BLACK 12, and after the save, the ball is in the air above the goal area. At that moment, the signal from the public clock sounds because Official A from BLACK team has activated the buzzer to request a team time-out. What is the correct decision?","options":{"a":"No team time-out possible because BLACK team are not in possession of the ball.","b":"Team time-out for BLACK team.","c":"BLACK team will lose one team time-out.","d":"The match is restarted with a goalkeeper throw for BLACK team.","e":"The match is restarted with a free throw for WHITE team.","f":"The match is restarted with a free throw for BLACK team.","g":"WHITE team can choose between a 7-metre throw and free throw.","h":"The match is restarted with a 7-metre throw for WHITE team.","i":"Progressive punishment against Official A from BLACK team."},"correct":["a","c","h","i"],"rules":"2:10, Clarification 3, Electronic Team Time-out Regulations"},{"id":"2.53","chapter":"2","stem":"BLACK team is in attack. The referees show the forewarning signal. After two passes a whistle sounds from the delegate because Official A from BLACK team has requested a team time- out. Neither the referees nor the players hear the whistle, and the game continues. The fourth pass from BLACK team goes to the wing player who has a clear chance of scoring. The wing player jumps to take a shot on goal. By doing so he is pushed by WHITE 4 and he partly loses body control. The goalkeeper saves the shot. Only at that point the referees and the players become aware that the delegate interrupted the match because of the team time-out request. What is the correct decision?","options":{"a":"Team time-out for BLACK team.","b":"The match is restarted with a free throw for BLACK team.","c":"The match is restarted with a 7-metre throw for BLACK team.","d":"2-minute suspension for WHITE 4.","e":"No punishment.","f":"The forewarning signal is still valid - BLACK team has completed two passes.","g":"The forewarning signal is still valid – BLACK team has completed four passes.","h":"The forewarning signal is no longer valid because WHITE 4 is punished with a 2-minute suspension."},"correct":["a","b","d","f"],"rules":"2:9 comment, 2:10, Clarification 3 and 4"},{"id":"2.54","chapter":"2","stem":"WHITE team shoots at goal. Goalkeeper BLACK 1 saves the shot. The ball is bouncing inside the goal area when Team Official A from WHITE team requests a team time-out by putting the green card in front of the timekeeper. The timekeeper whistles when the ball is still bouncing inside the goal area, but the ball is very close to WHITE 13 who is completely alone just outside the goal area. What is the correct decision?","options":{"a":"Team time-out for WHITE team.","b":"No team time-out possible, and the green card is handed back to Team Official A from WHITE team.","c":"Free throw for WHITE team.","d":"Goalkeeper throw for BLACK team.","e":"Free throw for BLACK team.","f":"7-metre throw for WHITE team."},"correct":["a","c"],"rules":"2:10, 13:4a-b, Clarification 3"},{"id":"2.55","chapter":"2","stem":"(Electronic team time-out is used in the game). WHITE team are in attack, and the score is 31:31. With 20 seconds left in the match, WHITE 7 scores a goal. Official A from BLACK team runs to the timekeeper’s table to push the buzzer to request a team time-out. Before official A is able to push the buzzer, BLACK 10 gets up from the bench and pushes the buzzer just before BLACK team execute the throw-off. What is the correct decision?","options":{"a":"Team time-out for BLACK team.","b":"No team time-out for BLACK team.","c":"The game is restarted with a throw-off for BLACK team.","d":"The game is restarted with a free throw for WHITE team.","e":"The game is restarted with a 7-metre throw for WHITE team.","f":"Official A from WHITE team can choose between 7-metre throw and free throw.","g":"Progressive punishment for official A from BLACK team.","h":"2-minute suspension for BLACK 10.","i":"Disqualification without written report for BLACK 10 (red card shown by the referees).","j":"BLACK team will lose one team time-out."},"correct":["b","c","h","j"],"rules":"2:10, Clarification 3, Electronic Team Time-out Regulations"},{"id":"2.56","chapter":"2","stem":"It is possible to use the video replay in this match, and an electronic team time-out system is in use. With 20 seconds left of the match WHITE 7 runs with the ball in his hands. The referees whistle steps against WHITE 7. WHITE 7 holds on to the ball for 2 seconds before putting it on the floor. Just as BLACK 4 picks up the ball, official B of BLACK team presses the buzzer to request a TTO. The referees decide to use the VR to check a possible violation of rule 8:11a. During the VR review, they see that WHITE 7 only took three steps. What is the correct decision?","options":{"a":"It is okay to use the video replay.","b":"Team time-out starts immediately for BLACK team.","c":"Decision about team time-out is postponed until after VR.","d":"Time-out.","e":"After VR, team time-out for BLACK team.","f":"After VR, no team time-out for BLACK team.","g":"Disqualification without written report for WHITE 7 (red card shown by the referees).","h":"2-minute suspension for WHITE 7.","i":"The match is restarted with a free throw for BLACK team.","j":"The match is restarted with a 7-metre throw for BLACK team.","k":"The match is restarted with a free throw for WHITE team.","l":"BLACK team will lose one team time-out","m":"Progressive punishment for official B of BLACK team"},"correct":["a","c","d","f","k"],"rules":"2:8, 2:9, clarification no. 3, 17:13, Electronic Team Time-Out Regulations, Video Replay Regulations"},{"id":"3.1","chapter":"3","stem":"How many colours is the ball allowed to have?","options":{"a":"1","b":"2","c":"3","d":"Unlimited"},"correct":["d"],"rules":"3:1"},{"id":"3.2","chapter":"3","stem":"Which of the following balls must the referees select for a men’s game?","options":{"a":"Circumference 57cm, weight 450g","b":"Circumference 58cm, weight 400g","c":"Circumference 59cm, weight 425g","d":"Circumference 60cm, weight 500g"},"correct":["c"],"rules":"3:2"},{"id":"3.3","chapter":"3","stem":"Which of the following balls must the referees select for at women’s game?","options":{"a":"Circumference 53cm, weight 350g","b":"Circumference 54cm, weight 300g","c":"Circumference 55cm, weight 425g","d":"Circumference 56cm, weight 375g"},"correct":["d"],"rules":"3:2"},{"id":"3.4","chapter":"3","stem":"The referees have decided to bring the reserve ball into play. When should the original ball be used again?","options":{"a":"At the time of the next interruption","b":"It cannot be used again, unless it becomes impossible to continue to use the reserve ball.","c":"When the referees find it necessary to use it again","d":"If one of the teams request it"},"correct":["c"],"rules":"3:4"},{"id":"4.1","chapter":"4","stem":"Shortly before the beginning of the game, WHITE 11 is severely injured in a way that he is unable to play. Correct decision?","options":{"a":"WHITE 11 cannot be replaced.","b":"WHITE 11 can be replaced if the opponents accept this.","c":"Normally, WHITE 11 can be replaced in the match report and his substitute can wear number 11. However, the referees may have to observe special deviating regulations for the respective competition.","d":"WHITE 11 can be replaced, but his substitute cannot wear number 11."},"correct":["c"],"rules":"4:1, 4:3"},{"id":"4.2","chapter":"4","stem":"BLACK team appear with five court players. The goalkeeper is not present at the beginning of the game. BLACK team appoint court player BLACK 5 as goalkeeper. What are the consequences for BLACK 5?","options":{"a":"BLACK 5 can be used as a court player at any time, when he makes a correct substitution.","b":"BLACK 5 can no longer be used as a court player.","c":"BLACK 5 can be used as a court player if the officials of WHITE team accept this.","d":"BLACK 5 can be used as a court player, as soon as the intended goalkeeper is present."},"correct":["a"],"rules":"4:1"},{"id":"4.3","chapter":"4","stem":"Just after the match has started, the club president of WHITE team sits down on the bench in the substitution area with three team officials, the masseur and the coach. What are the consequences?","options":{"a":"The substitute goalkeeper must stand behind the bench.","b":"The club president must leave the substitution area.","c":"One of the officials must leave the substitution area.","d":"Whoever is not included in the score sheet must leave the substitution area.","e":"The responsible team official gets a progressive punishment."},"correct":["d","e"],"rules":"4:2"},{"id":"4.4","chapter":"4","stem":"What is the minimum number of players that must be present on the court at the beginning of the game and included in the match score sheet?","options":{"a":"Five players","b":"Four court players and one goalkeeper","c":"Five court players and one goalkeeper","d":"Six court players"},"correct":["a"],"rules":"4:1"},{"id":"4.5","chapter":"4","stem":"Four scenarios: Who is entitled to participate?","options":{"a":"A player who is present at the beginning of the game and entered in the score sheet","b":"A player who is not present at the beginning of the game but is entered in the score sheet","c":"A player who is present at the beginning of the game but not entered in the score sheet","d":"A player who has received permission to play from the timekeeper but is not entered in the score sheet"},"correct":["a"],"rules":"4:3"},{"id":"4.6","chapter":"4","stem":"At the beginning of the game, there are only six players of WHITE team present. Immediately after the start of the game, the missing players arrive. WHITE 7 runs directly out on the playing court through the substitution area. He is not included in the score sheet. Correct decision?","options":{"a":"Disqualification of WHITE 7 (red card shown by the referees)","b":"2-minute suspension for WHITE 7, who must be included in the score sheet","c":"WHITE 7 must be entered in the score sheet, if this is in accordance with the regulations of the responsible federation","d":"Progressive punishment against the responsible team official of WHITE team"},"correct":["c","d"],"rules":"4:3, 16:1b"},{"id":"4.7","chapter":"4","stem":"The referees have awarded a free throw for WHITE team at the free-throw line of BLACK team. Now, there is a whistle signal from the timekeeper, who stops the clock. The referees enquire about the reason for the intervention. The timekeeper informs the referees that WHITE 9 made a faulty substitution. Correct decision?","options":{"a":"Free throw for WHITE team at the free-throw line of BLACK team","b":"Free throw for BLACK team at the team’s own free-throw line","c":"Free throw for BLACK team at the substitution area of WHITE team","d":"2-minute suspension for WHITE 9"},"correct":["a","d"],"rules":"4:5, 13:3, 16:3a, Clarification 7"},{"id":"4.8","chapter":"4","stem":"BLACK 14 makes a correct substitution, while the game is interrupted. However, a whistle comes from the timekeeper’s table. BLACK 14 is not entered correctly in the score sheet. It is found that this player has number 18 in the score sheet. Correct decision?","options":{"a":"Progressive punishment against the responsible team official from BLACK team","b":"Free throw for WHITE team at the timekeeper’s table","c":"The number is to be corrected in the score sheet.","d":"The game is continued with the throw corresponding to the situation, and there must be a written report."},"correct":["c","d"],"rules":"4:3, 13:3, 13:4"},{"id":"4.9","chapter":"4","stem":"When is it permitted for up to two people from one team (team officials and/or players) to enter the court?","options":{"a":"During a match interruption","b":"During a match interruption and with permission from a referee","c":"When a player is injured","d":"With permission from the timekeeper"},"correct":["b"],"rules":"4:11"},{"id":"4.10","chapter":"4","stem":"The referee whistles to indicate a time-out because WHITE 2 is being given his third 2-minute suspension. As the referee turns to the timekeeper and scorekeeper to report the disqualification, the responsible team official from WHITE team runs onto the court to protest about the suspension. Team official B from WHITE team has previously already been given a warning. Correct decision?","options":{"a":"Disqualification of responsible team official from WHITE team (red card shown by the referees) and a reduction of WHITE team by an additional player for 2 minutes","b":"Personal warning for responsible team official from WHITE team","c":"Disqualification of responsible team official from WHITE team with a written report (red and blue cards shown by the referees)","d":"2-minute suspension for responsible team official from WHITE team","e":"Reduction of WHITE team by an additional player for 2 minutes on the court"},"correct":["d","e"],"rules":"4:2, 16:3e"},{"id":"4.11","chapter":"4","stem":"During a time-out due to a player’s injury, WHITE 2 runs onto the court as an additional player although neither one of the referees has given him permission to enter the court. Correct decision?","options":{"a":"Warning for WHITE 2","b":"Progressive punishment against the responsible team official from WHITE team","c":"Disqualification of WHITE 2 (red card shown by the referees)","d":"2-minute suspension for WHITE 2 and a reduction of his team by 1 player on the court for 2 minutes"},"correct":["d"],"rules":"4:4, 4:6, 16:3a"},{"id":"4.12","chapter":"4","stem":"WHITE 5 is injured on the court, and the court referee indicates a time-out and gives permission for two people from WHITE team to enter the court to assist WHITE 5. Team official B from BLACK team also enters the court to give advice to his goalkeeper. Correct decision?","options":{"a":"No decision, the signal allows all players and officials to enter the court.","b":"All four officials of BLACK team receive a warning and if the episode is repeated they must be disqualified.","c":"The responsible team official of BLACK team receives a warning.","d":"Progressive punishment against team official B from BLACK team","e":"After receiving medical care on the playing court, WHITE 5 has to leave the court immediately, and he can only re-enter the court following the third attack of his team."},"correct":["d","e"],"rules":"4:2, 4:11"},{"id":"4.13","chapter":"4","stem":"Goalkeeper WHITE 16 has been injured and must be replaced by WHITE 5. WHITE 5 changes his shirt. After 20 minutes, WHITE 16 is ready to play again, and the team official A from WHITE team makes a substitution. WHITE 5 changes his shirt again and is sent in as a court player again without notification to the scorekeeper. Correct decision?","options":{"a":"No punishment, as this is allowed","b":"Free throw for BLACK team","c":"2-minute suspension for WHITE 5","d":"Disqualification of WHITE 5 (red card shown by the referees)"},"correct":["a"],"rules":"4:1"},{"id":"4.14","chapter":"4","stem":"WHITE 4 leaves the playing court beyond the substitution line. When WHITE 4 has crossed the sideline but not yet arrived in his substitution area, WHITE 11 crosses the line correctly to enter the playing court. What is the correct decision after the whistle from the timekeeper?","options":{"a":"Free throw for BLACK team where WHITE 4 left the court","b":"Free throw for BLACK team at height of the substitution area of WHITE team","c":"2-minute suspension for WHITE 4","d":"2-minute suspension for WHITE 11","e":"2-minute suspension for WHITE 4 and WHITE 11"},"correct":["a","c"],"rules":"4:4, 4:5, 13:6, 16:3a"},{"id":"4.15","chapter":"4","stem":"BLACK 3 makes the first faulty substitution for his team during an interruption of the match. The interruption was caused by a free-throw decision in favour of BLACK team. BLACK 3 has neither been warned nor suspended earlier in the match. Correct decision?","options":{"a":"Warning for BLACK 3","b":"2-minute suspension for BLACK 3","c":"Free throw for WHITE team","d":"Free throw for BLACK team"},"correct":["b","d"],"rules":"4:5, 13:3, 16:3a"},{"id":"4.16","chapter":"4","stem":"After the referees have awarded a 7-metre throw to WHITE team, WHITE 27, who has been designated to carry out the 7-metre throw, makes a faulty substitution. Correct decision?","options":{"a":"Free throw for BLACK team","b":"7-metre throw for WHITE team","c":"Goalkeeper throw for BLACK team","d":"2-minute suspension for WHITE 27"},"correct":["b","d"],"rules":"4:5, 13:3, 16:3a"},{"id":"4.17","chapter":"4","stem":"WHITE team have scored a goal. The referees have not yet whistled for the throw-off to be taken, when BLACK 10 enters the court before BLACK 6 has left it. Correct decision?","options":{"a":"Throw-off","b":"Free throw for WHITE team","c":"2-minute suspension for BLACK 10","d":"2-minute suspension for BLACK 6"},"correct":["a","c"],"rules":"4:5, 13:3, 16:3a"},{"id":"4.18","chapter":"4","stem":"WHITE team only have twelve players present at the beginning of the match, as the two goalkeepers are still missing. WHITE team therefore start with one of the twelve court players as a goalkeeper. Which of the following alternatives are correct?","options":{"a":"The court player who starts the match as a goalkeeper must be registered as number 1, 12 or 16 in the score sheet.","b":"The court player who starts the match as a goalkeeper can also be used as a court player later in the game.","c":"The late-arriving goalkeepers of WHITE team must be registered as number 1, 12 or 16 in the score sheet.","d":"One of the two late-arriving goalkeepers can only be used as a court player."},"correct":["b"],"rules":"4:1, 4:8"},{"id":"4.19","chapter":"4","stem":"During a time-out, WHITE 5 makes the first faulty substitution of his team. WHITE team were in possession of the ball when the time-out was called. Correct decision?","options":{"a":"No punishment","b":"Warning for WHITE 5","c":"2-minute suspension for WHITE 5","d":"Free throw for BLACK team","e":"WHITE team remain in possession of the ball"},"correct":["c","e"],"rules":"4:5, 13:3, 16:3a"},{"id":"4.20","chapter":"4","stem":"Goalkeeper WHITE 3 wants to carry out a 7-metre throw. To protect the empty goal WHITE 15 enters the court in a goalkeeper uniform replacing a court player. Correct decision?","options":{"a":"2-minute suspension for WHITE 3","b":"2-minute suspension for WHITE 15","c":"No punishment","d":"7-metre throw for WHITE team","e":"Free throw for BLACK team at the height of the substitution area of WHITE team"},"correct":["b","d"],"rules":"4:1, 4:5, 13:3, 16:3a"},{"id":"4.21","chapter":"4","stem":"During a counter-attack by WHITE team, who have a clear chance of scoring, BLACK 3 makes a faulty substitution. The timekeeper and scorekeeper do not react, but the court referee spotted what had happened. Correct decision?","options":{"a":"Immediate suspension for BLACK 3 and free throw for WHITE team","b":"Immediate suspension for BLACK 3 and 7-metre throw for WHITE team","c":"Wait until the chance of scoring has passed, then suspension for BLACK 3 and free throw for WHITE team","d":"Wait until the chance of scoring has passed, then suspension for BLACK 3 and an appropriate throw according to the situation"},"correct":["d"],"rules":"4:5, 13:2, guideline rule 13:2, 14:2, 16:3a"},{"id":"4.22","chapter":"4","stem":"A shot on goal is saved by goalkeeper WHITE 1, and the ball is rolling along the sideline near WHITE team’s substitution bench. WHITE 5, who sits on the substitution bench, now enters the court with one foot to stop the ball, so that WHITE 4 can pick it up before it crosses the sideline. Correct decision?","options":{"a":"Free throw for BLACK team","b":"Throw-in for BLACK team","c":"2-minute suspension for WHITE 5","d":"Disqualification of WHITE 5 (red card shown by the referees)","e":"WHITE team reduced by 1 player on the court for 2 minutes"},"correct":["a","c","e"],"rules":"4:6, 13:1a, 16:3a"},{"id":"4.23","chapter":"4","stem":"30 seconds before his suspension time is over, WHITE 3 enters the court without interfering with the game. WHITE team are in possession of the ball. Correct decision?","options":{"a":"Free throw for BLACK team","b":"Free throw for WHITE team","c":"2-minute suspension for WHITE 3 and WHITE team are to be further reduced by 1 player on the court for 30 seconds","d":"30 seconds for WHITE 3 and WHITE team are to be reduced by 1 player on the court for 2 minutes","e":"Disqualification of WHITE 3 (red card shown by the referees) and WHITE team are to be further reduced by 1 player on the court for 30 seconds"},"correct":["a","c"],"rules":"4:6, 13:1a, 16:3a"},{"id":"4.24","chapter":"4","stem":"WHITE 5 has been suspended. After 1 minute and 45 seconds of the 2-minute suspension, team official A from WHITE team sends him onto the court. Correct decision?","options":{"a":"Another 2-minute suspension for WHITE 5, and WHITE team are to be reduced by 1 player on the court for 2 minutes and 15 seconds","b":"Disqualification for WHITE 5 (red card shown by the referees), and WHITE team are to be reduced by 2 players on the court for 15 seconds and by 1 player on the court for 1 minute and 45 seconds","c":"Another 2-minute suspension for WHITE 5, and WHITE team are to be reduced by 2 players on the court for 15 seconds and by 1 player on the court for 1 minute and 45 seconds"},"correct":["c"],"rules":"4:6, 16:3a"},{"id":"4.25","chapter":"4","stem":"After his 2-minute suspension has ended, goalkeeper BLACK 1 wants to re-join his team, who are defending at that moment. He enters the court wearing his goalkeeper jersey to assume the wing position, as BLACK team’s sixth court player. Correct decision?","options":{"a":"Game continues without interruption","b":"7-metre throw for WHITE team","c":"Free throw for WHITE team","d":"2-minute suspension for goalkeeper BLACK 1"},"correct":["c","d"],"rules":"4:1, 4:5, 13:1, 16:3a"},{"id":"4.26","chapter":"4","stem":"Which of the following statements are correct regarding a player who is bleeding on the court?","options":{"a":"The player must leave the court immediately and voluntarily.","b":"The player can remain on the court until the next interruption of the game.","c":"The player who replaces the bleeding player can enter the court beyond the substitution line.","d":"The player must not re-enter the court until the next interruption of the game.","e":"If the player refuses to follow the instructions of the referees to leave the court, he must be punished for unsportsmanlike conduct."},"correct":["a","e"],"rules":"4:10, 8:7, 16:1b"},{"id":"4.27","chapter":"4","stem":"WHITE 5 is alone with goalkeeper BLACK 1 and has a clear chance of scoring. BLACK 11 makes a faulty substitution, as he enters the court before BLACK 9 has left it. The timekeeper whistles because of this infraction, precisely when WHITE 5 is ready to shoot. Correct decision?","options":{"a":"2-minute suspension for BLACK 11","b":"Disqualification for BLACK 11, written report (red and blue cards shown by the referees)","c":"Free throw for WHITE team","d":"7-metre throw for WHITE team","e":"The timekeeper should have waited until the clear chance of scoring is over before blowing the whistle for the faulty substitution"},"correct":["a","d"],"rules":"4:5, 14:1a, 16:3a, clarification 7"},{"id":"4.28","chapter":"4","stem":"Goalkeeper BLACK 1 saves a shot and throws the ball to his teammate BLACK 4. Now, BLACK 1 goes to the sideline near his substitution area. He clearly crosses the line, takes a towel and drinks from a water bottle. He is not replaced on the court by another goalkeeper or court player. Correct decision?","options":{"a":"The game continues without interruption, as this is allowed.","b":"2-minute suspension for BLACK 1 for faulty substitution","c":"Free throw for WHITE team at the substitution area of BLACK team"},"correct":["a"],"rules":"4:4 comment"},{"id":"4.29","chapter":"4","stem":"Team official A from BLACK team received a warning earlier in the game. After a decision by the referees, team official D from BLACK team runs several metres onto the court without permission from the referees. Correct decision?","options":{"a":"No punishment","b":"Warning for team official D from BLACK team","c":"2-minutes suspension for team official D from BLACK team","d":"Disqualification for team official D from BLACK team (red card shown by the referees)"},"correct":["c"],"rules":"4:2, 8:7, 16:3e"},{"id":"4.30","chapter":"4","stem":"There is a time-out due to an injury of WHITE 6 caused by an incident that did not lead to a progressive punishment against a player from BLACK team. The referees have given permission for two people to enter the court and assist WHITE 6. Official C from WHITE team assists WHITE 6. Official A from WHITE team pursues BLACK 5, who in his opinion has caused the injury. He follows BLACK 5 into the substitution area of BLACK team and hits him in the face. Correct decision?","options":{"a":"Disqualification of official A from WHITE team, written report (red and blue cards shown by the referees), WHITE team is reduced by 1 player on the court for 2 minutes","b":"The game is restarted after a whistle signal with the throw that corresponds to the reason of the interruption.","c":"2-minute suspension for official A from WHITE team, WHITE team is reduced by 1 player on the court for 2 minutes","d":"Free throw for BLACK team","e":"Disqualification without written report of official A from WHITE team (red card shown by the referees), WHITE team is reduced by 1 player on the court for 2 minutes","f":"After receiving medical care on the court, WHITE 6 must leave the court and may only re- enter the court following the third attack of his team."},"correct":["a","b","f"],"rules":"4:11, 8:6b, 13:3, 16:6a, 16:8"},{"id":"4.31","chapter":"4","stem":"Just after the execution of a throw-off for BLACK team, the referees realise that a person, who is not on the score sheet, is present in the substitution area of BLACK team. It turns out that this person is one of the board members of the club, but BLACK team has already had five other people registered as team officials in the score sheet. Correct decision?","options":{"a":"The person must leave the substitution area.","b":"Personal punishment for the responsible team official from BLACK team.","c":"An additional team official must leave the substitution area.","d":"The game is restarted with a free throw for WHITE team.","e":"The game is restarted with a free throw for BLACK team."},"correct":["a","b","d"],"rules":"4:2, 13:1"},{"id":"4.32","chapter":"4","stem":"Which of the following statements about the uniform are correct?","options":{"a":"All players of a team identified as goalkeepers must wear shirts of identical colour.","b":"The players must have at least 20cm high numbers on both the front and the back.","c":"The goalkeepers are allowed to wear head protection if it is made of soft material.","d":"The players including the goalkeepers may use numbers from 1 to 100."},"correct":["a"],"rules":"4:7, 4:8, 4:9"},{"id":"4.33","chapter":"4","stem":"WHITE 10 is serving his first 2-minute suspension starting from 21:00. After the match has been restarted, he complains so strongly that the referees interrupt the match at 21:30 to give WHITE 10 an additional 2-minute suspension. What are the consequences for WHITE team?","options":{"a":"2-minute suspension for WHITE 10","b":"Disqualification of WHITE 10","c":"WHITE team will be reduced by 1 player on the court until 25:00","d":"WHITE team will be reduced by 2 players on the court until 23:00 and then by 1 player on the court until 23:30"},"correct":["a","d"],"rules":"4:6, 16:3d"},{"id":"4.34","chapter":"4","stem":"In which of the following cases is the responsible team official to be given a personal punishment?","options":{"a":"When a player of his team leaves the substitution area without informing the timekeeper/scorekeeper.","b":"If there are people, who are not included in the score sheet, present in the substitution area when the game starts.","c":"When an additional player enters the court.","d":"When a player who is not entitled to participate enters the court.","e":"If it is detected that players on the court wear incorrect equipment after the start of the game.","f":"If there are violations in the substitution area, which cannot clearly be attributed to individuals.","g":"If it is detected that players in the substitution area wear incorrect equipment after the start of the game."},"correct":["b","d","e","f"],"rules":"4:2, 4:3, 4:9"},{"id":"4.35","chapter":"4","stem":"The referees give the hand signal to indicate permission to enter the court, because a player of WHITE team is injured. Who is allowed to enter the court?","options":{"a":"Two officials from WHITE team, nobody else","b":"Two officials from both WHITE and BLACK team","c":"Two people (officials or players) from WHITE team","d":"Two people (officials or players) from both WHITE and BLACK team","e":"The doctor of WHITE team, if he is not one of the four team officials"},"correct":["c"],"rules":"4:11"},{"id":"4.36","chapter":"4","stem":"Official C from WHITE team has already received a warning for protests. Later on, official B from WHITE team enters the court without permission, but he does not behave in an unsportsmanlike manner. Correct decision?","options":{"a":"Warning for official B from WHITE team","b":"2-minute suspension for official B from WHITE team (must leave the bench for 2 minutes)","c":"Disqualification of official B from WHITE team (red card shown by the referees, WHITE team will be reduced by 1 player on the court for 2 minutes","d":"2-minute suspension for official B from WHITE team, WHITE team will be reduced by 1 player on the court for 2 minutes, official B can stay in the substitution area"},"correct":["d"],"rules":"4:2, 16:3e"},{"id":"4.37","chapter":"4","stem":"Which of the following actions are not allowed when there is a time-out because of an injury and the referees have given permission for up to two people from WHITE team to enter the court?","options":{"a":"The players of BLACK team stand near the sideline in order to get instructions from the coach.","b":"Players of WHITE team make substitutions outside the substitutions line.","c":"One of the team officials of WHITE team, who is on the court, moves far away from the injured player and gives instructions to the other players of his team."},"correct":["b","c"],"rules":"4:4, 4:11"},{"id":"4.38","chapter":"4","stem":"Before the start of the match the delegate realises that WHITE 7 is wearing ankle protectors with hard material that is not covered. What is/are the correct decision(s)?","options":{"a":"WHITE 7 can play with the ankle protectors, but the delegate needs to send a report to the competition management.","b":"WHITE 7 cannot play with ankle protectors that have uncovered hard parts. The delegate must alert the responsible team official that the player should remove the ankle protectors or cover the hard parts with soft material.","c":"WHITE 7 will receive a warning.","d":"The responsible team official will receive a warning.","e":"None of the previous answers are valid."},"correct":["b"],"rules":"4:9"},{"id":"4.39","chapter":"4","stem":"At 29:00 in the first half, WHITE 5 receives a 2-minute suspension. After the half-time break, the court referee whistles to start the second half. Three seconds after this, the timekeeper blows his whistle. WHITE team has seven players on the court. Correct decision?","options":{"a":"1 player of WHITE team must leave the court, no additional punishment","b":"2-minute suspension for the additional player from WHITE team","c":"WHITE team will be reduced by 2 players on the court for 57 seconds and by 1 player for 1 minute and 3 seconds."},"correct":["b","c"],"rules":"4:6"},{"id":"4.40","chapter":"4","stem":"The playing time is 43:27. There is an interruption by the timekeeper after a
