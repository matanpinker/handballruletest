8a, 8:7a, 16:3d"},{"id":"8.36","chapter":"8","stem":"Goalkeeper WHITE 1 throws a long pass to WHITE 15, who is running alone towards the opponents’ goal. Goalkeeper BLACK 12 leaves his goal area, jumps up, catches the ball and collides with WHITE 15 while in the air. Both players fall to the ground and lie there injured. Correct decision?","options":{"a":"Time-out, 2-minute suspension for WHITE 15","b":"Time-out, 2-minute suspension for BLACK 12","c":"Time-out, disqualification for BLACK 12","d":"Free throw for WHITE team","e":"Free throw for BLACK team","f":"7-metre throw for WHITE team"},"correct":["c","f"],"rules":"8:5 comment, 14:1a, 16:6a"},{"id":"8.37","chapter":"8","stem":"BLACK team is in possession of the ball. The delegate interrupts the game because official A from BLACK team has thrown a chair onto the court in protest at a referee decision. There were no previous punishments given to the team officials from BLACK team. BLACK 7 had a clear chance of scoring, when the game was interrupted. Correct decision?","options":{"a":"Warning for official A from BLACK team","b":"2-minute suspension for official A from BLACK team","c":"Disqualification of official A from BLACK team without written report (red card shown by the referees)","d":"Free throw for WHITE team","e":"7-metre throw for BLACK team","f":"Disqualification of official A from BLACK team, written report (red and blue cards shown by the referees)"},"correct":["d","f"],"rules":"8:10, 16:6b"},{"id":"8.38","chapter":"8","stem":"Official A from WHITE team protests loudly at a referee decision against his team and states: “You are idiots!” Ten minutes earlier, official C from WHITE team has already received a warning. Correct decision?","options":{"a":"Warning for official A from WHITE team due to unsportsmanlike conduct","b":"2-minute suspension for official A from WHITE team; WHITE team is reduced by 1 player on the court for 2 minutes","c":"Disqualification of official A from WHITE team, written report (red and blue cards shown by the referees); WHITE team is reduced by 1 player on the court for 2 minutes","d":"Time-out"},"correct":["c","d"],"rules":"2:8, 8:7a, 8:10a, 16:6b, 16:8, Substitution Area Regulations 5"},{"id":"8.39","chapter":"8","stem":"Goalkeeper WHITE 1 wants to carry out a goalkeeper throw. For the second time, BLACK 3 now enters the goal area and tries to prevent WHITE 1 from executing the throw without body contact with him. Correct decision?","options":{"a":"Free throw for WHITE team after whistle signal","b":"Goalkeeper throw for WHITE team after whistle signal","c":"Warning for BLACK 3","d":"2-minute suspension for BLACK 3","e":"Time-out"},"correct":["a","d","e"],"rules":"8:7c, 12:2, 15:4, 15:9, 16:1b, 16:3d"},{"id":"8.40","chapter":"8","stem":"WHITE 4 touches the ball that is rolling on the floor in the goal area of BLACK team. At this moment, he is pushed to the floor by BLACK 6. Correct decision?","options":{"a":"Progressive punishment for BLACK 6","b":"Free throw for WHITE team","c":"Goalkeeper throw for BLACK team","d":"Free throw for BLACK team"},"correct":["a","c"],"rules":"6:5, 8:2, 8:3, 12:1"},{"id":"8.41","chapter":"8","stem":"WHITE 7 has just received a 2-minute suspension for unsportsmanlike conduct. This is his first suspension. Ten seconds after the game has been restarted, he makes strong gestures on the bench to show that he does not agree with the referees. Correct decision?","options":{"a":"Disqualification of WHITE 7 without written report (red card shown by the referees)","b":"2-minute suspension for WHITE 7; WHITE 7 must remain on the bench for four minutes","c":"Additional 2-minute suspension for WHITE 7; WHITE team will be reduced by 2 players on the court for 1 minute and 50 seconds and then by 1 player on the court for 10 seconds.","d":"Warning because the progressive punishment on the bench is separate from the punishments on the court"},"correct":["c"],"rules":"8:8a, 16:3f"},{"id":"8.42","chapter":"8","stem":"WHITE 6 is pushed by BLACK 3 and spits demonstratively on the floor in front of BLACK 3. How shall WHITE 6 be punished?","options":{"a":"Progressive punishment","b":"Always with a 2-minute suspension","c":"Disqualification without written report (red card shown by the referees)","d":"Disqualification, written report (red and blue cards shown by the referees)"},"correct":["c"],"rules":"8:9, 16:6b"},{"id":"8.43","chapter":"8","stem":"Goalkeeper WHITE 12 runs from the goal area towards BLACK 10, who is counter-attacking. WHITE 12 approaches BLACK 10 from the side and holds on to him, but BLACK 10 is able to catch the ball to throw it into the empty goal. Correct decision?","options":{"a":"Throw-off","b":"Time-out","c":"Disqualification of WHITE 12","d":"2-minute suspension for WHITE 12","e":"7-metre throw for BLACK team"},"correct":["a","b","d"],"rules":"2:8, 8:4b, 9:1, 10:2, 16:3c"},{"id":"8.44","chapter":"8","stem":"Goalkeeper WHITE 12 executes a goalkeeper throw, playing a long pass in the direction of his teammate WHITE 4, who is running in a counter-attack. WHITE 4 jumps to receive the ball and immediately after this, he collides with goalkeeper BLACK 1, who has decided to leave his goal area in an attempt to stop the counter-attack. At the time of the collision, BLACK 1 stands completely still in front of the 9-metre line. After the collision, WHITE 4 loses his body control and falls to the floor. Correct decision?","options":{"a":"Offensive foul, free throw for BLACK team","b":"Free throw for WHITE team","c":"7-metre throw for WHITE team","d":"Progressive punishment for BLACK 1","e":"Disqualification of BLACK 1 without written report (red card shown by the referees)"},"correct":["c","e"],"rules":"8:5 comment, 14:1a, 16:6a, Clarification 6c"},{"id":"8.45","chapter":"8","stem":"Which of the following infractions must be punished with a disqualification with written report according to the rules (red and blue cards shown by the referees)?","options":{"a":"A player spitting on an opponent","b":"An official trying to force his team to abandon the game","c":"A 7-metre shooter hitting the goalkeeper’s head, with the goalkeeper not moving his head in the direction of the ball","d":"After a referee decision, a player throws the ball demonstratively into the stands.","e":"A player outside the playing court spitting on a spectator","f":"A player intentionally hitting an opponent in the stomach"},"correct":["a","b","e","f"],"rules":"8:9a, 8:10a"},{"id":"8.46","chapter":"8","stem":"The playing time is 59:26. Player BLACK 10 is running alone in a counter-attack. When he receives the ball from a teammate, BLACK 10 collides with goalkeeper WHITE 1, who has left the goal area, but before falling down he is able to pass the ball to BLACK 7, who shoots at the empty goal, but the ball goes wide. When the referees order a time-out, the playing time is 59:31. Correct decision?","options":{"a":"Free throw","b":"7-metre throw","c":"Red card for WHITE 1","d":"Blue card for WHITE 1","e":"Goalkeeper throw"},"correct":["c","e"],"rules":"8:5 Comment 2nd paragraph, 14:1, 14:2, Guidelines"},{"id":"8.47","chapter":"8","stem":"WHITE team is in attack and plays with seven court players. BLACK 5 intercepts a pass and gets possession of the ball. He immediately tries to take a shot on goal. WHITE 2 tries to prevent BLACK 5 from taking a shot on goal by trying to play the ball out of his hand. By doing so, he hits BLACK 5’s forearm, and the ball misses the goal. Earlier in the match, WHITE team has received three warnings. Correct decision?","options":{"a":"Goalkeeper throw for WHITE team","b":"Free throw for BLACK team","c":"7-metre throw for BLACK team","d":"2-minute suspension for WHITE 2","e":"Time-out"},"correct":["c"],"rules":"4:1, 8:1, 8:2, 14:1a, Clarification 6c"},{"id":"8.48","chapter":"8","stem":"WHITE team is in attack and plays with seven court players. BLACK 5 intercepts a pass and gets possession of the ball. He immediately tries to take a shot on goal. WHITE 2 tries to prevent BLACK 5 from taking a shot on goal by pulling him down. The ball misses the goal. Correct decision?","options":{"a":"Goalkeeper throw for WHITE team","b":"Free throw for BLACK team","c":"7-metre throw for BLACK team","d":"2-minute suspension for WHITE 2","e":"Time-out"},"correct":["c","d","e"],"rules":"2:8, 4:1, 8:4b, 14:1a, 16:3c, Clarification 6c"},{"id":"8.49","chapter":"8","stem":"WHITE team is in attack and plays with seven court players. WHITE 4 takes a shot on goal, but the ball is saved by goalkeeper BLACK 1. BLACK 1 passes the ball to BLACK 9. Just as goalkeeper WHITE 12 enters his goal area, BLACK 9 tries to take a shot on goal, but he is prevented by a foul from WHITE 2. The ball passes the outer goal line. Correct decision?","options":{"a":"Goalkeeper throw for WHITE team","b":"Free throw for BLACK team","c":"7-metre throw for BLACK team"},"correct":["b"],"rules":"4:1, 8:2, 13:1b"},{"id":"8.50","chapter":"8","stem":"WHITE team is in attack and plays with seven court players. WHITE 4 takes a shot on goal, but the ball is saved by goalkeeper BLACK 1, who is standing with the ball in his goal area ready to execute the goalkeeper throw. At that moment, the delegate interrupts the game because of a faulty substitution, as goalkeeper WHITE 1 entered the court before WHITE 7 has left it. Correct decision?","options":{"a":"Goalkeeper throw for BLACK team after whistle signal","b":"Time-out","c":"Free throw for BLACK team","d":"7-metre throw for BLACK team","e":"2-minute suspension for WHITE 1","f":"2-minute suspension for WHITE 7"},"correct":["b","c","e"],"rules":"2:8, 4:1, 4:4-6, 12:1 (II), 15:9"},{"id":"8.51","chapter":"8","stem":"WHITE team is in attack and plays with seven court players. WHITE 4 takes a shot on goal, but the ball is saved by goalkeeper BLACK 12. BLACK 12 passes the ball to BLACK 9. BLACK 9 takes a shot on goal. Court player WHITE 10 enters his own goal area and manages to save the ball. The ball passes the outer goal line. Correct decision?","options":{"a":"Throw-in for BLACK team","b":"Free throw for BLACK team","c":"7-metre throw for BLACK team","d":"Progressive punishment for WHITE 10","e":"Direct 2-minute suspension for WHITE 10"},"correct":["c","e"],"rules":"4:1, 8:8i, 14:1a, 16:3f"},{"id":"8.52","chapter":"8","stem":"WHITE team is in attack and plays with seven court players. WHITE 6 takes a shot on goal, but the ball is saved by goalkeeper BLACK 1. BLACK 1 immediately tries to score in the empty goal, but he misses the goal, and the ball passes the outer goal line. Correct decision?","options":{"a":"Goalkeeper throw for WHITE team","b":"The goalkeeper throw may be executed by any player on the court from WHITE team to keep the flow in the game.","c":"WHITE team has to make a substitution to get a goalkeeper on the court to execute the goalkeeper throw.","d":"Time-out is obligatory"},"correct":["a","c"],"rules":"2:8, 4:1, 12:1, 12:2"},{"id":"8.53","chapter":"8","stem":"BLACK team is playing with seven court players. BLACK 5 takes a shot on goal, but the shot is saved by goalkeeper WHITE 1. WHITE 1 tries to score in the empty goal. At the same time, goalkeeper BLACK 12 makes a faulty substitution, as he runs onto the court before BLACK 7 has left it. The delegate immediately interrupts the game with a whistle signal. Just after the whistle signal from the delegate, the ball crosses the outer goal line of BLACK team. Correct decision?","options":{"a":"2-minute suspension for BLACK 12","b":"2-minute suspension for BLACK 7","c":"Free throw for WHITE team","d":"7-metre throw for WHITE team","e":"Goalkeeper throw for BLACK team","f":"The delegate should have waited until the clear chance of scoring was over before interrupting the game"},"correct":["a","c","f"],"rules":"4:1, 4:4-5, 13:1b, Guideline rule 13:2"},{"id":"8.54","chapter":"8","stem":"BLACK team is playing with seven court players. BLACK 6 takes a shot on goal, but the shot is saved by goalkeeper WHITE 1. WHITE 1 tries to score in the empty goal. At the same time, goalkeeper BLACK 12 makes a faulty substitution, as he runs onto the court before BLACK 7 has left it. The delegate immediately interrupts the game with a whistle signal. Just after the whistle signal from the delegate, the ball crosses the goal line into the goal of BLACK team. Correct decision?","options":{"a":"2-minute suspension for BLACK 12","b":"2-minute suspension for BLACK 7","c":"Free throw for WHITE team","d":"7-metre throw for WHITE team","e":"Goal for WHITE team","f":"The delegate should have waited until the clear chance of scoring was over before interrupting the game"},"correct":["a","d","f"],"rules":"4:1, 4:4-5, 14:1, Guideline rule 13:2"},{"id":"8.55","chapter":"8","stem":"BLACK team is playing with seven court players. WHITE 9 intercepts the ball and manages to score in the empty goal. The ball gets to rest in the goal area. Correct decision?","options":{"a":"Goal and throw-off for BLACK team","b":"Time-out","c":"A goalkeeper must enter the court under a correct substitution to get the ball in the goal area.","d":"The ball may be picked up by any court player from BLACK team."},"correct":["a","d"],"rules":"4:1"},{"id":"8.56","chapter":"8","stem":"The score is 27:27 with six seconds left in the match. WHITE team is in attack. WHITE 7 tries to pass the ball to pivot WHITE 3. BLACK 7 intercepts the ball. At that moment he is pulled down by WHITE 3. One second later the final signal from the public clock sounds to end the game. Correct decision?","options":{"a":"The game is over.","b":"Free throw for BLACK team","c":"7-metre throw for BLACK team","d":"2-minute suspension for WHITE 3","e":"Disqualification for WHITE 3 (red card shown by the referees)","f":"Disqualification of WHITE 3 with written report (red and blue cards shown by the referees)"},"correct":["b","d"],"rules":"8:4b, 13:1b, 16:3c"},{"id":"8.57","chapter":"8","stem":"The score is 27:27 with ten seconds left in the match. WHITE team is in attack. BLACK 5 intercepts a pass and starts a counter-attack. A moment later he is attacked from behind by WHITE 11, who pushes him in a dangerous way, so that he loses body control. Before the referee whistles for the infraction, the final signal from the public clock sounds. Correct decision?","options":{"a":"The game is over.","b":"Free throw for BLACK team","c":"7-metre throw for BLACK team","d":"2-minute suspension for WHITE 11","e":"Disqualification for WHITE 11 (red card shown by the referees)","f":"Disqualification of WHITE 11 with written report (red and blue cards shown by the referees)"},"correct":["c","e"],"rules":"2:4, 8:5a, 8:11b, 16:6a"},{"id":"8.58","chapter":"8","stem":"BLACK 10 is in possession of the ball. The time is 59:27 when he executes a jump shot. WHITE 2 pushes him so hard in the chest that he completely loses body control. He falls with the ball to the floor. The referee whistles, and the clock is stopped at 59:31. Correct decision?","options":{"a":"Free throw for BLACK team","b":"7-metre throw for BLACK team","c":"2-minute suspension for WHITE 2","d":"Disqualification for WHITE 2 (red card shown by the referees)","e":"Time-out"},"correct":["a","d","e"],"rules":"2:8, 8:5a, 13:1b, 16:6a"},{"id":"8.59","chapter":"8","stem":"With 15 second left in the game, BLACK team is in possession of the ball. The referees give a free throw for BLACK team at the centre line. Before BLACK 7 is able to execute the free throw, he is blocked by WHITE 2. Correct decision?","options":{"a":"Time-out","b":"Correction and a new free throw for BLACK team after whistle signal","c":"7-metre throw for BLACK team","d":"2-minute suspension for WHITE 2","e":"Disqualification for WHITE 2 (red card shown by the referees)","f":"Disqualification of WHITE 2 with written report (red and blue cards shown by the referees)"},"correct":["a","c","e"],"rules":"2:8, 8:11a"},{"id":"8.60","chapter":"8","stem":"BLACK team is in attack. The referees give a free throw for BLACK team at the free-throw line with three seconds left in the match. BLACK 10 is in a correct position and ready to execute the free throw directly on the goal, but player WHITE 5, who is standing one metre from BLACK 10, blocks the shot on goal. Then the final signal sounds. Correct decision?","options":{"a":"7-metre throw for BLACK team","b":"2-minute suspension for WHITE 5","c":"Disqualification for WHITE 5 (red card shown by the referees)","d":"Free throw for BLACK team after whistle signal"},"correct":["a","c"],"rules":"2:8, 8:7c, 8:11a, 15:7, 15:9, 16:3d"},{"id":"8.61","chapter":"8","stem":"BLACK team is in attack. The referees give a free throw for BLACK team at the free-throw line with three seconds left in the match. Player BLACK 10 is in a correct position to execute the free throw directly on the goal, but before he can take the shot, he is prevented by WHITE 5, who moves into a distance of one metre moving his arms and jumping in front of BLACK 10. Then the final signal sounds. Correct decision?","options":{"a":"2-minute suspension for WHITE 5","b":"Disqualification for WHITE 5 (red card shown by the referees)","c":"Free throw for BLACK team","d":"7-metre throw for BLACK team"},"correct":["b","d"],"rules":"2:8, 8:11a"},{"id":"8.62","chapter":"8","stem":"With 19 seconds left in the match WHITE 2 is trying to break through, but the referees whistle steps against WHITE 2. After the whistle from the referees, WHITE 2 takes a shot on goal. The ball is grabbed by goalkeeper BLACK 12, and he is ready to start a counter-attack. Correct decision?","options":{"a":"Play on","b":"Time-out","c":"2-minute suspension for WHITE 2","d":"Disqualification for WHITE 2 (red card shown by the referees)","e":"Free throw for BLACK team","f":"7-metre throw for BLACK team"},"correct":["b","d","f"],"rules":"2:8, 8:11a"},{"id":"8.63","chapter":"8","stem":"The score is 28:26 for WHITE team. With 25 seconds left in the match, BLACK team score a goal. Goalkeeper WHITE 12 kicks the ball away on purpose, so that it ends up in the spectators’ seats. It is clear that he kicks the ball with the intention of delaying the game, so that the throw-off cannot be executed immediately. What is the correct decision?","options":{"a":"Time-out","b":"Throw-off for WHITE team","c":"Free throw for BLACK team","d":"7-metre throw for BLACK team","e":"2-minute suspension for WHITE 12","f":"Disqualification for WHITE 12 (red card shown by the referees)","g":"Disqualification for WHITE 12 with written report (red and blue cards shown by the referees)"},"correct":["a","b","f"],"rules":"2:8, 8:9, 10:2"},{"id":"8.64","chapter":"8","stem":"The score is 25:25 with 3 seconds left in the match. WHITE team are in attack. BLACK 5 causes a free throw for WHITE 2 at the free-throw line. Shortly after, the final signal sounds. The referees whistle for the execution of the free throw after the final signal. Before the ball has left the hand of the thrower, BLACK 6 steps forward and blocks the ball standing too close. What is the correct decision?","options":{"a":"The game is over.","b":"The free throw must be retaken.","c":"7-metre throw for WHITE team","d":"2-minute suspension for BLACK 6","e":"Disqualification for BLACK 6 (red card shown by the referees)"},"correct":["b","d"],"rules":"2:4, 2:5, 2:6, 15:2, 15:4, 15:9, 16:3"},{"id":"8.65","chapter":"8","stem":"WHITE team are playing without a goalkeeper and with 7 field players. BLACK 5 intercepts a pass and runs with the ball in the direction of the empty goal of WHITE team. Goalkeeper WHITE 12 enters the court under a correct substitution and runs in the same direction as BLACK 5. Just as BLACK 5 takes a shot on goal, goalkeeper WHITE 12 pushes BLACK 5 from the side, so that he partly loses body control and his shot misses the goal. What is the correct decision?","options":{"a":"Free throw for BLACK team","b":"7-metre throw for BLACK team","c":"Time-out","d":"2-minute suspension for WHITE 12","e":"Disqualification for WHITE 12 (red card shown by the referees)"},"correct":["b","c","d"],"rules":"2:8, 8:5 comments and Guideline, 14:1a"},{"id":"8.66","chapter":"8","stem":"The score is 26:26 with 4 seconds left in the match. WHITE team are in attack. A free throw is caused for WHITE 4. WHITE 4 immediately executes the free throw. The ball is actively blocked by BLACK 5, who is standing too close. At the same time, the final signal sounds. What is the correct decision?","options":{"a":"The free throw must be retaken.","b":"7-metre throw for WHITE team","c":"2-minute suspension for BLACK 5","d":"Disqualification for BLACK 5 (red card shown by the referees)"},"correct":["b","d"],"rules":"8:11a and Guideline"},{"id":"8.67","chapter":"8","stem":"The score is 26:26 with 4 seconds left in the match. WHITE team are in attack. BLACK 5 causes a free throw for WHITE 6. BLACK 5 immediately moves back to the correct distance. WHITE 6 executes the free throw, and the ball hits BLACK 5, who does not take an active action. The ball rebounds back to WHITE 6. At the same time, the final signal sounds. What is the correct decision?","options":{"a":"No further action. The match is over","b":"The free throw must be retaken.","c":"7-metre throw for WHITE team","d":"2-minute suspension for BLACK 5","e":"Disqualification for BLACK 5"},"correct":["a"],"rules":"2:3, 2:4, Guideline 8:11a"},{"id":"8.68","chapter":"8","stem":"The score is 29:29 with 20 seconds left in the match. Goalkeeper WHITE 12 saves a shot on goal, and the ball crosses the outer goal line. The referees decide on goalkeeper throw for WHITE team. WHITE 12 wants to quickly execute the goalkeeper throw. BLACK 2 runs into the goal area and delays the execution of the throw. What is the correct decision?","options":{"a":"Time-out","b":"Goalkeeper throw for WHITE team after whistle signal","c":"Free throw for WHITE team after whistle signal","d":"7-metre throw for WHITE team","e":"2-minute suspension for BLACK 2","f":"Disqualification for BLACK 2 (red card shown by the referees)","g":"Disqualification for BLACK 2 with written report (red and blue cards shown by the referees)"},"correct":["a","d","f"],"rules":"2:8, 8:11a, New Guideline"},{"id":"8.69","chapter":"8","stem":"The score is 29:29 with 20 seconds left in the match. Goalkeeper WHITE 12 saves a shot on goal, and the ball crosses the outer goal line. The referees decide on goalkeeper throw for WHITE team. WHITE 12 gets ready to execute the goalkeeper throw. Before the ball has left his hand, a whistle signal sounds from the timekeeper because of a faulty substitution made by BLACK team. BLACK 3 has entered the court before BLACK 11 has left it. What is the correct decision?","options":{"a":"Time-out","b":"Goalkeeper throw for WHITE team after whistle signal","c":"Free throw for WHITE team at the substitution area of BLACK team","d":"7-metre throw for WHITE team","e":"2-minute suspension for BLACK 3","f":"Disqualification for BLACK 3 (red card shown by the referees)"},"correct":["a","d","f"],"rules":"2:8, 8:11a, New Guideline"},{"id":"8.70","chapter":"8","stem":"The score is 29:29 with 20 seconds left in the match. Goalkeeper WHITE 12 saves a shot on goal, and the ball crosses the outer goal line. The referees decide on goalkeeper throw for WHITE team. WHITE 12 executes the throw as a pass to WHITE 9, who is standing just outside the goal area. Before the ball has crossed the goal-area line, a whistle signal sounds from the timekeeper because of a faulty substitution made by BLACK team. BLACK 3 has entered the court before BLACK 11 has left it. What is the correct decision?","options":{"a":"Time-out","b":"Free throw for WHITE team at the substitution area of BLACK team","c":"7-metre throw for WHITE team","d":"2-minute suspension for BLACK 3","e":"Disqualification for BLACK 3 (red card shown by the referees)"},"correct":["a","c","e"],"rules":"2:8, 8:11a, New Guideline"},{"id":"8.71","chapter":"8","stem":"The score is 29:29 with 10 seconds left in the match. WHITE team are in a counter-attack. BLACK 10 attacks WHITE 9 in a way that is dangerous to his health. Before falling, WHITE 9 plays the ball to WHITE 11. WHITE 11 takes a shot on goal, but the ball is saved by goalkeeper BLACK 12. What is the correct decision?","options":{"a":"2-minute suspension for BLACK 10","b":"Disqualification for BLACK 10 (red card shown by the referees)","c":"Goalkeeper throw for BLACK team","d":"Free throw for WHITE team","e":"7-metre throw for WHITE team","f":"Time-out"},"correct":["b","e","f"],"rules":"2:8, 8:5, 8:11b, 14:2, New Guideline"},{"id":"8.72","chapter":"8","stem":"The score is 29:29 with 10 seconds left in the match. WHITE team are in a counter-attack. BLACK 10 attacks WHITE 9 in a way that is dangerous to his health. Before falling, WHITE 9 plays the ball to WHITE 11. WHITE 11 scores a goal. What is the correct decision?","options":{"a":"2-minute suspension for BLACK 10","b":"Disqualification for BLACK 10 (red card shown by the referees)","c":"Goal for WHITE team","d":"Free throw for WHITE team","e":"7-metre throw for WHITE team","f":"Time-out"},"correct":["b","c","f"],"rules":"2:8, 8:5, 8:11b, 14:2, New Guideline"},{"id":"8.73","chapter":"8","stem":"The score is 29:29 with 10 seconds left in the match. WHITE team are in a counter-attack. BLACK 10 attacks WHITE 9 in a way that is dangerous to his health. Before falling, WHITE 9 plays the ball to WHITE 11. WHITE 11 plays the ball to WHITE 4. What is the correct decision?","options":{"a":"2-minute suspension for BLACK 10","b":"Disqualification for BLACK 10 (red card shown by the referees)","c":"Referee whistles after the pass from WHITE 11 to WHITE 4","d":"Free throw for WHITE team","e":"7-metre throw for WHITE team","f":"Time out"},"correct":["b","c","e","f"],"rules":"2:8, 8:11b, Guidelines, 14:2"},{"id":"8.74","chapter":"8","stem":"WHITE 7 is in a counterattack. He has a clear chance of scoring and takes an unhindered shot on goal. The ball hits goalkeeper BLACK 12 in the head, and he falls to the floor. The rebounding ball is recovered by WHITE 9 who has a clear chance of scoring at the goal-area line of BLACK team. At that moment, the referees whistle to call for medical treatment for goalkeeper BLACK 12. What is the correct decision?","options":{"a":"2-minute suspension for WHITE 7.","b":"Goalkeeper throw for BLACK team.","c":"Free throw for WHITE team.","d":"7-metre throw for WHITE team.","e":"Free throw for BLACK team.","f":"No punishment for WHITE 7.","g":"Goalkeeper BLACK 12 must leave the court and can only re-enter after his team have completed 3 attacks.","h":"Time-out."},"correct":["a","e","h"],"rules":"2:8, 4:11, 13:1a, Clarification 8"},{"id":"8.75","chapter":"8","stem":"WHITE team leads by one goal with 7 seconds left until the end of the match. WHITE team are ready to execute a throw-off from the throw-off area, and the referees give the whistle signal for the execution. Instead of passing the ball to a teammate, WHITE 7 puts the ball down on the floor inside the throw-off area and walks away. No teammates are interested in entering the throw-off area to pick up the ball. What is the correct decision?","options":{"a":"Correction of the throw-off.","b":"Time-out.","c":"The referees must wait 3 seconds after the whistle signal for the execution before they can give a free throw for BLACK team.","d":"Direct 2-minute suspension for WHITE 7.","e":"Free-throw for BLACK team."},"correct":["b","d","e"],"rules":"2:8, 8:8, 13:1a"},{"id":"8.76","chapter":"8","stem":"BLACK 8 breaks through the defence of WHITE team and has no players between himself and the goalkeeper WHITE 1. When he is about to shoot on goal, he is pushed from the side by WHITE 7. Even if he partly loses body control, he is able to shoot hard on goal. The ball hits the head of goalkeeper WHITE 1, changes direction and goes into the goal. What is the correct decision?","options":{"a":"Goal for BLACK team","b":"Free throw for WHITE team","c":"Direct 2-minute suspension for BLACK 8","d":"Direct 2-minute suspension for WHITE 7","e":"7-metre throw for BLACK team","f":"Time-out"},"correct":["a","d","f"],"rules":"2:8, 8:4, 8:8d, 13:2"},{"id":"8.77","chapter":"8","stem":"Line player BLACK 8 receives the ball. When he is trying to turn towards the goal, he is strongly held and pulled down by WHITE 7. However, he still regains full body control. Without any players between himself and the goalkeeper, he jumps above the goal area. He shoots hard with full body control. The ball hits goalkeeper WHITE 1 in the head. The head is the first point of contact with the ball. The ball changes direction and goes into the goal. What is the correct decision?","options":{"a":"Goal for BLACK team","b":"Free throw for WHITE team","c":"Free throw for BLACK team","d":"7-metre throw for BLACK team","e":"Direct 2-minute suspension for BLACK 8","f":"Direct 2-minute suspension for WHITE 7","g":"Time-out"},"correct":["b","e","f","g"],"rules":"2:8, 8:4, 8:8d, 13:1a"},{"id":"8.78","chapter":"8","stem":"Wing player BLACK 3 has a clear chance of scoring and takes a shot on goal. The ball touches the side of the head of goalkeeper WHITE 1 without changing direction. The ball goes into the goal. What is the correct decision?","options":{"a":"Direct 2-minute suspension for BLACK 3.","b":"Progressive punishment for WHITE 1.","c":"Goal.","d":"Free throw for WHITE team."},"correct":["c"],"rules":"2:8, 4:11, Clarification 8, 8:8d"},{"id":"8.79","chapter":"8","stem":"Wing player BLACK 3 has a clear chance of scoring and takes a shot on goal. The ball hits the side of the head of goalkeeper WHITE 1 and changes direction. The head is the first point of contact with the ball. The ball goes into the goal. WHITE 1 falls to the floor, puts his hand on his head, and clearly needs medical assistance. What is the correct decision?","options":{"a":"Time-out.","b":"The referees call for medical assistance for WHITE 1 by showing hand signals 15 and 16.","c":"Direct 2-minute suspension for BLACK 3.","d":"Progressive punishment for WHITE 1.","e":"Goal.","f":"Free throw for WHITE team.","g":"After receiving medical assistance WHITE 1 must leave the court and can only re-enter after his team completed 3 attacks."},"correct":["a","b","c","f"],"rules":"2:8, 4:11, Clarification 8, 13:1a"},{"id":"8.80","chapter":"8","stem":"With 10 seconds left in the match, BLACK team are in attack. While the ball is in play, BLACK 10 intentionally hits WHITE 7 in the face with his elbow. WHITE 7 falls to the floor and lies there injured. What is the correct decision?","options":{"a":"Disqualification without written report for BLACK 10 (red card shown by the referees).","b":"Disqualification with written report for BLACK 10 (red and blue cards shown by the referees).","c":"Time-out","d":"The game is restarted with a free throw for WHITE team.","e":"The game is restarted with a 7-metre throw for WHITE team.","f":"The referees may give permission for two persons from WHITE team to enter the court to assist WHITE 7.","g":"After receiving medical care on the court, WHITE 7 must leave the court and can only re- enter following the third attack of his team."},"correct":["b","c","d","f"],"rules":"2:8, 4:11, 8:6, 13:1a, Clarification 8"},{"id":"8.81","chapter":"8","stem":"WHITE team play with empty goal. BLACK 7 intercepts a pass and takes a shot at the empty goal. WHITE 4 catches the ball while he is running just outside the goal area. He is not able to stop and enters the goal area with both feet and the ball in his hands. What is the correct decision?","options":{"a":"Free throw for BLACK team","b":"7-metre throw for BLACK team","c":"Progressive punishment for WHITE 4","d":"2-minute suspension for WHITE 4","e":"No punishment","f":"Time-out"},"correct":["a","e"],"rules":"8:8i, 14:1"},{"id":"9.1","chapter":"9","stem":"WHITE 7 is standing in the centre of defence, when BLACK 3 tries to play a bounce pass to the line player. WHITE 7 tries to stop the ball by clearly lifting his foot. While doing so he kicks the ball into the goal of WHITE team. Correct decision?","options":{"a":"Free throw for BLACK team","b":"Goal for BLACK team","c":"7-metre throw for BLACK team","d":"2-minute suspension against WHITE 7"},"correct":["b","d"],"rules":"7:8, 9:1, 13:2, 16:1b"},{"id":"9.2","chapter":"9","stem":"A shot by WHITE 5 bounces back from the goalpost of BLACK team. It deflects off the foot of BLACK 3, who is standing in the playing area, into the goal of BLACK team. Correct decision?","options":{"a":"Free throw for WHITE team","b":"Goal for WHITE team","c":"7-metre throw for WHITE team","d":"Goalkeeper throw for BLACK team"},"correct":["b"],"rules":"7:8, 9:1, 13:2"},{"id":"9.3","chapter":"9","stem":"The ball has been stopped by goalkeeper WHITE 1 and bounces back from defender WHITE 3’s back, who is standing two metres inside the goal area, into the goal of WHITE team. Correct decision?","options":{"a":"Free throw for BLACK team","b":"7-metre throw for BLACK team","c":"Progressive punishment against WHITE 3","d":"Goal for BLACK team"},"correct":["d"],"rules":"6:3b, 9:1, 13:2"},{"id":"9.4","chapter":"9","stem":"Goalkeeper WHITE 1 holds the ball for four seconds in a position where three quarters of the ball have already passed the goal line. Correct decision?","options":{"a":"Goal for BLACK team","b":"Free throw for BLACK team","c":"Goalkeeper throw for WHITE team"},"correct":["c"],"rules":"6:4, 9:1, 12:1"},{"id":"9.5","chapter":"9","stem":"WHITE 3 enters his team’s goal area and tries to stop a shot with his foot, but the ball deflects off his foot into the goal of WHITE team. Correct decision?","options":{"a":"Free throw for BLACK team","b":"7-metre throw for BLACK team","c":"Goal for BLACK team","d":"Goalkeeper throw for WHITE team"},"correct":["c"],"rules":"9:1, 14:2"},{"id":"9.6","chapter":"9","stem":"WHITE 11 takes a lob shot over goalkeeper BLACK 1, who is standing far in front of the goal. Just before the ball crosses the goal line, the manager of BLACK team, who has been sitting in the first spectators’ row behind the goal and is not listed on the score sheet, pushes the ball away. Correct decision?","options":{"a":"7-metre throw for WHITE team","b":"Goal for WHITE team","c":"Disqualification of BLACK team’s manager with written report (red and blue cards shown by the referees)","d":"Written report"},"correct":["b","d"],"rules":"9:1, comment"},{"id":"9.7","chapter":"9","stem":"The score is 25:25 with two seconds to play in the match. An official of WHITE team (home team), who is not listed on the score sheet, intercepts the ball, which is flying high in the direction of the empty goal. This action spoils a goal for BLACK team. Immediately after this action, the final signal sounds. Correct decision?","options":{"a":"The final score is 25:25.","b":"7-metre throw for BLACK team","c":"The final score is 25:26.","d":"Disqualification of the official with written report (red and blue cards shown by the referees)","e":"Written report"},"correct":["c","e"],"rules":"9:1, comment"},{"id":"9.8","chapter":"9","stem":"BLACK 9 takes a 7-metre throw and scores. WHITE team immediately takes a fast throw-off after the referee’s whistle. After two passes, WHITE 4 scores a goal. At this moment, the timekeeper whistles and informs that BLACK 9, who has returned to the bench in the meantime, had 20 seconds left of a 2-minute suspension at the time of the 7-metre throw. Correct decision?","options":{"a":"7-metre throw for BLACK team must be repeated","b":"BLACK 9 receives additional suspension","c":"Both goals are valid.","d":"Both goals are invalid."},"correct":["b","c"],"rules":"4:6, 9:1, 9:2, 16:3a"},{"id":"9.9","chapter":"9","stem":"Just before the end of the match, when the result is 22:21 for his team, WHITE 5 has correctly executed a throw-off. The ball goes back in the direction of the goal of WHITE team. Goalkeeper WHITE 1 does not touch the ball, as he is in his goal area. The ball goes into the goal. The teammates of WHITE 5 had crossed the centre line after the referee’s whistle, but before the ball was played, running in the direction of the goal of BLACK team. Correct decision?","options":{"a":"Goal for BLACK team","b":"Free throw for BLACK team","c":"Repetition of the throw-off after whistle signal","d":"Personal punishment for WHITE 5","e":"Time-out"},"correct":["a"],"rules":"9:1, 15:2"},{"id":"9.10","chapter":"9","stem":"WHITE 9 tries to stop a low shot with his lower leg by clearly lifting his foot. In doing so he kicks the ball, which goes into his own goal. This is the second time that he tries to stop a shot with his leg. Correct decision?","options":{"a":"Goal for BLACK team","b":"Free throw for BLACK team","c":"2-minute suspension against WHITE 9"},"correct":["a","c"],"rules":"8:7e, 9:1, 16:1b"},{"id":"10.1","chapter":"10","stem":"WHITE team wins the coin toss and decides to start with the ball. The representative of BLACK team wants to change ends. Correct decision?","options":{"a":"Change ends","b":"Change ends if WHITE team agrees","c":"Repeat coin toss","d":"Do not change ends"},"correct":["a"],"rules":"10:1"},{"id":"10.2","chapter":"10","stem":"WHITE team win the coin toss and want to change ends. BLACK team want WHITE team to take the throw-off. Correct decision?","options":{"a":"Throw-off by WHITE team","b":"Change ends and throw-off by BLACK team","c":"Repeat coin toss","d":"The team representatives must come to an agreement."},"correct":["b"],"rules":"10:1"},{"id":"10.3","chapter":"10","stem":"(Without throw-off area) From where can the throw-off be executed?","options":{"a":"Up to 3 metres behind the centre line in the team’s own half","b":"Up to 3 metres across the centre line on the opponent’s half of the court","c":"At the centre of the court with one foot on the centre line and the other foot on or behind the line, with a sideways tolerance of about 1.5 metres"},"correct":["c"],"rules":"10:3a"},{"id":"10.4","chapter":"10","stem":"(Without throw-off area) The score is 15:15, and just before the end of the game, BLACK team score to make it 15:16. WHITE team want to quickly take the throw-off. The player with the ball stands at the centre of the court with one foot in front of the centre line and one foot behind the line. Correct decision?","options":{"a":"Correction; then whistle signal for executing the throw-off","b":"Position is correct; whistle signal for executing the throw-off","c":"Time-out; correction; whistle signal for executing the throw-off"},"correct":["a"],"rules":"10:3a, 15:1, 15:6"},{"id":"10.5","chapter":"10","stem":"WHITE team is about to execute a throw-off. Goalkeeper BLACK 1 is not yet in his goal area. The court referee still whistles for the match to begin, and WHITE 9 immediately scores a goal. Correct decision?","options":{"a":"Free throw for WHITE team from the centre line","b":"Repeat the throw-off","c":"Goal for WHITE team","d":"Free throw for BLACK team"},"correct":["c"],"rules":"9:1, 10:4, 15:2"},{"id":"10.6","chapter":"10","stem":"(Without throw-off area) Which of the following statements about the throw-off are correct?","options":{"a":"The throw-off must be taken from the centre of the court within three seconds after the whistle signal and must be thrown into the opponents’ half of the court.","b":"A goal against the opponents can be scored directly from a throw-off.","c":"Illegal positions of the defending team must be corrected.","d":"If the thrower dribbles the ball after the whistle signal for executing the throw-off, then a free throw must be given to the opponents.","e":"The teammates of the thrower are allowed to cross the centre line, before the throw has been taken."},"correct":["b","d","e"],"rules":"10:3a, 15:2, 15:3, 15:4"},{"id":"10.7","chapter":"10","stem":"(Without throw-off area) BLACK 6 stands for a throw-off in the centre of the court with one foot on the centre line and one foot in his team’s half of the court. The referee whistles. Before the ball has left his hand, the thrower runs over the centre line. At the time of the whistle, there were still players from WHITE team in BLACK team’s half of the court. Correct decision?","options":{"a":"Game continues without interruption","b":"Free throw for WHITE team","c":"Correction of the positions of WHITE team and repeated throw-off after whistle signal","d":"Correction of the position of BLACK 6 and repeated throw-off after whistle signal"},"correct":["b"],"rules":"10:3a, 15:7"},{"id":"10.8","chapter":"10","stem":"(With throw-off area) WHITE team scored a goal. BLACK team want to execute a fast throw- off. BLACK 9 is in a correct position inside the throw-off area. After the referees whistled for the execution, BLACK 9 takes 6 steps with the ball inside the throw-off area. Within 3 seconds after the whistle signal for the execution of the throw-off, BLACK 9 throws the ball into the empty goal of WHITE team. What is the correct decision?","options":{"a":"Goal for BLACK team","b":"Free throw for WHITE team","c":"Correction, and new throw-off after whistle signal from the referees."},"correct":["a"],"rules":"10:3b, 15:5b"},{"id":"10.9","chapter":"10","stem":"(With throw-off area) WHITE team scored a goal. BLACK team want to execute a fast throw- off. BLACK 9 receives the ball. He has the ball and one foot completely inside the throw-off area. The other foot is outside the throw-off area. The referees whistle for the execution of the throw. After BLACK 9 moved the other foot inside the throw-off area, he throws the ball into the empty goal of WHITE team. What is the correct decision?","options":{"a":"Goal for BLACK team","b":"Free throw for WHITE team","c":"Correction, new throw-off for BLACK team after whistle signal from the referees","d":"The throw is executed correctly as the referees have approved the position of the thrower by giving the whistle signal for the execution.","e":"The referees should have waited until the thrower was inside the throw-off area with the ball and all his body before giving the whistle signal for the execution of the throw-off"},"correct":["a","d","e"],"rules":"10:3b, 15:5"},{"id":"10.10","chapter":"10","stem":"(With throw-off area) BLACK team want to execute a fast throw-off from the throw-off area. At the same time as BLACK 8 is running with his body and the ball completely inside the throw-off area, WHITE 7 is also inside the throw-off area, running in the direction of his own goal. With no teammates in the direction of WHITE 7, BLACK 8 throws the ball into the back of WHITE 7. WHITE 7 is inside the throw-off area, when the ball hits him. What is the correct decision?","options":{"a":"Free throw for WHITE team","b":"Free throw for BLACK team","c":"7-metre throw for BLACK team","d":"Progressive punishment for WHITE 7","e":"Progressive punishment for BLACK 8","f":"Direct 2-minute suspension for BLACK 8"},"correct":["a","f"],"rules":"8:8, 10:3b, 13:1a"},{"id":"10.11","chapter":"10","stem":"(With throw-off area) Which of the following statements regarding the throw-off area are incorrect?","options":{"a":"The whistle signal for the execution of the throw-off can be given when the thrower has a part of the body inside the throw-off area.","b":"There is no restriction regarding the positions of the teammates of the thrower during the execution of a throw-off.","c":"The thrower is allowed to step outside the throw-off area during the execution of the throw-off.","d":"A player from defending team is allowed to intercept the ball after the execution, even if the ball still is inside the throw-off area.","e":"The thrower is not allowed to bounce the ball after the whistle signal for the execution."},"correct":["a","b","c","d"],"rules":"10.3b"},{"id":"10.12","chapter":"10","stem":"(With throw-off area) WHITE team plays with 7 court players and scores a goal. BLACK team wants to execute a fast throw-off. BLACK 6 is inside the throw-off area with his entire body and the ball. The referees whistle for the execution. WHITE 8 clearly enters the throw-off area with active arms trying to block the ball and interferes with the execution. Even so, BLACK 6 who has his entire body and the ball inside the throw-off area executes the throw-off as a shot at the empty goal. The ball crosses the outer goal line. What is the correct decision?","options":{"a":"Goalkeeper throw for WHITE team.","b":"New throw-off after whistle signal.","c":"Free throw for BLACK team.","d":"7-metre throw for BLACK team.","e":"Time-out.","f":"Progressive punishment for WHITE 8.","g":"Direct 2-minute suspension for WHITE 8.","h":"Disqualification for WHITE 8 (red card shown by the referees)."},"correct":["d","e","g"],"rules":"2:8, 8:8g, 10:3b, 14:1a, Clarification 6"},{"id":"10.13","chapter":"10","stem":"(With throw-off area) Which of the following statements about the throw-off area are correct?","options":{"a":"The throw-off is to be executed within 3 seconds of the whistle signal for the execution.","b":"A throw-off can lead to a goal for the executing team.","c":"In connection with a throw-off, wrong positions of defending players must be corrected.","d":"If the thrower jumps after the whistle signal for the execution of the throw, the correct decision is free throw for the opponents.","e":"The teammates of the thrower are not allowed to cross the centre line at any time before the whistle signal for the execution of the throw."},"correct":["a","b","d"],"rules":"10:3b, 15:2"},{"id":"10.14","chapter":"10","stem":"(With throw-off area) When can a referee whistle for the execution of a throw-off?","options":{"a":"When the thrower has at least one foot and the ball inside the throw-off area, and the other foot is not outside the throw-off area on the opponent’s half of the court.","b":"When the thrower has at least one foot inside the throw-off area, and the other foot is not outside the throw-off area on the opponent’s half of the court, but the ball is still outside the throw-off area.","c":"When the thrower has at least one foot and the ball inside the throw-off area, and the other foot is outside the throw-off area on the opponent’s half.","d":"When the thrower has at least one foot and the ball inside the throw-off area, the other foot is outside the throw-off area on the opponent’s half of the court, but teammates of the thrower are inside the throw-off area on the opponent’s half of the court.","e":"When the thrower is inside the throw-off area with his entire body and the ball."},"correct":["e"],"rules":"10:3b"},{"id":"11.1","chapter":"11","stem":"WHITE 3 is executing a throw-in from a position two metres outside the sideline. Correct decision?","options":{"a":"No decision required, as this is allowed","b":"Free throw for BLACK team","c":"Repeat the throw-in without whistle signal","d":"Repeat the throw-in after whistle signal"},"correct":["d"],"rules":"11:4, 15:1, 15:5"},{"id":"11.2","chapter":"11","stem":"BLACK 4 stands with one foot on the sideline and the other foot in the playing area. He executes a throw-in and scores a goal directly. Correct decision?","options":{"a":"Goal for BLACK team","b":"Repeat the throw-in for BLACK team after whistle signal","c":"Free throw for WHITE team","d":"Goalkeeper throw for WHITE team"},"correct":["a"],"rules":"11:4, 15:2"},{"id":"11.3","chapter":"11","stem":"WHITE 6 executes a throw-in standing with one foot inside the court and the other foot one metre outside the sideline. He throws the ball into the goal of BLACK team. Correct decision?","options":{"a":"Repeated throw-in for WHITE team after whistle signal","b":"Free throw for BLACK team","c":"Goal for WHITE team","d":"Goalkeeper throw for BLACK team"},"correct":["a"],"rules":"11:4, 15:1, 15:5"},{"id":"11.4","chapter":"11","stem":"WHITE 11 takes a shot on goal. The ball rebounds from the crossbar and hits equipment, which hangs from the ceiling over the goal area of BLACK team. From there the ball falls down into the arms of goalkeeper BLACK 1. Correct decision?","options":{"a":"Goalkeeper throw for BLACK team","b":"Throw-in for BLACK team","c":"Free throw for BLACK team after whistle signal","d":"Throw-in for BLACK team after whistle signal","e":"Mandatory time-out"},"correct":["b"],"rules":"11:1"},{"id":"11.5","chapter":"11","stem":"During the execution of throws following an interruption of the game, when is the defending team allowed to be closer than 3 metres from the ball?","options":{"a":"As soon as the referee has given the signal for the execution of the throw","b":"When the ball has left the hand of the player executing a free throw","c":"In case of a free throw or throw-in, when the players are positioned at their own goal-area line","d":"During the execution of a goalkeeper throw or a throw-off, when the defending player is standing outside the goal area or the throw-off area."},"correct":["b","c","d"],"rules":"11:5, 13:8, 15:4"},{"id":"11.6","chapter":"11","stem":"WHITE 5 fails to catch a pass. He runs after the ball and stops it before it crosses the sideline, but he himself cannot avoid crossing the sideline afterwards. Correct decision?","options":{"a":"Game continues without interruption","b":"Free throw for BLACK team","c":"Throw-in for BLACK team"},"correct":["a"],"rules":"11:1"},{"id":"12.1","chapter":"12","stem":"While executing a goalkeeper throw, goalkeeper WHITE 1 touches his goal-area line with one foot. Correct decision?","options":{"a":"Goalkeeper throw is to be retaken after whistle signal","b":"Free throw for BLACK team","c":"Let the game continue without interruption"},"correct":["c"],"rules":"1:3, 12:2"},{"id":"12.2","chapter":"12","stem":"After the whistle for the execution of a 7-metre throw, goalkeeper WHITE 12 steps on the goalkeeper’s restraining line with one foot. The 7-metre throw goes over the crossbar. Correct decision?","options":{"a":"7-metre throw is to be retaken after whistle signal","b":"Since there is no goal, the game continues with a goalkeeper throw.","c":"The position of the goalkeeper is correct."},"correct":["b","c"],"rules":"1:3, 12:1, 14:9"},{"id":"12.3","chapter":"12","stem":"Goalkeeper WHITE 1 stops a shot and dives for the ball, which rolls in the goal area towards the playing area. BLACK 7 is unmarked and ready to pick up the ball. At the very last moment, WHITE 1 uses his hand to hit the ball over the outer goal line. Correct decision?","options":{"a":"Free throw for BLACK team","b":"Throw-in for BLACK team","c":"Goalkeeper throw for WHITE team","d":"Free throw for WHITE team"},"correct":["c"],"rules":"12:1"},{"id":"12.4","chapter":"12","stem":"While executing a goalkeeper throw, goalkeeper WHITE 12 drops the ball. The ball hits his foot. From there the ball crosses the goal-area line into the playing area. WHITE 12 runs after the ball, picks it up and returns to his goal area to repeat the goalkeeper throw. Correct decision?","options":{"a":"7-metre throw for BLACK team","b":"Free throw for BLACK team","c":"Time-out","d":"Correction, goalkeeper throw after whistle signal"},"correct":["d"],"rules":"12:2, 15:5b"},{"id":"12.5","chapter":"12","stem":"When is a goalkeeper throw considered as executed, so that the ball may be played by a court player?","options":{"a":"When the ball is still in the air above the goal area","b":"When the ball has left the hand of the goalkeeper, passed the goal-area line and entered the playing area","c":"When the ball has left the hand of the goalkeeper","d":"When a teammate of the goalkeeper has touched the ball"},"correct":["b"],"rules":"12:2"},{"id":"12.6","chapter":"12","stem":"Goalkeeper WHITE 12 is executing a goalkeeper throw. BLACK 10, who is standing outside the goal-area line, legally tries to gain possession of the ball. He succeeds and scores a goal. Correct decision?","options":{"a":"Free throw for WHITE team","b":"Goal for BLACK team","c":"Goalkeeper throw for WHITE team","d":"Progressive punishment against BLACK 10"},"correct":["b"],"rules":"12:2"},{"id":"12.7","chapter":"12","stem":"Goalkeeper WHITE 12 stops a shot, deflecting the ball across the outer goal line next to the goal. Which hand signals should the goal-line referee show, if necessary?","options":{"a":"Number 8 (goalkeeper throw)","b":"Number 9 (free-throw direction)","c":"First number 9 (free-throw direction), then number 8 (goalkeeper throw)","d":"First number 8 (goalkeeper throw), then number 9 (free-throw direction)"},"correct":["a"],"rules":"12:1 – Hand signals"},{"id":"12.8","chapter":"12","stem":"Goalkeeper WHITE 1 loses the ball while executing a goalkeeper throw. The ball bounces in the direction of the playing area, where BLACK 6 is waiting for the ball. WHITE 2 dives over the goal area and pushes the ball, which is in the air, over the sideline. Correct decision?","options":{"a":"Goalkeeper throw for WHITE team after whistle signal","b":"Throw-in for BLACK team","c":"Free throw for BLACK team","d":"7-metre throw for BLACK team"},"correct":["a"],"rules":"12:2"},{"id":"12.9","chapter":"12","stem":"Which of the following statements about the goalkeeper throw are correct?","options":{"a":"The goalkeeper throw is considered as taken when the ball has left the goalkeeper’s hand.","b":"The opponents must keep a distance of 3 metres.","c":"The goalkeeper throw is considered as taken when the ball has left the hand of the goalkeeper and has passed the goal-area line.","d":"The opponents are allowed to stand directly outside the goal-area line."},"correct":["c","d"],"rules":"12:2"},{"id":"12.10","chapter":"12","stem":"There is a goalkeeper throw for BLACK team. Goalkeeper BLACK 1 is in a hurry, because his team is behind in the game. While executing the goalkeeper throw, the ball slides out of his hand and goes to BLACK 6, who is still in the goal area. BLACK 6 rolls the ball back to BLACK 1 using his foot. Correct decision?","options":{"a":"Goalkeeper throw for BLACK team after whistle signal","b":"Free throw for WHITE team","c":"7-metre throw for WHITE team"},"correct":["a"],"rules":"12:2"},{"id":"12.11","chapter":"12","stem":"Which of the following statements about the goalkeeper throw are correct?","options":{"a":"The players from the opponents’ team must remain outside the free-throw line until the ball is in play.","b":"The players from the opponents’ team must remain outside the goal-area line and 3 metres away from the position where the goalkeeper executes the goalkeeper throw.","c":"The players from the opponents’ team are allowed to touch the ball before it has crossed the goal-area line.","d":"The goalkeeper cannot score an own goal when he is executing a goalkeeper throw.","e":"The goalkeeper cannot score a direct goal against the opponents with a goalkeeper throw.","f":"While executing a goalkeeper throw, the goalkeeper is not allowed to touch the goal-area line."},"correct":["d"],"rules":"9:1, 12:2, 15:2"},{"id":"13.1","chapter":"13","stem":"There is a free throw for WHITE team. Before WHITE 5 can pick up the ball, BLACK 6 picks it up, puts it under his arm and runs towards his goal. After a few steps, he rolls the ball back to WHITE 5. Correct decision?","options":{"a":"2-minute suspension for BLACK 6","b":"Free throw for WHITE team after whistle signal","c":"Warning for BLACK 6","d":"Game continues without interruption","e":"Time-out"},"correct":["a","b","e"],"rules":"8:8b, 13:5, 15:5b, 16:3f"},{"id":"13.2","chapter":"13","stem":"BLACK 7 is in possession of the ball and tries to start a counter-attack but is held by WHITE 17. The referee is just about to whistle, but plays advantage, as BLACK 8 has just received the ball and takes a shot on goal of WHITE team. Goalkeeper WHITE 12 saves the shot and wants to start a counter-attack. Both teams have already received three warnings each earlier in the game. Correct decision?","options":{"a":"Game continues without interruption","b":"2-minute suspension for WHITE 17","c":"Goalkeeper throw for WHITE team","d":"Time-out","e":"Free throw for BLACK team"},"correct":["b","c","d"],"rules":"2:8a, 8:3, 13:2, 16:3b"},{"id":"13.3","chapter":"13","stem":"WHITE team receives a free throw. BLACK 6 is in possession of the ball. He brings the ball with him, four metres from the place where the free-throw is to be executed. Correct decision?","options":{"a":"Warning for BLACK 6","b":"2-minute suspension for BLACK 6","c":"Disqualification of BLACK 6 (red card shown by the referees)","d":"Free throw for WHITE team from the place of the infraction that has led to the free throw","e":"Free throw for WHITE team from the place where the ball is"},"correct":["b","d"],"rules":"8:8b, 13:5, 13:6 comment, 16:3f"},{"id":"13.4","chapter":"13","stem":"A free throw is awarded against WHITE 4, who then takes the ball, crosses the goal area and puts the ball down. Correct decision?","options":{"a":"2-minute suspension for WHITE 4","b":"Warning for WHITE 4","c":"7-metre throw for BLACK team","d":"Free throw for BLACK team"},"correct":["a","d"],"rules":"8:8b, 13:5, 16:3f"},{"id":"13.5","chapter":"13","stem":"WHITE 5 is in possession of the ball, when official B from WHITE team complains about the referees. The referees whistle, and the time is stopped. The referees warn official B from WHITE team. How should the game be resumed?","options":{"a":"Free throw after whistle signal for BLACK team at the substitution area of WHITE team","b":"Free throw after whistle signal for WHITE team at the substitution area of WHITE team","c":"Free throw after whistle signal for WHITE team, executed from the place where the ball was when the game was interrupted","d":"Throw-in for BLACK team at the substitution area of WHITE team"},"correct":["a"],"rules":"8:7a, 13:1a, 13:6, 16:1b"},{"id":"13.6","chapter":"13","stem":"The game is interrupted by a whistle from the court referee, even though there has been no violation of the rules by any of the teams. No team time-out has been called. BLACK 13 has thrown the ball in the direction of the goal of WHITE team immediately prior to the whistle signal from the court referee. After the whistle signal, the ball goes into the goal without a chance for goalkeeper WHITE 1 to save it. How should the game be resumed?","options":{"a":"Free throw for BLACK team","b":"Free throw for WHITE team","c":"7-metre throw for BLACK team","d":"Goal for BLACK team"},"correct":["a"],"rules":"13:4a"},{"id":"13.7","chapter":"13","stem":"WHITE 7 is in a counterattack. With one player from BLACK team between him and the goalkeeper, he shoots on goal and hits goalkeeper BLACK 12 in the head with the ball. BLACK 12 collapses. The ball rebounds to WHITE 9, who is standing alone at the goal-area line. WHITE 9 throws the ball in the direction of the empty goal. Just before the ball crosses the goal line, the referee whistles and interrupts the game. Goalkeeper BLACK 12 needs medical care on the court. Correct decision?","options":{"a":"Goal for WHITE team","b":"7-metre throw for WHITE team","c":"Free throw for WHITE team after whistle signal","d":"Time-out","e":"BLACK 12 must leave the court and can only re-enter following the third attack of his team."},"correct":["c","d"],"rules":"4:11, 8:8d, 13:4b, Clarification 2 and 8"},{"id":"13.8","chapter":"13","stem":"There is a free-throw decision for BLACK 9, but WHITE 5 is still in possession of the ball. WHITE 5 moves towards one of the referees and politely gives the ball to him. Correct decision?","options":{"a":"2-minute suspension for WHITE 5 and free throw for BLACK team from the spot where the ball is now","b":"Warning for WHITE 5 and free throw for BLACK team from the spot where the ball is now","c":"2-minute suspension for WHITE 5 and free throw for BLACK team from the spot where the foul was committed","d":"Warning for WHITE 5 and free throw for BLACK team from the spot where the foul was committed"},"correct":["c"],"rules":"8:8b, 13:5, 13:6 comment, 16:3f"},{"id":"13.9","chapter":"13","stem":"WHITE 5 makes a faulty substitution after the referees have just awarded a 7-metre throw for WHITE team. Correct decision?","options":{"a":"Free throw for BLACK team","b":"7-metre throw for WHITE team","c":"2-minute suspension for WHITE 5","d":"Warning for the responsible team official from WHITE team"},"correct":["b","c"],"rules":"4:5, 13:3, 16:3a"},{"id":"13.10","chapter":"13","stem":"Which of the following statements about the place of execution of a free throw are correct?","options":{"a":"If the ball is not put down immediately after the free-throw decision, the opponents are allowed to execute the free throw from the place where the ball is.","b":"After a faulty substitution, the free throw can be taken from where the ball is, instead of at the substitution area, if this is advantageous to the team executing the throw.","c":"After passive play, the free throw is always taken from the place where the ball was when the free throw was given.","d":"For a free throw from the centre line, the tolerance to the side is about the same as in case of a throw-off."},"correct":["b","c","d"],"rules":"7:11, 13:6, 13:6 comment"},{"id":"13.11","chapter":"13","stem":"BLACK 11 has the ball in attack and tries to go around WHITE 2. Because of a whistle signal from the spectators’ area, WHITE 2 stops defending. BLACK 11 is now free to shoot. Correct decision?","options":{"a":"7-metre throw for BLACK team","b":"Time-out; consultation with the timekeeper","c":"Free throw for WHITE team","d":"Free throw for BLACK team"},"correct":["b","d"],"rules":"13:4a"},{"id":"13.12","chapter":"13","stem":"WHITE team has the ball at the free-throw line of BLACK team. Official A from BLACK team protests so strongly against a referee decision that the referees interrupt the game. Correct decision?","options":{"a":"Progressive punishment for official A from BLACK team","b":"Free throw for WHITE team at the substitution area of BLACK team","c":"Free throw for WHITE team at the free-throw line of BLACK team"},"correct":["a","c"],"rules":"8:7, 13:6, Substitution Area Regulations 5+6"},{"id":"13.13","chapter":"13","stem":"BLACK 6 receives a warning. When whistling for the execution of the subsequent free throw for WHITE team, the court referee does not see WHITE 11, who is between the goal-area line and the free-throw line. WHITE 11 receives the ball and has a clear chance of scoring. The goal-line referee noticed the situation. Correct decision?","options":{"a":"Game continues without interruption","b":"Repeat the free throw after correction and whistle signal","c":"The goal-line referee decides on a free throw for BLACK team.","d":"The goal-line referee gives WHITE 11 a warning.","e":"Time-out"},"correct":["b"],"rules":"13:7, 15:1, 15:5b"},{"id":"13.14","chapter":"13","stem":"WHITE team are in possession of the ball. BLACK team have taken their positions in defence. WHITE 8 is running close to the sideline. WHITE 4 passes the ball in the direction of WHITE 8. WHITE 8 collides with a photographer, who is walking between the stands and the court and touching the sideline. WHITE 8 fails to catch the ball and loses body control. Before the referees interrupt the game, the ball passes the sideline. What is the correct decision?","options":{"a":"The game is restarted with a throw-in for BLACK team.","b":"The game is restarted with a free throw for WHITE team.","c":"Time-out","d":"Note in the match report in conformity with the regulations of the respective federation."},"correct":["b","c","d"],"rules":"13:4"},{"id":"13.15","chapter":"13","stem":"BLACK team are in attack. The referees give a free throw to BLACK 2. Before BLACK 2 can execute the free throw, BLACK 11 pulls WHITE 8 down. What is the correct decision?","options":{"a":"Free throw for BLACK team after whistle signal","b":"Free throw for WHITE team after whistle signal","c":"Time-out","d":"Progressive punishment for BLACK 11","e":"Direct 2-minute suspension for BLACK 11","f":"Disqualification for BLACK 11 (red card shown by the referees)"},"correct":["a","c","e"],"rules":"8:3, 8:4, 13:3"},{"id":"14.1","chapter":"14","stem":"The score is 20:20. BLACK 7 intercepts a pass from WHITE team and starts a counter-attack. No court player from WHITE team is able to stop him. A spectator runs onto the court and pulls BLACK 7 down to the ground. This leads to tumultuous scenes with even more spectators on the court. Team official A from BLACK team knocks down the spectator who has stopped BLACK 7. Correct decision?","options":{"a":"Suspend the match permanently","b":"Time-out; 7-metre throw for BLACK team; disqualification of team official A from BLACK team; reduce BLACK team on the court by 1 player for 2 minutes; written report (red and blue cards shown by the referees)","c":"Time-out; 7-metre throw for BLACK team; disqualification of team official A from BLACK team; reduce BLACK team on the court by 1 player for 2 minutes (red card shown by the referees)","d":"Time-out; 7-metre throw for BLACK team; 2-minute suspension of team official A from BLACK team; reduce BLACK team on the court by 1 player for 2 minutes"},"correct":["b"],"rules":"2:8a, 8:10a, 14:1c, 16:6b"},{"id":"14.2","chapter":"14","stem":"There is a throw-in for BLACK team. BLACK 7 executes the throw-in correctly and notices that goalkeeper WHITE 12 is standing outside his goal area. BLACK 7 throws the ball directly in the direction of the empty goal. Court player WHITE 3 enters the goal area and stops the ball. Correct decision?","options":{"a":"Goal","b":"Free throw for BLACK team","c":"7-metre throw for BLACK team","d":"Progressive punishment against WHITE 3","e":"Direct 2-minute suspension for WHITE 3"},"correct":["c","e"],"rules":"8:8i, 14:1a, 15:2"},{"id":"14.3","chapter":"14","stem":"WHITE 4 executes a 7-metre throw and hits the goalpost. The ball bounces back to WHITE 4 without touching any teammate or opponent. He throws the ball into the goal. Correct decision?","options":{"a":"Free throw for BLACK team","b":"Goalkeeper throw for BLACK team","c":"Goal for WHITE team"},"correct":["c"],"rules":"14:6"},{"id":"14.4","chapter":"14","stem":"WHITE 3 moves around BLACK 4 at the free-throw line of BLACK team. After taking three steps, he wants to take a shot on goal but is pushed by BLACK 4. Immediately after taking a fourth step, he scores a nice goal. No other player from BLACK team would have been able to intervene. Correct decision?","options":{"a":"Advantage and therefore goal for WHITE team","b":"Progressive punishment against BLACK 4","c":"Free throw for WHITE team","d":"7-metre throw for WHITE team"},"correct":["b","d"],"rules":"8:3c, 14:1a, 16:1a"},{"id":"14.5","chapter":"14","stem":"WHITE 9 executes a 7-metre throw, and the ball enters the goal. However, before the ball left the thrower’s hand, WHITE 4 had crossed the free-throw line. Correct decision?","options":{"a":"Goal for WHITE team","b":"Repeat the 7-metre throw","c":"Free throw for BLACK team","d":"Repeat the throw and warning for WHITE 4"},"correct":["c"],"rules":"13:1a, 14:7, 15:7"},{"id":"14.6","chapter":"14","stem":"BLACK 2 gets ready to execute a 7-metre throw after the referee’s whistle signal. At that moment, WHITE 5 crosses the free-throw line. Despite of WHITE 5’s action, BLACK 2 scores a goal. Correct decision?","options":{"a":"Goal and disqualification of WHITE 5 (red card shown by the referees)","b":"Goal and 2-minute suspension for WHITE 5","c":"Goal for BLACK team","d":"Repeated 7-metre throw and disqualification of WHITE 5"},"correct":["c"],"rules":"14:8"},{"id":"14.7","chapter":"14","stem":"While WHITE 6 is in possession of the ball and ready to execute a 7-metre throw, official A from BLACK team calls goalkeeper BLACK 12 to come off and be replaced. BLACK 12 is ready to follow this instruction. Correct decision?","options":{"a":"No action","b":"Warning for official A from BLACK team","c":"Warning for official A from BLACK team and BLACK 12","d":"Warning for BLACK 12"},"correct":["d"],"rules":"14:10, 16:1b"},{"id":"14.8","chapter":"14","stem":"WHITE 4 has taken a shot on BLACK team’s goal. The ball hits the goalpost and bounces back towards the playing area. WHITE 6 stands alone at the goal-area line and is ready to catch the ball. BLACK 4 clearly enters the goal area in order to push the ball over his team’s outer goal-line. Correct decision?","options":{"a":"7-metre throw for WHITE team","b":"Throw-in for WHITE team","c":"Free throw for WHITE team","d":"Goalkeeper throw for BLACK team"},"correct":["a"],"rules":"6:2c, 14:1a, Clarification 6"},{"id":"14.9","chapter":"14","stem":"WHITE 3 is executing a 7-metre throw. WHITE 5 crosses the free-throw line after the referee’s whistle, but before the ball has left WHITE 3’s hand. Correct decision?","options":{"a":"Repeat the 7-metre throw","b":"Free throw for BLACK team","c":"Goalkeeper throw for BLACK team","d":"Progressive punishment against WHITE 5"},"correct":["b"],"rules":"13:1a, 14:7, 15:7"},{"id":"14.10","chapter":"14","stem":"WHITE 9 is standing completely unmarked at the goal-area line of the opponents, ready to receive the ball. This is noticed by WHITE 10, who plays a bounce pass through the goal area towards WHITE 9. This is noticed by BLACK 3, who clearly enters his own goal area to stop the ball, standing with both feet in the goal area. It is the second time in the game that he takes this action. Correct decision?","options":{"a":"Free throw for WHITE team","b":"7-metre throw for WHITE team","c":"Progressive punishment for BLACK 3"},"correct":["b","c"],"rules":"8:7f, 14:1a, 16:1b, Clarification 6a"},{"id":"14.11","chapter":"14","stem":"Line player BLACK 10 legally blocks WHITE 2. When BLACK 10 gets ready to make his move, BLACK 4 plays a bounce pass into the open space where BLACK 10 could be able to break through. Before BLACK 10 can receive the ball, he is held back by WHITE 2, who grabs his shirt. Correct decision?","options":{"a":"Free throw for BLACK team","b":"7-metre throw for BLACK team, regardless of the positions of the opponents","c":"7-metre throw for BLACK team, if no other player from WHITE team could legally stop BLACK 10 from shooting","d":"Progressive punishment for WHITE 2","e":"Mandatory disqualification of WHITE 2 (red card shown by the referees)"},"correct":["c","d"],"rules":"8:2c, 14:1a, Clarification 6a"},{"id":"14.12","chapter":"14","stem":"WHITE 3 is in possession of the ball, running towards the goal of BLACK team in a counterattack resulting in a clear chance of scoring. While he executes a jump shot, there is a whistle signal from a spectator that distracts WHITE 3, so that he does not take a shot on goal. Instead, he stops with the ball in the goal area. Correct decision?","options":{"a":"Free throw for BLACK team after whistle signal","b":"7-metre throw for WHITE team","c":"Free throw for WHITE team","d":"Goalkeeper throw for BLACK team after whistle signal","e":"Statement in the match report in conformity with the regulations of the respective federation."},"correct":["b","e"],"rules":"14:1c"},{"id":"14.13","chapter":"14","stem":"WHITE team is running in a counter-attack, and the score is 26:26. WHITE 5 gets ready to take a shot on goal from the goal-area line of BLACK team. At the time, there is a whistle signal from the timekeeper, who indicates that the game is over. The referees determine that 20 seconds remain to be played. Correct decision?","options":{"a":"Free throw for WHITE team at the timekeepers table.","b":"7-metre throw for WHITE team.","c":"Statement in the match report in conformity with the regulations of the respective federation.","d":"Free throw for WHITE team from where the ball was when the whistle signal came."},"correct":["b","c"],"rules":"2:3, 14:1b, Clarification 6a"},{"id":"14.14","chapter":"14","stem":"Which of the following statements about the execution of a 7-metre throw are correct?","options":{"a":"The player executing the throw is allowed to stand up to one metre behind the 7-metre line.","b":"The referees must give a time-out, if the defending team is changing goalkeepers.","c":"The goalkeeper shall be given a personal punishment, if he repeatedly crosses the goalkeeper’s restraining line.","d":"The players of the defending team must always be 3 metres away from the thrower."},"correct":["a"],"rules":"14:3, 14:5, 14:8, 14:9"},{"id":"14.15","chapter":"14","stem":"WHITE 5 is in possession of the ball and jumps from the right corner into the goal area of BLACK team. He then collides with BLACK 11, who is standing with his arms up about 50cm inside the goal area. BLACK 11 has done this for the third time in the game. Correct decision?","options":{"a":"7-metre throw for WHITE team","b":"Offensive foul against WHITE 5","c":"2-minute suspension for BLACK 11","d":"Warning for BLACK 11"},"correct":["a","c"],"rules":"6:2c, 8:7f, 14:1a, 16:3a"},{"id":"14.16","chapter":"14","stem":"WHITE 6 is running in a counter-attack and has a clear chance of scoring, when the lights go out in the hall. Which of the following statements are correct?","options":{"a":"The referees wait for the result of the clear scoring chance.","b":"The referees interrupt the match immediately and give a time-out.","c":"After the lights are functioning again, the game is restarted with a free throw for WHITE team.","d":"After the lights are functioning again, the game is restarted with a 7-metre throw for WHITE team.","e":"Statement in the match report in conformity with the regulations of the respective federation."},"correct":["b","d","e"],"rules":"14:1c, Clarification 2a"},{"id":"14.17","chapter":"14","stem":"While WHITE 3 is executing a 7-metre throw, WHITE 5 crosses the free-throw line after the referee’s whistle signal, but before the ball has left the thrower’s hand. Goalkeeper BLACK 1 saves the shot. Correct decision?","options":{"a":"Repeat the 7-metre throw for WHITE team","b":"Free throw for BLACK team","c":"Goalkeeper throw for BLACK team"},"correct":["c"],"rules":"6:4, 12:1, 13:2, 14:7"},{"id":"14.18","chapter":"14","stem":"WHITE 2 is ready to execute a 7-metre throw. The court referee whistles, but WHITE 2 drops the ball to the floor. BLACK 3 immediately picks up the ball and plays it to BLACK 2, who scores a goal in a counter-attack. Correct decision?","options":{"a":"Goal for BLACK team","b":"Repetition of the 7-metre throw","c":"Free throw for BLACK team","d":"Time-out"},"correct":["a"],"rules":"13:2, 14:4, 15:2"},{"id":"14.19","chapter":"14","stem":"WHITE 6 has the ball at the free-throw line of BLACK team and is brought down through a reckless foul by BLACK 5. At the same time, BLACK 8 stands at the goal-area line of BLACK team between his own goal and WHITE 6. Correct decision?","options":{"a":"Free throw for WHITE team","b":"Disqualification of BLACK 5 without written report (red card shown by the referees)","c":"2-minute suspension for BLACK 5","d":"7-metre throw for WHITE team"},"correct":["a","b"],"rules":"8:5, 13:1b, Clarification 6"},{"id":"14.20","chapter":"14","stem":"WHITE team are in attack and play 7 against 6 with empty goal. BLACK 8 intercepts a pass. BLACK 8 dribbles the ball, and before he can get into position to take a shot on goal, he is attacked by WHITE 3, who manages to hold him shortly. Meanwhile, goalkeeper WHITE 12 enters the goal area again after a correct substitution with WHITE 7. What is the correct decision?","options":{"a":"Free throw for BLACK team","b":"7-metre throw for BLACK team","c":"Time-out","d":"2-minutes suspension for WHITE 3"},"correct":["a"],"rules":"8:2, 8:3, Clarification 6c, New Guideline"},{"id":"14.21","chapter":"14","stem":"WHITE team are in attack and play 7 against 6 with empty goal. BLACK 5 intercepts a pass. BLACK 5 immediately clearly tries to take a direct shot on the empty goal. In that moment, he is pushed from behind by WHITE 6, so that he partially loses body control and his shot misses the goal. What is the correct decision?","options":{"a":"Free throw for BLACK team","b":"7-metre throw for BLACK team","c":"Time-out","d":"2-minute suspension for WHITE 6","e":"Disqualification for WHITE 6 (red card shown by the referees)"},"correct":["b","c","d"],"rules":"2:8, 8:4e, 14:1, Clarification 6c, New Guideline"},{"id":"14.22","chapter":"14","stem":"WHITE team are in attack and play 7 against 6 with empty goal. WHITE 11 misses a pass, and the ball crosses the sideline to a throw-in for BLACK team. BLACK 9 takes the ball and executes the throw-in as an attempt to shoot the ball directly into the empty goal. The ball is blocked by WHITE 4, who is standing too close during the execution of the throw. What is the correct decision?","options":{"a":"Correction of the position of WHITE 4","b":"Progressive punishment for WHITE 4","c":"Repeated throw-in for BLACK team after whistle signal","d":"Free throw for BLACK team","e":"7-metre throw for BLACK team","f":"Direct 2-minute suspension for WHITE 4"},"correct":["e","f"],"rules":"8:8g, 14:1, Clarification 6c, New Guideline"},{"id":"14.23","chapter":"14","stem":"WHITE team are in attack and play 7 against 6 with empty goal. The referees call for an offensive foul against WHITE 7. BLACK 8 gets possession of the ball and is ready to execute the free throw as an attempt to shoot the ball into the empty goal. While doing so and before the ball has left his hand, he is held and pulled down from behind by WHITE 7 in a way that he partially loses his body control. Shortly after that, goalkeeper WHITE 16 enters his goal area after a correct substitution with WHITE 2. What is the correct decision?","options":{"a":"Progressive punishment for WHITE 7","b":"2-minute suspension for WHITE 7","c":"Disqualification for WHITE 7 (red card shown by the referees)","d":"Time-out","e":"Repeated free throw for BLACK team after whistle signal","f":"7-metre throw for BLACK team"},"correct":["b","d","f"],"rules":"2:8, 8:4b, 14:1, Clarification 6c, New Guideline"},{"id":"14.24","chapter":"14","stem":"WHITE team are playing without a goalkeeper. BLACK 9 intercepts a pass and takes a shot on the empty goal. WHITE 4 jumps from outside the goal area, and – while in the air over the goal area – catches the ball and lands inside the goal area with the ball in his hands. What is the correct decision?","options":{"a":"Free throw for BLACK team.","b":"7-metre throw for BLACK team.","c":"No punishment for WHITE 4.","d":"Yellow card for WHITE 4.","e":"2-minute suspension for WHITE 4."},"correct":["b","e"],"rules":"8:8i, 14:1"},{"id":"15.1","chapter":"15","stem":"When carrying out a goalkeeper throw, goalkeeper WHITE 13 swings back the ball in a way that it goes beyond the goal line between the goalposts. Correct decision?","options":{"a":"Game continues without interruption","b":"Goalkeeper throw for WHITE team with whistle signal","c":"Goal for BLACK team","d":"Free throw for BLACK team"},"correct":["a"],"rules":"12:2, 15:2"},{"id":"15.2","chapter":"15","stem":"20 seconds before the end of the match, WHITE team is leading 20:19. Goalkeeper WHITE 12 takes his time executing a goalkeeper throw, bouncing the ball back and forth in the goal area. Correct decision?","options":{"a":"Time-out","b":"Free throw against WHITE team","c":"Whistle signal for goalkeeper throw","d":"2-minute suspension for WHITE 12","e":"Show the forewarning signal for passive play"},"correct":["c"],"rules":"5:2, 12:2, 15:5b"},{"id":"15.3","chapter":"15","stem":"The referees have given a free throw for BLACK team at the free-throw line of WHITE team. When all the players have assumed their correct positions, the referee whistles. Before the ball has left the thrower’s hand, two of his teammates cross the free-throw line of WHITE team. Correct decision?","options":{"a":"Repetition of the free throw for BLACK team","b":"Free throw for WHITE team","c":"With restart signal","d":"Without restart signal"},"correct":["b","d"],"rules":"13:1a, 13:7, 15:7"},{"id":"15.4","chapter":"15","stem":"Goalkeeper WHITE 12 is standing in the goal area with the ball in his hand and ready to execute a goalkeeper throw. BLACK 6 plays the ball away from WHITE 12 with an open hand.
