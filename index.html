 goal from WHITE 15 and throw-off. The timekeeper informs the referees that WHITE 15 is not registered in the score sheet. 16 players are already listed for WHITE team. The referees realise that WHITE 11 is not even present. Correct decision?","options":{"a":"The goal is cancelled.","b":"The goal is valid.","c":"WHITE 11 is removed, and WHITE 15 is registered in the score sheet in conformity with the regulations of the responsible federation.","d":"WHITE 15 is not allowed to play and must leave the court.","e":"Progressive punishment for the responsible team official from WHITE team","f":"Written report in conformity with the regulations of the responsible federation."},"correct":["b","c","e","f"],"rules":"4:3, 9:1, 9:2"},{"id":"4.41","chapter":"4","stem":"Goalkeeper WHITE 12 lies on the floor with a knee injury after saving a shot from BLACK team. Correct decision?","options":{"a":"WHITE 12 may continue to play after receiving medical treatment on the court.","b":"Two people from WHITE team, who are entitled to participate, can enter the court to give WHITE 12 medical treatment on the court after the hand signals 15 and 16 have been shown by one of the referees.","c":"Only one person from WHITE team, who is entitled to participate, can enter the court to give WHITE 12 medical treatment on the court after the hand signals 15 and 16 have been shown by one of the referees.","d":"After receiving medical treatment on the court, WHITE 12 can only re-enter the court following the third attack of his team.","e":"Regardless of the number of attacks, WHITE 12 can re-enter the court when the game is continued after the end of a half.","f":"If the team officials refuse to provide the necessary treatment of WHITE 12, the responsible team official is to be punished progressively."},"correct":["b","d","e","f"],"rules":"4:11 – Clarification 8"},{"id":"4.42","chapter":"4","stem":"Goalkeeper WHITE 1 saves a shot from BLACK team. In doing so, he hits his head against the goal post and needs medical treatment on the court. Correct decision?","options":{"a":"WHITE 1 may continue to play after receiving medical treatment on the court, because the treatment was caused by a head injury.","b":"After receiving medical treatment on the court, WHITE 1 can only re-enter the court following the third attack of his team."},"correct":["b"],"rules":"4:11 – Clarification 8"},{"id":"4.43","chapter":"4","stem":"After receiving medical treatment on the court WHITE 7 sits on the bench in the substitution area. During the first attack of WHITE team, BLACK 2 intercepts the ball and runs in a counter-attack alone with only goalkeeper WHITE 12 between him and the goal of WHITE team. Before BLACK 2 can take a shot on goal, WHITE 7 enters the court through a substitution with WHITE 9. Correct decision?","options":{"a":"The timekeeper waits until BLACK 2 has taken a shot on goal before interrupting the game due to a faulty substitution of WHITE team.","b":"The timekeeper immediately interrupts the game due to a faulty substitution of WHITE team.","c":"Time-out","d":"2-minute suspension of WHITE 7","e":"Disqualification without written report of WHITE 7 (red card shown by the referees)","f":"7-metre throw for BLACK team","g":"Free throw for BLACK team","h":"Regardless of the number of attacks of his team, WHITE 7 can re-enter the court after serving a 2-minute suspension."},"correct":["b","c","d","f","h"],"rules":"2:8, 4:5, 4:11, 13:2, 14:1, Clarification 8"},{"id":"4.44","chapter":"4","stem":"After receiving medical treatment on the court, BLACK 11 sits on the bench and complains about a decision of the referees. Therefore, he receives his first 2-minute suspension of the match. Following the second attack of BLACK team, BLACK 11 re-enters the court after serving his 2-minute suspension. Correct decision?","options":{"a":"Time-out","b":"2-minute suspension of BLACK 11","c":"Play on","d":"Free throw for WHITE team"},"correct":["c"],"rules":"4:11 – Clarification 8"},{"id":"4.45","chapter":"4","stem":"BLACK 10 receives the ball at the free-throw line. Just after catching the ball he is pulled down by WHITE 3. He falls, hurts his elbow, and needs medical treatment on the court. Correct decision?","options":{"a":"Warning for WHITE 3","b":"2-minute suspension for WHITE 3","c":"Two people from BLACK team, who are entitled to participate, can enter the court to give BLACK 10 medical treatment on the court after the hand signals 15 and 16 have been shown by one of the referees.","d":"BLACK 10 may continue to play after receiving medical treatment on the court.","e":"After receiving medical treatment on the court, BLACK 10 can only re-enter the court following the third attack of his team.","f":"Time-out"},"correct":["b","c","d","f"],"rules":"2:8, 4:11, 8:4, 16:3c, Clarification 8"},{"id":"4.46","chapter":"4","stem":"BLACK 10 receives the ball in a counter-attack from BLACK 9. Just after passing the ball, BLACK 9 is pulled down by WHITE 11. Right after receiving the ball, BLACK 10 falls and lies injured on the floor. Correct decision?","options":{"a":"Warning for WHITE 11","b":"2-minute suspension for WHITE 11","c":"Two people from BLACK team, who are entitled to participate, can enter the court to give BLACK 10 medical treatment on the court after the hand signals 15 and 16 have been shown by one of the referees.","d":"BLACK 10 may continue to play after receiving medical treatment on the court.","e":"After receiving medical treatment on the court, BLACK 10 can only re-enter the court following the third attack of his team.","f":"Time-out"},"correct":["b","c","e","f"],"rules":"2:8, 4.11, 8.4, 16.3c, Clarification 8"},{"id":"4.47","chapter":"4","stem":"With three minutes left, the game is tied at 21-21. BLACK 2, the top scorer of his team, twists his ankle and ends up lying on the floor. One of the referees asks BLACK 2 if he needs medical treatment on the court. As BLACK 2 does not answer the question, but remains on the floor, the referees interrupt the game and show the hand signals 15 and 16 to allow two people from BLACK team to enter the court and give medical treatment to BLACK 2. BLACK team refuse to send anyone onto the court, and before the referees take any other action, BLACK 2 is ready to continue. Correct decision?","options":{"a":"BLACK 2 may continue to play.","b":"BLACK 2 must leave the court and can only re-enter the court following the third attack of his team.","c":"Progressive punishment to responsible team official of BLACK team"},"correct":["b","c"],"rules":"4:11, 8:7, 16:1b, Clarification 8"},{"id":"4.48","chapter":"4","stem":"With 30 seconds left in the first half, WHITE 5 receives medical treatment on the court. After receiving medical treatment, he leaves the court and can only re-enter following the third attack of his team. After one minute of the second half, during the second attack of WHITE team, WHITE 5 enters the court through a correct substitution with WHITE 4. Correct decision?","options":{"a":"Play on","b":"2-minute suspension for WHITE 5 due to a faulty substitution (entering the court too early after receiving medical treatment on the court)","c":"Time-out"},"correct":["a"],"rules":"4:11, Clarification 8"},{"id":"4.49","chapter":"4","stem":"After a collision, WHITE 4 and BLACK 5 lie on the floor and seem to be injured. The referees immediately interrupt the game and show the hand signals 15 and 16 to give both teams permission to let two people enter the court and give medical treatment on the court. Before any person can enter the court, BLACK 5 is ready to play. WHITE 4 receives medical treatment on the court. After 20 seconds, play can continue. Correct decision?","options":{"a":"After receiving medical treatment on the court, WHITE 4 has to leave the court and can only re-enter following the third attack of his team.","b":"As BLACK 5 did not receive medical treatment on the court, he is allowed to continue.","c":"BLACK 5 has to leave the court and can only re-enter following the third attack of his team."},"correct":["a","c"],"rules":"4:11, Clarification 8"},{"id":"4.50","chapter":"4","stem":"WHITE 2 is injured and needs medical treatment on the court. The first half finishes after the first attack of his team. When the referee whistles to start the second half, WHITE 2 is on the court during the attack of his team. Correct decision?","options":{"a":"The timekeeper immediately interrupts the game and informs the referees.","b":"2-minute suspension for WHITE 2","c":"Play on","d":"Free throw for BLACK team in the substitution area","e":"No suspension for WHITE 2 who must leave the court. WHITE team continues in possession of the ball because it is a mistake by the timekeeper/delegate."},"correct":["c"],"rules":"4:11 third paragraph"},{"id":"4.51","chapter":"4","stem":"WHITE 4 is receiving medical treatment on the court. After receiving treatment, WHITE 4 has to leave the court and can only re-enter following the third attack of his team. After the second attack of WHITE team, team official A from WHITE team asks WHITE 4 to enter the court to play in defence. WHITE 4 enters the court through a substitution with WHITE 6 to play in defence only. Correct decision?","options":{"a":"Play on (WHITE 4 is allowed to play in defence)","b":"Warning for WHITE 4, because he entered the court too early","c":"2-minute suspension for WHITE 4 due to a faulty substitution"},"correct":["c"],"rules":"4:11, Clarification 8"},{"id":"4.52","chapter":"4","stem":"WHITE 11 slides on the floor and ends just outside the court on the other side of the substitution area. He hits his head against the advertising board. The referees immediately interrupt the game to call for medical treatment for WHITE 11. After 20 seconds, WHITE 11 is ready to play again. Correct decision?","options":{"a":"WHITE 11 is allowed to continue the game, because he was lying outside the court, when he received medical treatment.","b":"WHITE 11 has to leave the court and can only re-enter following the third attack of his team."},"correct":["b"],"rules":"4:11, Clarification 8"},{"id":"4.53","chapter":"4","stem":"After one minute of the game, there is a fight between BLACK 3 and WHITE 6. BLACK 3 ends up lying on the floor and seems to be injured. The referees choose to give WHITE 6 a verbal caution. BLACK 3 asks for medical treatment on the court. After receiving medical treatment on the court, BLACK 3 is ready to continue the game. Correct decision?","options":{"a":"BLACK 3 is allowed to continue the game.","b":"BLACK 3 has to leave the court and can only re-enter following the third attack of his team."},"correct":["b"],"rules":"4:11, Clarification 8"},{"id":"4.54","chapter":"4","stem":"BLACK team is in a counter-attack. BLACK 2 dribbles the ball and is pushed by WHITE 10. He partially loses body control, but manages to play the ball to BLACK 4, who scores a goal. After scoring a goal, BLACK 4 twists his ankle while running back in defence. The referees interrupt the game, give a 2-minute suspension for WHITE 10 and give permission for two people to enter the court to give medical treatment to BLACK 4. After 30 seconds, BLACK 4 is ready to play again. Correct decision?","options":{"a":"BLACK 4 is allowed to continue the game.","b":"BLACK 4 has to leave the court and can only re-enter following the third attack of his team."},"correct":["b"],"rules":"4:11, Clarification 8"},{"id":"4.55","chapter":"4","stem":"WHITE 11 takes a shot on goal. Defender BLACK 2 is unfortunately hit in the face by the ball and needs medical treatment on the court. After 20 seconds of treatment, BLACK 2 is ready to play again. Correct decision?","options":{"a":"BLACK 2 is allowed to continue the game, because the injury was caused by a ball in the face.","b":"BLACK 2 has to leave the court and can only re-enter following the third attack of his team."},"correct":["b"],"rules":"4:11, Clarification 8"},{"id":"4.56","chapter":"4","stem":"BLACK 2 is lying on the floor in the goal area of WHITE team after a shot on goal asking for medical treatment, apparently because of a leg injury. WHITE team has just started a counter-attack. Correct decision?","options":{"a":"The referees immediately interrupt the game and show hand signals 15 and 16 to call for medical treatment on the court for BLACK 2","b":"Play on until there is a result of the counter-attack from WHITE team – then interrupt the game to call for medical treatment for BLACK 2"},"correct":["b"],"rules":"4:11, Clarification 8"},{"id":"4.57","chapter":"4","stem":"WHITE 2 is warming up without elbow protection. After 5 minutes of the game, WHITE team is in possession of the ball. WHITE 2 enters the court under a correct substitution. The referees notice that WHITE 2 now wears an elbow protection with uncovered hard components. Correct decision?","options":{"a":"Play on, it is allowed to wear an elbow protection with uncovered hard components.","b":"The referees interrupt the game, WHITE 2 has to leave the court and can only re-enter after removing the elbow protection or covering up the uncovered hard components.","c":"The referees interrupt the game, WHITE 2 has to leave the court and can only re-enter after removing the elbow protection.","d":"Progressive punishment for WHITE 2","e":"Progressive punishment for responsible team official from WHITE team","f":"Free throw for WHITE team","g":"Free throw for BLACK team"},"correct":["c","e","g"],"rules":"4:9 Guidelines, Regulations on Protective Equipment and Accessories"},{"id":"4.58","chapter":"4","stem":"WHITE team is attacking close to the 9-metre line. WHITE 7 enters the court after a normal substitution wearing his yellow pullover/jersey over the normal white t-shirt. Correct decision?","options":{"a":"The referees interrupt the game, WHITE 7 must take off the yellow jersey before continuing on the court.","b":"Free throw for BLACK team.","c":"2-minute suspension for WHITE 7.","d":"Free throw for WHITE team."},"correct":["a","d"],"rules":"4:7, 4:9, Guidelines"},{"id":"4.59","chapter":"4","stem":"WHITE team is in possession of the ball, when the timekeeper interrupts the match. The timekeeper tells the referees that WHITE 11 has entered the court, and there is no WHITE 11 included in the score sheet. It turns out that official A had wrongly included the player in the score sheet as number 13. What is the correct decision?","options":{"a":"Free throw for WHITE team","b":"Free throw for BLACK team","c":"WHITE 11 is not allowed to participate in the match.","d":"The mistake is corrected, and WHITE 11 is entitled to participate.","e":"Note in the match report/written report in conformity with the regulations of the responsible federation.","f":"Progressive punishment for official A from WHITE team"},"correct":["a","d","e"],"rules":"4:3, 4:7, 4:8, New Guideline"},{"id":"4.60","chapter":"4","stem":"The score is 29:29 with 10 seconds left in the match. Goalkeeper WHITE 12 executes a goalkeeper throw and passes the ball to WHITE 11. WHITE 11 sees that WHITE 9 is in a free position at the goal-area line of BLACK team. Before he can play the pass to WHITE 9, the timekeeper interrupts the game because of a faulty substitution. BLACK 2 has entered the court before BLACK 4 has left it. What is the correct decision?","options":{"a":"Time-out","b":"Free throw for WHITE team","c":"7-metre throw for WHITE team","d":"2-minute suspension for BLACK 2","e":"Disqualification for BLACK 2 (red card shown by the referees)"},"correct":["a","b","d"],"rules":"2:8, 4:5, 13:1a"},{"id":"4.61","chapter":"4","stem":"The score is 29:29 with 10 seconds left in the match. Goalkeeper WHITE 12 executes a goalkeeper throw and passes the ball to WHITE 11. WHITE 11 sees that WHITE 9 is in a free position at the goal-area line of BLACK team. He passes the ball to WHITE 9. Before WHITE 9 takes a shot on goal, the delegate interrupts the game because of a faulty substitution. BLACK 2 has entered the court before BLACK 4 has left it. What is the correct decision?","options":{"a":"Time-out","b":"Free throw for WHITE team","c":"7-metre throw for WHITE team","d":"2-minute suspension for BLACK 2","e":"Disqualification for BLACK 2 (red card shown by the referees)","f":"The delegate should have waited until the clear chance of scoring was over before interrupting the game"},"correct":["a","c","d","f"],"rules":"2:8, 4:5, 14:1, Guideline rule 13:2"},{"id":"4.62","chapter":"4","stem":"It is possible to use the video replay in this match. WHITE team is in a counterattack. WHITE 7 has the ball at the centre line. In that moment BLACK 9 enters the court as an additional player. WHITE 7 plays the ball to WHITE 11 who has a clear chance of scoring. At that moment the delegate whistles because of the additional player on the court. What is the correct decision?","options":{"a":"Use the video replay to see who entered the court as an additional player and to see when the player entered.","b":"2-minute suspension for BLACK 9","c":"Time-out","d":"Disqualification without written report for BLACK 9 (red card is shown by the referees)","e":"Disqualification with written report for BLACK 9 (red and blue cards are shown by the referees)","f":"Free throw for WHITE team","g":"7-metre throw for WHITE team","h":"The delegate should have waited until the clear chance of scoring was over before interrupting the game"},"correct":["a","b","c","g","h"],"rules":"2:8, 4:4-6, 14:1, 16:3a, 17:13, Guideline 13:2, Video Replay Regulations"},{"id":"5.1","chapter":"5","stem":"Goalkeeper BLACK 1 saves a shot on goal and starts a counter-attack. In doing so, he crosses the goal-area line with his left foot. Correct decision?","options":{"a":"Game continues without interruption","b":"Free throw for WHITE team","c":"Repeat goalkeeper throw after restart signal"},"correct":["c"],"rules":"1:3, 5:6, 12:1, 12:2, 15:5b"},{"id":"5.2","chapter":"5","stem":"Goalkeeper WHITE 12 is standing outside his goal area on the court. While receiving the ball from a teammate, the goalkeeper steps back with one foot into the goal area, while the other foot remains where it is. Correct decision?","options":{"a":"7-metre throw for BLACK team","b":"Game continues without interruption","c":"Free throw for BLACK team","d":"2-minute suspension for goalkeeper WHITE 12"},"correct":["c"],"rules":"1:3, 5:3, 5:9, 6:2b, 13:1a"},{"id":"5.3","chapter":"5","stem":"Goalkeeper WHITE 12 saves a shot by diving towards the ball, which is moving in the direction of the playing area. WHITE 12 reaches the ball, but slides across the goal-area line and passes the ball in the playing area to a teammate. Correct decision?","options":{"a":"Free throw for BLACK team","b":"Game continues without interruption","c":"Goalkeeper throw for WHITE team after whistle signal"},"correct":["b"],"rules":"5:4"},{"id":"5.4","chapter":"5","stem":"Goalkeeper BLACK 1 stops a shot on goal. The ball is rolling towards the playing area. To stop the ball before it reaches WHITE 15, who is waiting at the goal-area line, he slides it with his foot across the outer goal line just before it reaches WHITE 15. Correct decision?","options":{"a":"7-metre throw for WHITE team","b":"Free throw for WHITE team","c":"Game continues without interruption","d":"Progressive punishment against BLACK 1 since he has endangered an opponent"},"correct":["b"],"rules":"5:10, 13:1a"},{"id":"5.5","chapter":"5","stem":"Goalkeeper WHITE 12 has not managed to get the ball under control. The ball moves inside the goal area towards the side line. The goalkeeper uses his foot to play the ball across the outer goal line. Correct decision?","options":{"a":"Goalkeeper throw for WHITE team","b":"Free throw for BLACK team","c":"Throw-in for BLACK team","d":"Progressive punishment against the goalkeeper"},"correct":["b"],"rules":"5:10, 13:1a"},{"id":"5.6","chapter":"5","stem":"Goalkeeper WHITE 1 blocks a shot. The ball rolls in the direction of the playing area, where BLACK 6 waits alone to pick up the ball. WHITE 1 manages to stop the ball with his foot, when the ball is on the goal-area line. Correct decision?","options":{"a":"Goalkeeper throw for WHITE team after whistle signal","b":"Progressive punishment against WHITE 1","c":"Free throw for BLACK team","d":"7-metre throw for BLACK team"},"correct":["c"],"rules":"5:10, 13:1a"},{"id":"5.7","chapter":"5","stem":"BLACK 18 takes a shot on goal. The shot is blocked by WHITE 7, so that the ball changes direction and goes clearly in the direction of the outer goal line inside the goal area. Goalkeeper WHITE 1 runs after the ball and manages to put it over the outer goal line with his foot. Correct decision?","options":{"a":"Goalkeeper throw for WHITE team","b":"Throw-in for BLACK team","c":"Free throw for BLACK team","d":"Warning for WHITE 1"},"correct":["a"],"rules":"5:10, 12:1"},{"id":"5.8","chapter":"5","stem":"Goalkeeper BLACK 12 jumps up in his goal area to catch a long pass from WHITE 7. BLACK 12 catches the ball while he is in the air and lands with the ball with one foot in the goal area and one foot in the playing area. In this position he plays the ball to BLACK 3. Correct decision?","options":{"a":"7-metre throw to WHITE team","b":"Game continues without interruption","c":"Free throw to WHITE team","d":"Correction and goalkeeper throw after whistle signal"},"correct":["b"],"rules":"5:3, 5:4"},{"id":"5.9","chapter":"5","stem":"WHITE 9 passes the ball to his goalkeeper WHITE 1, who is standing in the playing area. Because WHITE 9 is under pressure, he throws the ball too high, so that WHITE 1 must move back and enter the goal area with one foot, immediately after catching the ball. Correct decision?","options":{"a":"Game continues without interruption","b":"Time-out","c":"7-metre throw for BLACK team","d":"Free throw for BLACK team"},"correct":["d"],"rules":"5:9, 6:1, 13:1a"},{"id":"5.10","chapter":"5","stem":"The referees give a free throw for WHITE team at the goal-area line of WHITE team. Goalkeeper WHITE 1 is standing with one foot in the goal area and one foot in the playing area. He passes the ball to WHITE 8, who scores a goal. Correct decision?","options":{"a":"Goal for WHITE team","b":"Repetition of the free throw outside the goal area of WHITE team","c":"Free throw for BLACK team at the goal-area line of WHITE team","d":"Goalkeeper throw for BLACK team","e":"7-metre throw for WHITE team"},"correct":["a"],"rules":"5:3"},{"id":"5.11","chapter":"5","stem":"The referee whistles because of too many steps by BLACK 21. BLACK 21 puts the ball down at the goal-area line of WHITE team. Goalkeeper WHITE 12 wants to throw the ball quickly. He supports himself with one hand on the floor in the playing area, and he has one foot on the floor in the goal area. From this position he plays the ball to WHITE 3, who starts a counter-attack that leads to a goal for WHITE team. Correct decision?","options":{"a":"Repeat the free throw for WHITE team after whistle signal.","b":"Goal for WHITE team","c":"Free throw for BLACK team because of illegal free-throw execution by WHITE 12","d":"Time-out"},"correct":["a"],"rules":"5:3, 15:1, note"},{"id":"5.12","chapter":"5","stem":"Goalkeeper BLACK 1 has left his goal area. He jumps up in the playing area, catches a pass from a teammate while in the air, and lands with both feet inside his goal area. Correct decision?","options":{"a":"Game continues without interruption","b":"Goalkeeper throw for BLACK team","c":"Free throw for WHITE team","d":"7-metre throw for WHITE team","e":"Time-out"},"correct":["c"],"rules":"5:9, 13:1a"},{"id":"5.13","chapter":"5","stem":"The ball is on the floor right outside the goal area of WHITE team. Goalkeeper WHITE 1 stands inside the goal area and picks up the ball to prevent an opponent from taking it. Correct decision?","options":{"a":"Free throw for BLACK team","b":"7-metre throw for BLACK team","c":"Progressive punishment for WHITE 1","d":"No intervention because it is allowed"},"correct":["a"],"rules":"5:7, 5:8"},{"id":"6.1","chapter":"6","stem":"The ball lies on the goal-area line. Attacker WHITE 7 picks it up and tries to score. WHITE 7 has a clear chance of scoring, when he is illegally attacked. Correct decision?","options":{"a":"Free throw for BLACK team","b":"Free throw for WHITE team","c":"7-metre throw for WHITE team","d":"Goalkeeper throw for BLACK team"},"correct":["d"],"rules":"1:3, 6:5, 12:1"},{"id":"6.2","chapter":"6","stem":"The ball is rolling in the goal area of WHITE team. BLACK 8 picks the ball up and scores a goal. Correct decision?","options":{"a":"Free throw for WHITE team","b":"Goalkeeper throw for WHITE team","c":"Goal","d":"Throw-off"},"correct":["b"],"rules":"6:5, 12:1"},{"id":"6.3","chapter":"6","stem":"WHITE 3 stands with both feet in the playing area and catches the ball rebounding from his goalkeeper. When WHITE 3 is correctly obstructed by BLACK 10, he bounces the ball several times in his own goal area. Correct decision?","options":{"a":"Game continues without interruption","b":"7-metre throw for BLACK team","c":"Free throw for BLACK team","d":"Free throw for WHITE team"},"correct":["a"],"rules":"6:5"},{"id":"6.4","chapter":"6","stem":"WHITE 7 stands outside the goal area of BLACK team, but grabs the ball that is clearly in the air above the goal area and scores a goal. Correct decision?","options":{"a":"Goal for WHITE team","b":"Free throw for BLACK team","c":"Goalkeeper throw for BLACK team","d":"Goalkeeper throw for BLACK team after whistle signal"},"correct":["a"],"rules":"6:5"},{"id":"6.5","chapter":"6","stem":"WHITE 8, who is attacked correctly by several opponents, intentionally rolls the ball into his own goal area, where the ball comes to rest. Goalkeeper WHITE 1 does not pick up the ball. Correct decision?","options":{"a":"Goalkeeper throw for WHITE team","b":"Goalkeeper throw for WHITE team after whistle signal","c":"7-metre throw for BLACK team","d":"Free throw for BLACK team"},"correct":["d"],"rules":"6:7b, 13:1a"},{"id":"6.6","chapter":"6","stem":"WHITE 5 plays the ball into his own team’s goal area. The ball hits the goal post and rolls towards the playing area. Goalkeeper WHITE 12 picks up the ball and passes it to WHITE 7, who scores a goal. Correct decision?","options":{"a":"7-metre throw for BLACK team","b":"Goal","c":"Free throw for BLACK team","d":"Goalkeeper throw for WHITE team"},"correct":["c"],"rules":"6:7b, 13:1a"},{"id":"6.7","chapter":"6","stem":"BLACK team has scored a goal, and WHITE 10 executes the subsequent throw-off. He does not find any other teammate available, so he surprises his goalkeeper WHITE 12 by playing the ball back to him, even though the goalkeeper is standing in his goal area. WHITE 12 takes the ball and passes it to WHITE 9. Correct decision?","options":{"a":"Game continues without interruption","b":"7-metre throw for BLACK team","c":"Free throw for BLACK team","d":"Throw-off repeated after correction"},"correct":["c"],"rules":"6:7b, 13:1a"},{"id":"6.8","chapter":"6","stem":"Defender BLACK 7 sees that pivot WHITE 9 would be alone with the goalkeeper if he receives the ball. Having done the same thing earlier, he runs through the goal area to get around WHITE 9, so that he cannot receive a pass. BLACK 7 is already outside the goal-area line again, when WHITE 9 receives the ball. WHITE 9 turns around and runs straight into BLACK 7. Correct decision?","options":{"a":"7-metre throw for WHITE team","b":"Free throw for WHITE team","c":"Free throw for BLACK team","d":"Progressive punishment against BLACK 7"},"correct":["a","d"],"rules":"6:2c, 8:7f, 14:1a, 16:1b"},{"id":"6.9","chapter":"6","stem":"The ball rebounds from goalkeeper BLACK 1 to the attacking player WHITE 4, who is waiting just outside the goal-area line. To prevent a clear chance of scoring, BLACK 2 enters the goal area and prevents WHITE 4 from receiving the ball. Correct decision?","options":{"a":"Free throw for WHITE team","b":"7-metre throw for WHITE team","c":"Progressive punishment against BLACK 2","d":"Disqualification of BLACK 2 (red card shown by the referees)"},"correct":["b"],"rules":"6:2c, 14:1a, Clarification 6a"},{"id":"6.10","chapter":"6","stem":"WHITE 10 passes the ball in the direction of his own goal area. Goalkeeper WHITE 1 jumps from the goal area and catches the ball in the air. WHITE 1 firmly holds on to the ball and lands outside the goal area. Correct decision?","options":{"a":"Game continues without interruption","b":"Goalkeeper throw for WHITE team","c":"Free throw for BLACK team","d":"7-metre throw for BLACK team"},"correct":["c"],"rules":"5:3, 5:6, 6:7b"},{"id":"6.11","chapter":"6","stem":"The ball is passed from WHITE 11 back into the goal area, where goalkeeper WHITE 1 jumps up and catches the ball in the air. WHITE 1 firmly holds on to the ball and lands with one foot inside the goal area and one foot outside. Correct decision?","options":{"a":"Game continues without interruption","b":"Goalkeeper throw for WHITE team","c":"Free throw for BLACK team","d":"7-metre throw for BLACK team"},"correct":["c"],"rules":"5:3, 5:6, 6:7b"},{"id":"6.12","chapter":"6","stem":"WHITE 7 from the attacking team is in possession of the ball and steps with the ball into the goal area of BLACK team. Correct decision?","options":{"a":"Free throw for BLACK team","b":"Goalkeeper throw for BLACK team","c":"Goalkeeper throw for BLACK team after whistle signal","d":"Free throw for BLACK team after whistle signal"},"correct":["b"],"rules":"6:2a, 12:1"},{"id":"6.13","chapter":"6","stem":"The ball is lying on the floor in the goal area of WHITE team. At this moment, the timekeeper whistles and explains that WHITE 5 has made a faulty substitution. Correct decision?","options":{"a":"Goalkeeper throw for WHITE team","b":"2-minute suspension for WHITE 5","c":"Free throw for BLACK team at the free-throw line of WHITE team","d":"Free throw for BLACK team at the substitution area of WHITE team"},"correct":["a","b"],"rules":"4:5, 6:5, second paragraph, 13:3, 16:3a"},{"id":"6.14","chapter":"6","stem":"In which of the following cases should a goalkeeper throw be given?","options":{"a":"When a player of the attacking team (with the ball) touches the goal area of the opponents","b":"When a player of the attacking team (without the ball) touches the goal area of the opponents and gains an advantage by doing so","c":"When a player of the attacking team deflects the ball out across the outer goal line of the opponents","d":"When a player with the ball touches the goal area of his own team"},"correct":["a","b","c"],"rules":"6:2a, 12:1"},{"id":"6.15","chapter":"6","stem":"WHITE team is attacking. BLACK 4 stands at the goal-area line. The ball is in the air, and BLACK 4 reaches it to direct it into the goal area. The ball is touched by goalkeeper BLACK 1 and then crosses the outer goal line. Correct decision?","options":{"a":"Throw-in for WHITE team","b":"Free throw for WHITE team","c":"7-metre throw for WHITE team","d":"Goalkeeper throw for BLACK team","e":"Progressive punishment for BLACK 4"},"correct":["b"],"rules":"6:7b"},{"id":"6.16","chapter":"6","stem":"Goalkeeper WHITE 12 has saved a shot and has the ball under control in his goal area. He still has the ball in his hands when the timekeeper whistles for a faulty substitution by WHITE 10. Correct decision?","options":{"a":"Free throw for BLACK team at the substitution area of WHITE team","b":"Time-out","c":"Goalkeeper throw for WHITE team","d":"2-minute suspension for WHITE 10","e":"Free throw for BLACK team at the free-throw line of WHITE team"},"correct":["b","c","d"],"rules":"2:8a, 4:5, 6:4, 12:1, 13:3"},{"id":"6.17","chapter":"6","stem":"Goalkeeper WHITE 12 jumps up in the playing area just outside his goal area, catches the ball – that has been thrown to him by WHITE 4 – in the air, and throws it over the outer goal line. He then lands inside the goal area. Correct decision?","options":{"a":"Goalkeeper throw for WHITE team","b":"Throw-in for BLACK team","c":"Free throw for BLACK team","d":"Warning for WHITE 12"},"correct":["b"],"rules":"5:3, 6:7c"},{"id":"6.18","chapter":"6","stem":"WHITE 9 shoots at the goal of BLACK team. Goalkeeper BLACK 1 saves the shot, and the ball rolls towards the playing area, where a player from BLACK team is ready to pick it up. As BLACK 1 was injured when saving the shot, the referees interrupt the game, while the ball is still in the goal area. Correct decision?","options":{"a":"Free throw for WHITE team","b":"Goalkeeper throw for BLACK team","c":"Free throw for BLACK team"},"correct":["c"],"rules":"6:5, 13:4"},{"id":"6.19","chapter":"6","stem":"The ball is rolling on the floor in the goal area of WHITE team. At this moment, the timekeeper whistles and explains that WHITE 5 has made a faulty substitution. Correct decision?","options":{"a":"Goalkeeper throw for WHITE team","b":"2-minute suspension for WHITE 5","c":"Free throw for BLACK team at the free-throw line of WHITE team","d":"Free throw for BLACK team at the substitution area of WHITE team"},"correct":["b","c"],"rules":"4:5, 6:5, first paragraph, 16:3a"},{"id":"6.20","chapter":"6","stem":"WHITE 5 takes a shot on goal. The shot is blocked by goalkeeper BLACK 12 and goes in the air over the goal area in the direction of pivot WHITE 11, who is standing at the goal-area line alone and ready to catch the ball. Defender BLACK 2 jumps in the direction of the ball, and while in mid- air over the goal area, he plays the ball in the direction of the sideline. Because of glue on the ball, the ball comes to rest in the goal area without the goalkeeper touching it. Correct decision?","options":{"a":"Goalkeeper throw for BLACK team","b":"Free throw for WHITE team","c":"7-metre throw for WHITE team","d":"Progressive punishment for BLACK 2"},"correct":["b"],"rules":"6:7b, 13:1b:"},{"id":"6.21","chapter":"6","stem":"Goalkeeper BLACK 1 has saved a shot and wants to pass the ball to BLACK 6, who is ready for a fast break. When BLACK 1 makes the pass, he touches the goal-area line. BLACK 6 gets the ball and scores a goal. Correct decision?","options":{"a":"Goal is valid","b":"Free throw for team WHITE","c":"Correction and repeated goalkeeper throw after whistle","d":"Goal is not valid"},"correct":["a"],"rules":"6:1, 1:3"},{"id":"6.22","chapter":"6","stem":"WHITE 6 is counter-attacking. He jumps, takes a shot on goal, and lands in the goal area of BLACK team. Goalkeeper BLACK 12 blocks the shot, and the ball goes to WHITE 11, who scores a goal, while WHITE 6 is lying in the goal area between him and goalkeeper BLACK 12. Correct decision?","options":{"a":"Goal for WHITE team","b":"Goalkeeper throw for BLACK team","c":"Free throw for BLACK team"},"correct":["b"],"rules":"6:2a"},{"id":"6.23","chapter":"6","stem":"WHITE team are in attack and play with an empty goal. WHITE 11 takes a shot on goal. Goalkeeper BLACK 1 saves the shot. He executes the goalkeeper throw as a shot on the empty goal. WHITE 10 tries to save the shot. He jumps from outside his own goal area and – while in the air over the goal area – touches the ball. The ball crosses the outer goal line. After touching the ball, WHITE 10 lands inside the goal area. What is the correct decision?","options":{"a":"Goalkeeper throw for WHITE team","b":"Free throw for BLACK team","c":"7-metre throw for BLACK team","d":"Throw-in for BLACK team","e":"Progressive punishment for WHITE 10"},"correct":["d"],"rules":"6:3, 11:1"},{"id":"6.24","chapter":"6","stem":"WHITE team are in attack and play with an empty goal. WHITE 11 takes a shot on goal. Goalkeeper BLACK 1 saves the shot. He executes the goalkeeper throw as a shot on the empty goal. WHITE 10 tries to save the shot. He jumps from outside his own goal area and – while in the air over the goal area – catches the ball and lands inside the goal area with the ball in his hands. What is the correct decision?","options":{"a":"Free throw for BLACK team","b":"7-metre throw for BLACK team","c":"Direct 2-minute suspension for WHITE 10","d":"No punishment"},"correct":["b","c"],"rules":"6:2, 8:8i, 14:1a, Clarification"},{"id":"6.25","chapter":"6","stem":"BLACK 5 takes a shot on goal. Goalkeeper WHITE 12 saves the ball. During the save, WHITE 12 hits his head against the goalpost and falls to the floor injured. BLACK 3 catches the rebound from the goalkeeper’s save and has a clear chance of scoring at the goal-area line of WHITE team. What is the correct decision?","options":{"a":"Advantage for BLACK 3.","b":"Interrupt the match immediately.","c":"The match is restarted with a 7-metre throw for BLACK team.","d":"The match is restarted with a free throw for BLACK team.","e":"Time-out","f":"The referees may give permission for two persons from WHITE team to enter the court to give medical treatment for WHITE 12.","g":"After receiving medical treatment, WHITE 12 must leave the court and can only re-enter following the third attack of his team.","h":"After receiving medical treatment, WHITE 12 can continue playing without leaving the court."},"correct":["b","d","e","f","g"],"rules":"4:11, clarification 8, guideline 6:8"},{"id":"7.1","chapter":"7","stem":"The ball is in the air going towards the sideline. WHITE 3 manages to play the ball with his hand to WHITE 7 before the ball crosses the line. While doing this, WHITE 3 crosses the sideline with one foot. WHITE 7 catches the ball and scores a goal. Correct decision?","options":{"a":"Throw-in for BLACK team","b":"Free throw for BLACK team","c":"Goal","d":"2-minute suspension for WHITE 3"},"correct":["b"],"rules":"7:10, 11:1"},{"id":"7.2","chapter":"7","stem":"A risky pass is played from BLACK 3 to BLACK 11. When the ball is in the air, BLACK 11 realises that he will not be able to catch it, so he hits the ball with his fist to feed BLACK 9, who is standing in the middle of the court. Correct decision?","options":{"a":"Game continues without interruption","b":"Free throw for WHITE team from BLACK 9’s position","c":"Free throw for WHITE team from BLACK 11’s position","d":"2-minute suspension for BLACK 11"},"correct":["a"],"rules":"7:1"},{"id":"7.3","chapter":"7","stem":"WHITE 4 catches the ball while standing. He then jumps and lands on the right foot and jumps to his left foot to throw. How many steps did WHITE 4 take?","options":{"a":"1","b":"2","c":"3","d":"4"},"correct":["b"],"rules":"7:3a"},{"id":"7.4","chapter":"7","stem":"A player jumps to catch the ball passed to him by a teammate. He lands on both feet simultaneously. Then he lifts his right foot to take a step to the side and drags his left foot up to the right foot. How many steps did he take?","options":{"a":"1","b":"3","c":"0","d":"2"},"correct":["a"],"rules":"7:3d"},{"id":"7.5","chapter":"7","stem":"A player catches the ball in mid-air, passed to him by a teammate. He then lands on the right foot and moves off with that foot. Then he puts the left foot down first and then the right one to throw. How many steps did he take?","options":{"a":"3","b":"2","c":"1","d":"0"},"correct":["b"],"rules":"7:3"},{"id":"7.6","chapter":"7","stem":"WHITE 5 is fumbling the ball, but finally manages to get it under control. Then he takes three steps, bounces the ball once, and takes another three steps before scoring a goal. Correct decision?","options":{"a":"Free throw for BLACK team","b":"Goal","c":"Goalkeeper throw for BLACK team","d":"Throw-in for BLACK team"},"correct":["b"],"rules":"7:3, 7:4, 7:7"},{"id":"7.7","chapter":"7","stem":"WHITE 5 wants to start an attack. He bounces the ball repeatedly while taking five steps. He then takes the ball up again to pass it. Correct decision?","options":{"a":"Free throw for BLACK team","b":"Free throw for WHITE team","c":"Game continues without interruption","d":"7-metre throw for BLACK team"},"correct":["c"],"rules":"7:4b"},{"id":"7.8","chapter":"7","stem":"BLACK 6 catches the ball, slips and falls. Lying on his back, he passes the ball to BLACK 9. Correct decision?","options":{"a":"Free throw for WHITE team","b":"Game continues without interruption","c":"Free throw for BLACK team"},"correct":["b"],"rules":"7:6"},{"id":"7.9","chapter":"7","stem":"WHITE 3 runs between two opponents to push the ball in the direction of his path. He grabs the ball again, before it has touched the ground. Now, there is an open space towards the goal of BLACK team. WHITE 3 bounces the ball once and score. Correct decision?","options":{"a":"Goal","b":"Free throw for BLACK team","c":"Goalkeeper throw for BLACK team"},"correct":["b"],"rules":"7:7, 13:1a"},{"id":"7.10","chapter":"7","stem":"After bouncing the ball once, WHITE 7 wants to pass the ball to WHITE 5, but WHITE 5 is marked by an opponent. WHITE 7 becomes so confused that he drops the ball but manages to catch it again before it has touched the floor. Correct decision?","options":{"a":"Game continues without interruption","b":"Free throw for BLACK team","c":"Free throw for WHITE team"},"correct":["b"],"rules":"7:7, 13:1a"},{"id":"7.11","chapter":"7","stem":"How is repeated passive play to be penalised?","options":{"a":"Free throw and warning","b":"Free throw and 2-minute suspension","c":"Free throw","d":"Free throw and disqualification (red card shown by the referees)"},"correct":["c"],"rules":"7:7, 13:1a"},{"id":"7.12","chapter":"7","stem":"Following a shot on goal by WHITE 4, the ball rebounds from the goal post of BLACK team, and hits the referee who stands inside the goal area next to the goal. Consequently, the ball crosses the sideline and not the outer goal line. Correct decision?","options":{"a":"Free throw for WHITE team","b":"Throw-in for BLACK team","c":"Goalkeeper throw for BLACK team"},"correct":["b"],"rules":"7:9, 11:1"},{"id":"7.13","chapter":"7","stem":"WHITE team executes a throw-in. WHITE 5 throws the ball onto the court, where it hits the referee and crosses the goal line of BLACK team. Correct decision?","options":{"a":"Repetition of throw-in after whistle signal","b":"Free throw for BLACK team","c":"Free throw for WHITE team","d":"Goal for WHITE team"},"correct":["d"],"rules":"7:9, 15:2"},{"id":"7.14","chapter":"7","stem":"BLACK 3 makes a jump shot, and WHITE 9 blocks the ball. The ball falls to the floor, and WHITE 9 picks it up with both hands and starts dribbling in a counter-attack. He throws the ball into the goal of BLACK team. Correct decision?","options":{"a":"Goal for WHITE team","b":"Free throw for BLACK team","c":"2-minute suspension for WHITE 9","d":"Time-out"},"correct":["a"],"rules":"7:4, 8:1a"},{"id":"7.15","chapter":"7","stem":"WHITE 5 dribbles the ball along the sideline. BLACK obstructs him correctly. To get past BLACK 2, WHITE 5 steps over the sideline with one foot during his dribbling. Correct decision?","options":{"a":"Free throw for WHITE team","b":"Throw-in for BLACK team","c":"Free throw for BLACK team","d":"Game continues without interruption"},"correct":["c"],"rules":"7:10, 8:1c, 13:1a"},{"id":"7.16","chapter":"7","stem":"After an imprecise pass from WHITE 3 to WHITE 9, the ball rolls towards the sideline near the substitution area of WHITE team. BLACK 10 is one metre away and ready to grab the ball, when WHITE 9 dives for the ball and hits it with his fist towards the centre of the playing court back to WHITE 3. His movement then causes WHITE 9 to slide over the sideline and land outside the court. Correct decision?","options":{"a":"Game continues without interruption","b":"Free throw for BLACK team","c":"Progressive punishment for WHITE 9","d":"Throw-in for BLACK team"},"correct":["a"],"rules":"7:1"},{"id":"7.17","chapter":"7","stem":"BLACK 7 of the attacking team assumes a position outside the court without having the ball. The referees indicate to the player that he must return to the court, but he does not react. Correct decision?","options":{"a":"Game continues without interruption","b":"Free throw for WHITE team","c":"Progressive punishment for BLACK 7","d":"Throw-in for WHITE team"},"correct":["b"],"rules":"7:10"},{"id":"7.18","chapter":"7","stem":"A player jumps in over the goal area of the opposing team. He has full ball and body control, and he is in a good position to shoot. However, instead of shooting he turns around in mid-air and passes the ball back to a teammate, who passes the ball further. Correct decision?","options":{"a":"Forewarning signal for passive play","b":"Immediate free throw because of passive play","c":"Immediate free throw because of unsportsmanlike conduct","d":"Progressive punishment"},"correct":["b"],"rules":"7:12"},{"id":"7.19","chapter":"7","stem":"WHITE 3 takes a shot on the goal of BLACK team and hits the goalpost. The ball rolls back out of the goal area. At the free-throw line, WHITE 3 and BLACK 4 dive for the ball without endangering each other. BLACK 4 manages to push the ball to BLACK 6, who starts a counter-attack and scores a goal. Correct decision?","options":{"a":"Warning for BLACK 4","b":"Goal for BLACK team","c":"Free throw for WHITE team or BLACK team depending on the circumstances","d":"Goalkeeper throw for BLACK team"},"correct":["b"],"rules":"7:1, 7:6"},{"id":"7.20","chapter":"7","stem":"WHITE 10 tries to pass the ball to WHITE 8, who is at the goal-area line of BLACK team. BLACK 10 stands completely still in front of WHITE 8, when the ball hits his foot. Correct decision?","options":{"a":"Free throw for WHITE team","b":"Game continues without interruption","c":"Decision depending on who gets the ball"},"correct":["b"],"rules":"7:8"},{"id":"7.21","chapter":"7","stem":"WHITE 15 blocks a pass from BLACK 9, and the ball rolls on the floor. WHITE 15 and BLACK 9 dive for the ball. WHITE 15 catches the ball and dives on the floor. He stands up, takes three steps with the ball and plays the ball to a teammate, who scores a goal. Correct decision?","options":{"a":"Goal for WHITE team","b":"Free throw for BLACK team"},"correct":["a"],"rules":"7:1, 7:3 comment"},{"id":"7.22","chapter":"7","stem":"WHITE team is leading 24:23 in the 57th minute but has one less player on the court. The court referee has given a free throw in favour of WHITE 3. WHITE 6 tries to execute the free throw several metres away from the correct spot, even though the referee has shown the correct spot very clearly. Correct decision?","options":{"a":"Correction of the position, restart signal, no other action","b":"Correction of the position, restart signal, and referees show the forewarning signal for passive play","c":"Correction of the position, progressive punishment against WHITE 6, restart signal, and referees show the forewarning signal for passive play"},"correct":["b"],"rules":"7:11, Clarification 4"},{"id":"7.23","chapter":"7","stem":"BLACK team is playing with one player less. The players of BLACK team have already assumed their positions in attack and started the build-up phase. Now, BLACK 6 and BLACK 8 decide to leave the court for a substitution. Correct decision?","options":{"a":"Forewarning signal","b":"Forewarning signal if there is no increase in tempo within 5 seconds","c":"Immediate free throw for WHITE team because of passive play","d":"Warning for BLACK 6 or BLACK 8 if repeated","e":"2-minute suspension for BLACK 6 or BLACK 8 if repeated"},"correct":["a"],"rules":"7:11, 7:12, Clarification 4.B.3"},{"id":"7.24","chapter":"7","stem":"Which of the following actions nullify the forewarning signal?","options":{"a":"Renewed ball possession for attacking team after goalkeeper saves a 7-metre throw","b":"Renewed ball possession for attacking team after the ball rebounds from the crossbar or the goalpost","c":"Team time-out","d":"Forceful action before the team’s next passive actions","e":"None of the actions under points a-d"},"correct":["a","b"],"rules":"Clarification 4.C"},{"id":"7.25","chapter":"7","stem":"Which of the following instructions regarding the forewarning signal for passive play (IHF hand signal 17) are correct?","options":{"a":"If a tendency to passive play is noticed, this is first shown by the goal-line referee using hand signal 17. The court referee then raises his arm in the same way.","b":"If the team in possession of the ball requests a team time-out after the forewarning signal has been shown, then the forewarning signal must be shown again, when the game is restarted.","c":"If the team in possession of the ball makes no clear effort to get in a position to shoot on goal, after the forewarning signal has been shown, then either the court referee or the goal-line referee gives a free throw because of passive play.","d":"After the forewarning signal is shown, the referees decide on passive play at the latest when no shot on goal is taken after four passes."},"correct":["b","c","d"],"rules":"Clarification 4"},{"id":"7.26","chapter":"7","stem":"WHITE team delay the execution of a throw-off. The team has already been cautioned for this type of tactical delay earlier. Correct decision?","options":{"a":"Game continues without interruption","b":"Time-out; throw-off after whistle signal","c":"Time-out; throw-off after whistle signal, immediate hand signal for passive play","d":"Whistle signal for throw-off, immediate hand signal for passive play","e":"Progressive punishment for the responsible team official from WHITE team"},"correct":["d"],"rules":"7:11, 7:12, Clarification 4.B.2"},{"id":"7.27","chapter":"7","stem":"Which of the following statements regarding the correct use of the forewarning signal for passive play are correct?","options":{"a":"The forewarning signal is always to be stopped when a team official from the defending team is given a progressive punishment during the course of an attack.","b":"When the forewarning signal is shown for the first time during an attack, the arms must be taken down after about ten seconds.","c":"The forewarning signal must be repeated as a reminder after the first interruption, if it has been shown before the interruption.","d":"The forewarning signal is always to be stopped when a player from the defending team is given a progressive punishment during the course of an attack.","e":"The referees must show the forewarning signal when a player has the ball clearly under control."},"correct":["a","d","e"],"rules":"Clarification 4"},{"id":"7.28","chapter":"7","stem":"Which of the following statements regarding passive play are correct?","options":{"a":"A team must not be allowed more than five seconds to move from the build-up phase to the finishing phase.","b":"The referees must be aware of slow and late substitutions after the throw-off has already been executed.","c":"The referees must observe if the team is trying to increase the tempo or gain a spatial advantage during the build-up phase.","d":"The referees must look out for passive play as soon as a team has gained ball possession in its own half of the court.","e":"A team that has tried to make a counter-attack must be allowed a normal substitution when switching from counter-attacking to a normal build-up phase."},"correct":["b","c","d","e"],"rules":"7:11, Clarification 4"},{"id":"7.29","chapter":"7","stem":"WHITE team is in possession of the ball. The referees show the forewarning signal for passive play. After one pass, WHITE 5 takes a shot on goal. The shot is blocked by BLACK 2, and the ball bounces back to WHITE 5, who passes the ball to WHITE 9. How many passes have been completed?","options":{"a":"3","b":"4","c":"5"},"correct":["a"],"rules":"7:11-12, Clarification 4, Appendix 1 (Training support “Passive play”)"},{"id":"7.30","chapter":"7","stem":"WHITE team is in possession of the ball. The referees show the forewarning signal for passive play. WHITE 9 tries to pass the ball to WHITE 2, but the pass is blocked by BLACK 8, and the ball bounces back to WHITE 9. WHITE 9 tries to break through the defence, but is rewarded a free throw. WHITE 8 executes the free throw by passing the ball to WHITE 2. How many passes have been completed?","options":{"a":"1","b":"2","c":"3"},"correct":["b"],"rules":"7:11-12, Clarification 4, Appendix 1 (Training support “Passive play”)"},{"id":"7.31","chapter":"7","stem":"WHITE team is in possession of the ball. The referees notice a passive tendency in the play of WHITE team. The referees show the forewarning signal for passive play. BLACK team sees that the forewarning signal is shown, and they become more aggressive in defence, trying to cause a free throw. After three passes by WHITE team, BLACK team causes a free throw. Correct decision?","options":{"a":"WHITE team has 4 passes left to take a shot on goal.","b":"WHITE team has 2 passes left to take a shot on goal.","c":"WHITE team has 1 pass left to take a shot on goal.","d":"WHITE team has to execute the free throw as a direct shot on goal."},"correct":["c"],"rules":"7:11-12, Clarification 4"},{"id":"7.32","chapter":"7","stem":"WHITE team is in attack. The referees notice a passive tendency in the play of WHITE team and show the forewarning signal. WHITE team passes the ball four times, before WHITE 9 takes a shot on goal. The shot is blocked by BLACK 3, and the ball goes over the sideline for a throw-in for WHITE team. Correct decision?","options":{"a":"The forewarning signal is no longer valid.","b":"WHITE team has 4 passes left to take a shot on goal.","c":"WHITE team has 2 passes left to take a shot on goal.","d":"WHITE team has 1 pass left to take a shot on goal."},"correct":["d"],"rules":"7:11-12, Clarification 4, Appendix 1 (Training support “Passive play”)"},{"id":"7.33","chapter":"7","stem":"WHITE team is in possession of the ball, and because of a passive tendency in the play of WHITE team the referees show the forewarning signal. After 4 passes WHITE 5 takes a shot on goal. BLACK 3 blocks the shot, and the ball returns to WHITE 5. Correct decision?","options":{"a":"Free throw for BLACK team","b":"WHITE team has 1 pass left to take a shot on goal.","c":"Forewarning signal continues","d":"Forewarning signal is no longer valid","e":"WHITE team has no more passes before taking a shot on goal."},"correct":["b","c"],"rules":"7:11-12, Clarification 4, Appendix 1 (Training support “Passive play”)"},{"id":"7.34","chapter":"7","stem":"BLACK team are in attack. The referees show the forewarning signal. BLACK 7 passes the ball to BLACK 11. BLACK 11 tries to break through but is stopped by WHITE 3. The referees give a free throw for BLACK team. BLACK 11 executes the free throw and passes the ball to BLACK 2, who tries to take a shot on goal, but the shot is blocked by defender WHITE 4, and the ball goes to BLACK 11. BLACK 11 takes a shot on goal, but he is pushed lightly by WHITE 5, and goalkeeper WHITE 1 manages to save the shot. What is the correct decision?","options":{"a":"Free throw for BLACK team; new normal build-up phase because BLACK team manage to get possession of the ball after a shot on goal.","b":"Free throw for BLACK team; forewarning signal, BLACK team have used two passes.","c":"Free throw for BLACK team; forewarning signal, BLACK team have used three passes.","d":"Free throw for BLACK team; forewarning signal, BLACK team have used four passes."},"correct":["c"],"rules":"7:11, 7:12, Clarification 4"},{"id":"7.35","chapter":"7","stem":"The score is 27-27 with 20 seconds left of the match. WHITE team play without goalkeeper. The forewarning signal is shown by the referees. After three passes, WHITE 8 passes the ball to WHITE 7, who takes a shot on goal. The ball is blocked by defender BLACK 2, and the ball passes the side line. Shortly after the throw-in is executed, the whistle sounds from the table, because WHITE team have requested a team time-out. How should the match be restarted?","options":{"a":"Free throw for WHITE team.","b":"Throw-in for WHITE team.","c":"The throw must be executed as a direct shot on goal.","d":"Besides the possibility to execute the throw as a direct shot on goal, the thrower may pass the ball to a teammate."},"correct":["a","d"],"rules":"7:11, 7:12, Clarification 4, Appendix 1 (Training Support “Passive play”) 7:36) b, d, f 2:8, 7:11, 7:12, Clarification 4, Appendix 1 (Training Support “Passive Play”)"},{"id":"7.36","chapter":"7","stem":"WHITE team plays in attack. Two passes after the forewarning signal has been shown by the referees, WHITE 7 shoots on goal. The ball is blocked by BLACK 8. WHITE 8 receives the rebound and tries to shoot on goal. Again, the ball is blocked by BLACK 8. WHITE 8 receives the ball after the block and plays the ball to WHITE 6, who has a clear chance of scoring. WHITE 6 is pulled down from behind by BLACK 7 in a way that he totally loses body control. What is the correct decision?","options":{"a":"7-metre throw for WHITE team","b":"Free throw for BLACK team","c":"Direct 2-minute suspension for BLACK 7","d":"Disqualification for BLACK 7 (red card shown by the referees)","e":"Free throw for WHITE team","f":"Time-out"},"correct":["b","d","f"],"rules":"2:8, 7:11, 7:12, Clarification 4, Appendix 1 (Training Support \"Passive Play\")"},{"id":"8.1","chapter":"8","stem":"During a counter-attack by WHITE team, BLACK 7 enters the court as an additional player and holds WHITE 5 in such a way that the clear chance of scoring is spoiled. Correct decision?","options":{"a":"2-minute suspension for BLACK 7","b":"Disqualification of BLACK 7 without written report (red card shown by the referees)","c":"Disqualification of BLACK 7 with written report (red and blue cards shown by the referees)","d":"Free throw","e":"7-metre throw"},"correct":["c","e"],"rules":"4:6, 8:10b, 14:1a, 16:6b"},{"id":"8.2","chapter":"8","stem":"BLACK 8, who is not included in the score sheet, arrives late and runs straight from the locker room onto the court. He spoils a clear chance of scoring when pushing the jump-shooting player WHITE 6, so that he loses body control. Correct decision?","options":{"a":"7-metre throw for WHITE team","b":"Free throw for WHITE team","c":"Disqualification of BLACK 8 without written report (red card shown by the referees)","d":"Disqualification of BLACK 8 with written report (red and blue cards shown by the referees)","e":"Progressive punishment against the responsible team official of BLACK team"},"correct":["a","d","e"],"rules":"4:3, 8:10b, 14:1a, 16:1b, 16:6a, 16:6b"},{"id":"8.3","chapter":"8","stem":"On the way to the changing rooms (during the half-time break) team official B from WHITE team complains to the referees in an unsportsmanlike way. Team official A from WHITE team has already received a warning during the first half of the game. Correct decision?","options":{"a":"2-minute suspension for team official B from WHITE team","b":"Disqualification of team official B from WHITE team (red card shown by the referees)","c":"WHITE team begins the second half reduced by 1 player for 2 minutes.","d":"No punishment possible, but written report"},"correct":["a","c"],"rules":"8:7a, 16:3e, 16:10"},{"id":"8.4","chapter":"8","stem":"WHITE 6 has already been penalised twice with a 2-minute suspension. Now, WHITE 6 commits a faulty substitution. What is the decision, if he is also guilty of extremely unsportsmanlike conduct after the referees have informed him about the faulty substitution?","options":{"a":"2-minute suspension for WHITE 6","b":"Disqualification of WHITE 6 without written report (red card shown by the referees)","c":"Disqualification of WHITE 6 with written report (red and blue cards shown by the referees)","d":"WHITE team reduced by 1 player on the court for 2 minutes","e":"WHITE team reduced by 2 players on the court for 2 minutes","f":"WHITE team reduced by 1 player on the court for 4 minutes"},"correct":["a","c","f"],"rules":"4:5, 8:10a, 16:3a, 16:6d, 16:8, 16:9c-d"},{"id":"8.5","chapter":"8","stem":"WHITE 2 is suspended for 2 minutes, but official A sends him back onto the court after 1 minute. Before the timekeeper’s whistle WHITE 2 has already destroyed a clear chance of scoring for BLACK team. Correct decision?","options":{"a":"Free throw for BLACK team and additional suspension for WHITE 2","b":"7-metre throw for BLACK team, additional suspension for WHITE 2, and further reduction of WHITE team for the remainder of WHITE 2’s suspension time","c":"7-metre throw, disqualification of WHITE 2 without written report, and further reduction of WHITE team for the remainder of WHITE 2’s suspension time (red card shown by the referees)","d":"7-metre throw, disqualification of WHITE 2, and further reduction of WHITE team for the remainder of WHITE 2’s suspension time; written report (red and blue cards shown by the referees)"},"correct":["d"],"rules":"4:6, 8:10b, 14:1a, 16:6b, 16:8"},{"id":"8.6","chapter":"8","stem":"During the attack of WHITE team, pivot WHITE 7, who is not in possession of the ball, blocks BLACK 4 with his trunk. Correct decision?","options":{"a":"Free throw for BLACK team","b":"Progressive punishment against WHITE 7","c":"Game continues without interruption"},"correct":["c"],"rules":"8:1c"},{"id":"8.7","chapter":"8","stem":"Wing player WHITE 4 has a clear chance of scoring. BLACK 7 tries to play the ball out of his hand, but he only hits his forearm. The ball misses the goal. Correct decision?","options":{"a":"Free throw for WHITE team","b":"7-metre throw for WHITE team","c":"2-minute suspension for BLACK 7","d":"Warning for BLACK 7","e":"No progressive punishment for BLACK 7"},"correct":["b","e"],"rules":"8:2a, 14:1a"},{"id":"8.8","chapter":"8","stem":"WHITE 6 is in a counter-attack, goalkeeper BLACK 12 leaves his goal area to gain possession of the ball but collides with WHITE 6. However, a defender might have stopped WHITE 6 by using legal means. Correct decision?","options":{"a":"2-minute suspension for BLACK 12","b":"Disqualification for BLACK 12 (red card shown by the referees)","c":"7-metre throw for WHITE team","d":"Free throw for WHITE team","e":"Disqualification for BLACK 12, written report (red and blue cards shown by the referees)"},"correct":["b","c"],"rules":"8:5 comment, 14:1a, 16:6a, Clarification 6b"},{"id":"8.9","chapter":"8","stem":"WHITE 2 wants to pass the ball to a teammate into the other half of the court, but his teammate is held by BLACK 5. BLACK 5 has already received a warning for running into an opponent, who did not have the ball. Correct decision?","options":{"a":"Free throw for WHITE team","b":"2-minute suspension for BLACK 5","c":"Disqualification for BLACK 5 (red card shown by the referees)","d":"Written report (blue card shown by the referees)"},"correct":["a","b"],"rules":"8:3, 13:1b, 16:3b"},{"id":"8.10","chapter":"8","stem":"The ball is played to pivot WHITE 9, who is standing alone at the goal-area line of BLACK team. His throwing arm is then pulled back by BLACK 2. Correct decision?","options":{"a":"Free throw for WHITE team","b":"7-metre throw for WHITE team","c":"2-minute suspension for BLACK 2","d":"Disqualification for BLACK 2 (red card shown by the referees)","e":"Written report (blue card shown by the referees)"},"correct":["b","d"],"rules":"8:5, 14:1a, 16:6a"},{"id":"8.11","chapter":"8","stem":"Shortly after BLACK 9 has received a warning for pushing in the first minute of the game, BLACK 7 holds the pivot of WHITE team. There is no clear chance of scoring. Correct decision?","options":{"a":"Free throw for WHITE team","b":"7-metre throw for WHITE team","c":"Warning for BLACK 7","d":"2-minute suspension for BLACK 7"},"correct":["a","c"],"rules":"8:3, 13:1b, 16:1a"},{"id":"8.12","chapter":"8","stem":"WHITE 4 receives the ball standing at the opponents’ goal-area line with only the goalkeeper in front of him. Before WHITE 4 tries to score, BLACK 3 pulls him down in a way that WHITE 4 loses the ball. Correct decision?","options":{"a":"Warning for BLACK 3","b":"2-minute suspension for BLACK 3","c":"Disqualification for BLACK 3 (red card shown by the referees)","d":"Free throw for WHITE team","e":"7-metre throw for WHITE team"},"correct":["b","e"],"rules":"8:4b, 14:1a, 16:3c"},{"id":"8.13","chapter":"8","stem":"When must a player be disqualified (red or red and blue cards shown by the referees)?","options":{"a":"For a foul that endangers the health of an opponent","b":"For extremely unsportsmanlike conduct on or off the court","c":"For repeated unsportsmanlike conduct on the court","d":"For faulty substitution during a suspension (no clear chance of scoring)"},"correct":["a","b"],"rules":"8:5, 8:6, 16:6a"},{"id":"8.14","chapter":"8","stem":"During a counter-attack by WHITE 5, team official C from BLACK team runs from the bench onto the court in the direction of his own goal area. WHITE 5 becomes so confused that he stops running. In the referee’s opinion, WHITE 5 had a clear chance of scoring. The guilty official did not touch the opponent, who had the ball; his shortest distance to WHITE 5 was approximately ten metres. Correct decision?","options":{"a":"Time-out","b":"Free throw for WHITE team","c":"7-metre throw for WHITE team","d":"Disqualification of team official C from BLACK team without written report (red card shown by the referees)","e":"Disqualification of team official C from BLACK team, written report (red and blue cards shown by the referees)","f":"BLACK team reduced by 1 player on the court for 2 minutes","g":"The Delegate or the referees have the possibility to play the advantage and whistle for the infraction when the clear chance of scoring is over"},"correct":["a","c","e","f"],"rules":"2:8a, 8:10b, 14:1a, 16:6b"},{"id":"8.15","chapter":"8","stem":"WHITE team is in a counterattack. WHITE 5 wants to play the ball to WHITE 7, who is all alone at the goal-area line of BLACK team. When WHITE 5 passes the ball, team official D from BLACK team runs onto the court and catches the ball. Correct decision?","options":{"a":"Free throw for WHITE team","b":"7-metre throw for WHITE team","c":"2-minute suspension for team official D from BLACK team","d":"Disqualification of team official D from BLACK team without written report (red card shown by the referees)","e":"Disqualification of team official D from BLACK team, written report (red and blue cards shown by the referees)","f":"BLACK team reduced by 1 player on the court for 2 minutes"},"correct":["b","e","f"],"rules":"8:10b, 14:1a, 16:6b"},{"id":"8.16","chapter":"8","stem":"Which of the following actions should be defined as extremely unsportsmanlike conduct and therefore be punished with a disqualification with a written report (red and blue cards shown by the referees)?","options":{"a":"Repeated defending with the foot or lower leg by a court player","b":"A team official destroying a clear chance of scoring","c":"Spitting on another person","d":"Repeated delays of the game, with the purpose of wasting time"},"correct":["b","c"],"rules":"8:10a, 8:10b, 16:6b"},{"id":"8.17","chapter":"8","stem":"When entering the playing hall, the referees meet BLACK 4, who wears the player’s uniform, but is not included in the score sheet for the match. BLACK 4 shouts: “Not these idiots again!” After 12 minutes of the match have been played, BLACK 4 is added to the score sheet as his team’s 16th player. This is discovered by the referees. Correct decision?","options":{"a":"Disqualification of BLACK 4 without written report (red card shown by the referees)","b":"BLACK team is reduced by 1 player on the court for 2 minutes","c":"BLACK team continues without a reduction of players on the court","d":"Disqualification of BLACK 4, written report (red and blue cards shown by the referees)","e":"BLACK team can add another player to complete the team’s allowed number of 16 players."},"correct":["c","d"],"rules":"8:10a, 16:6b, 16:8, 16:11b"},{"id":"8.18","chapter":"8","stem":"After a free throw for WHITE team, team official C from BLACK team enters the court and shouts: “But that should be a free throw for us!” No team officials from BLACK team have been punished earlier in the match. Correct decision?","options":{"a":"The responsible team official from BLACK team must take team official C out of the hall.","b":"2-minute suspension for team official C from BLACK team, BLACK team is reduced by 1 player on the court for 2 minutes","c":"Warning for team official C from BLACK team","d":"Free throw for WHITE team"},"correct":["c","d"],"rules":"8:7a, 16:1b"},{"id":"8.19","chapter":"8","stem":"WHITE 3 receives a warning due to a foul on the court that requires progressive punishment. After restart of the game and after being substituted, WHITE 3 insults the referees from the substitutions bench. Correct decision?","options":{"a":"Disqualification of WHITE 3 without written report (red card shown by the referees, and WHITE team reduced by 1 player on the court for 2 minutes","b":"Disqualification of WHITE 3, written report (red and blue cards shown by the referees), WHITE team reduced by 1 player on the court for 2 minutes","c":"2-minute suspension for WHITE 3, and WHITE team reduced by 1 player on the court for 2 minutes","d":"Time-out"},"correct":["b","d"],"rules":"8:10a, 16:6b"},{"id":"8.20","chapter":"8","stem":"During a counter-attack BLACK 9 has his shirt pulled by WHITE 4, who has already received a warning. Despite this, BLACK 9 manages to play the ball to BLACK 8, who scores a goal. The referees want to penalise WHITE 4 afterwards, but by then he is already sitting on the substitution bench. Correct decision?","options":{"a":"2-minute suspension for WHITE 4, WHITE team is reduced by 1 player on the court for 2 minutes","b":"WHITE 4 is not allowed to play for the next 2 minutes, but the team remains complete on the court","c":"Punishment no longer possible","d":"Disqualification for WHITE 4 (red card shown by the referees), and WHITE team is reduced by 1 player on the court for 2 minutes"},"correct":["a"],"rules":"8:3, 16:3b"},{"id":"8.21","chapter":"8","stem":"When must a player be disqualified (red card or red and blue cards shown by the referees)?","options":{"a":"For seriously unsportsmanlike conduct","b":"For destroying a clear chance of scoring through actively blocking a shot or pass by using his foot","c":"For faulty substitution during suspension time (no clear chance of scoring)","d":"For not putting down the ball for a free throw against his own team (not in the last 30 seconds)"},"correct":["a"],"rules":"4:6, 8:8b, 8:8f, 8:9, 16:6b"},{"id":"8.22","chapter":"8","stem":"BLACK team is attacking. WHITE 11 takes the ball away from BLACK 6 by committing a foul that endangers the health of BLACK 6. WHITE 7 and WHITE 8 were positioned between BLACK 6 and the goal of WHITE team at the time of the foul. Correct decision?","options":{"a":"2-minute suspension for WHITE 11","b":"Disqualification for WHITE 11 (red card shown by the referees)","c":"7-metre throw for BLACK team","d":"Free throw for BLACK team"},"correct":["b","d"],"rules":"8:5, 13:1b, 16:6a, Clarification 6"},{"id":"8.23","chapter":"8","stem":"Which of the following infractions must be punished with a disqualification with written report according to the rules (red and blue cards shown by the referees)?","options":{"a":"An official enters the court for the second time without permission.","b":"An official, who tries to force his team to abandon the game.","c":"When a 7-metre thrower hits the goalkeeper’s head, and the goalkeeper is not moving his head in the direction of the ball.","d":"After a decision by the referees, a player demonstratively throws the ball into the stands.","e":"A player outside the playing court spits on a spectator."},"correct":["b","e"],"rules":"8:10, 16:6b"},{"id":"8.24","chapter":"8","stem":"WHITE 3 has received a 2-minute suspension for a foul and is sitting on the substitution bench. During a throw-in near the bench, WHITE 3 shouts at the referees to insult them. Correct decision?","options":{"a":"2-minutes suspension for WHITE 3","b":"Disqualification of WHITE 3 without written report (red card shown by the referees), which causes an immediate 2-minute reduction of WHITE team on the court","c":"WHITE team reduced by 1 player on the court for 4 minutes","d":"Disqualification for WHITE 3, written report (red and blue cards shown by the referees), which causes an immediate 2-minute reduction of WHITE team on the court"},"correct":["d"],"rules":"8:10a, 16:8"},{"id":"8.25","chapter":"8","stem":"Due to disappointment over a mistake, WHITE 3 hits one of his teammates in the face. Correct decision?","options":{"a":"No action, because it involves a teammate","b":"2-minute suspension for WHITE 3","c":"Disqualification of WHITE 3 without written report (red card shown by the referees)","d":"Disqualification for WHITE 3, written report (red and blue cards shown by the referees)"},"correct":["d"],"rules":"8:6b, 16:6a"},{"id":"8.26","chapter":"8","stem":"When entering the hall the referees meet BLACK 4, who already wears a player’s uniform and immediately shouts out: “Surely not these idiots again!” The referees verify that BLACK 4 is included in the score sheet for the match. Correct decision?","options":{"a":"2-minute suspension for BLACK 4 at the beginning of the match","b":"Disqualification of BLACK 4 without written report (red card shown by the referees), BLACK team is reduced by 1 player on the court for 2 minutes at the beginning of the match","c":"Disqualification of BLACK 4, written report (red and blue cards shown by the referees), BLACK team may use 16 players in the match","d":"Disqualification of BLACK 4, written report (red and blue cards shown by the referees), BLACK team may use 16 players in the match but is reduced by 1 player on the court for 2 minutes at the beginning of the match"},"correct":["c"],"rules":"8:10a, 16:6b, 16:11b, 17:10"},{"id":"8.27","chapter":"8","stem":"While warming up before the match, WHITE 3 and goalkeeper BLACK 1 collide by accident. The two players get upset with each other, and BLACK 1 hits WHITE 3. WHITE 3 hits him straight back. Both players are included in the score sheet for the match. Correct decision?","options":{"a":"Disqualification of BLACK 1, written report (red and blue cards shown by the referees) and a 2-minute suspension for WHITE 3. The teams may use 14 players each in the match.","b":"Disqualification of BLACK 1 and WHITE 3, written reports (red and blue cards shown by the referees). The teams may use 14 players each in the match, but both teams are reduced by 1 player on the court for 2 minutes at the beginning of the match.","c":"Both players receive a 2-minute suspension, which must be served at the beginning of the match. Written report.","d":"Disqualification of BLACK 1 and WHITE 3, written reports (red and blue cards shown by the referees). The teams may use 14 players each in the match."},"correct":["d"],"rules":"8:10a, 16:6a, 16:11b, 17:10"},{"id":"8.28","chapter":"8","stem":"WHITE 9 is taking a jump shot. BLACK 5 grabs WHITE 9’s shooting arm from behind and pulls him down. BLACK 10 and BLACK 11 are in position between WHITE 9 and the goal of BLACK team. Correct decision?","options":{"a":"Free throw for WHITE team","b":"7-metre throw for WHITE team","c":"Disqualification of BLACK 5 without written report (red card shown by the referees)","d":"2-minute suspension for BLACK 5","e":"Disqualification of BLACK 5, written report (red and blue cards shown by the referees)"},"correct":["a","c"],"rules":"8:5, 13:1b, 16:6a"},{"id":"8.29","chapter":"8","stem":"Which of the following infractions must be punished with a disqualification (red card shown by the referees)?","options":{"a":"An official enters the court for the second time without permission.","b":"A player in possession of the ball is pulled down when running during a counter-attack. The situation is not particularly dangerous.","c":"A 7-metre throw hits the face of the goalkeeper, who is not moving in the direction of the ball.","d":"After a referee decision a player throws the ball into the stands as a protest.","e":"The goalkeeper leaves the goal area and gains possession of the ball, but causes a collision with an opponent, who is running in a counter-attack."},"correct":["b","d","e"],"rules":"8:5, 8:9a, 8:9d, 16:6a, 16:6b"},{"id":"8.30","chapter":"8","stem":"WHITE 9 receives his third 2-minute suspension and is therefore disqualified. Wearing his tracksuit he takes a seat in the first spectators’ row behind the sideline opposite the substitution area. Directly in front of him, BLACK 3 commits a particularly dangerous foul against WHITE 10. The player remains injured on the floor. Before the referees can punish BLACK 3, WHITE 9 runs onto the court and knocks BLACK 3 down. Correct decision?","options":{"a":"Time-out","b":"Disqualification of BLACK 3, written report (red and blue cards shown by the referees)","c":"WHITE 9 is not involved in the match any more, no remarks possible","d":"Written report about the behaviour of WHITE 9","e":"Disqualification of BLACK 3 without written report (red card shown by the referees)","f":"WHITE 10 must leave the court after receiving medical care and can only re-enter following the third attack of his team."},"correct":["a","b","d"],"rules":"2:8a, 4:11, 8:6a, 16:6a, 17:2, 17:10"},{"id":"8.31","chapter":"8","stem":"A warning shall be given for:","options":{"a":"Infractions where the action is mainly or exclusively aimed at the body of the opponent","b":"Infractions while the opponents are executing a formal throw","c":"Failure to put the ball down on the floor when a decision is made against one’s own team","d":"A goalkeeper’s attempt to make a substitution when an opponent is ready to take a 7- metre throw"},"correct":["a","b","d"],"rules":"8:3, 8:7c, 8:8b, 14:10, 16:1b, 16:3c"},{"id":"8.32","chapter":"8","stem":"What must be considered as unsportsmanlike conduct?","options":{"a":"Throwing the ball in the face of a defender, who is not moving in the direction of the ball","b":"Passive behaviour by the goalkeeper during the execution of a 7-metre throw, if it is apparent that he is not willing to save the shot","c":"Trying to mislead the referees through fake actions","d":"Actively blocking a shot by using a foot or lower leg","e":"Repeated entering the goal area for tactical reasons","f":"An act of revenge after having been fouled"},"correct":["c","d","e"],"rules":"8:7"},{"id":"8.33","chapter":"8","stem":"In which of the following situations must a disqualification lead to a written report (red and blue cards shown by the referees)?","options":{"a":"Assault on the playing court during the half-time break","b":"A particularly reckless or dangerous action","c":"An act of revenge after having been fouled","d":"A malicious action, which is not in any way related to the game situation"},"correct":["a","b","d"],"rules":"8:5, 8:6, 8:9f"},{"id":"8.34","chapter":"8","stem":"There is a throw-off for WHITE team. The referee has given the whistle signal, and WHITE 9 is ready to execute the throw-off. After the whistle signal, WHITE 3 crosses the centre line and is pulled down from behind by BLACK 5 in a way he totally loses body control. Correct decision?","options":{"a":"2-minute suspension for BLACK 5","b":"Disqualification of BLACK 5 without written report (red card shown by the referees)","c":"Free throw for WHITE team","d":"7-metre throw for WHITE team","e":"Throw-off for WHITE team","f":"Disqualification of BLACK 5, written report (red and blue cards shown by the referees)"},"correct":["b","c"],"rules":"8:5, 13:1b, 16:6a"},{"id":"8.35","chapter":"8","stem":"BLACK 8 has received a 2-minute suspension because of a faulty substitution. Two seconds after the game has been restarted, he makes a comment to the referees in an unsportsmanlike manner from his position on the bench. Correct decision?","options":{"a":"Additional 2-minute suspension for BLACK 8","b":"Disqualification of BLACK 8 without written report (red card shown by the referees)","c":"BLACK team will be reduced by 2 players on the court for the next 1 minute and 58 seconds and then by 1 player on the court for 2 seconds.","d":"BLACK team will be reduced by 2 players on the court for the next 2 minutes.","e":"Free throw for WHITE team","f":"Time-out"},"correct":["a","c","e","f"],"rules":"2:
